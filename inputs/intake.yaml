# Research Intake Form — YAML Format
# Alternative to intake.md for cleaner complex project specifications
# Schema version: 3.0.0

schema_version: "3.0.0"

project:
  title: ""
  researcher: ""
  institution: ""
  domain: ""  # Match with .research/domains/*.yaml

questions:
  - id: 1
    priority: primary  # primary | secondary | exploratory
    text: ""
    type: descriptive  # descriptive | comparative | associational | causal | predictive | exploratory
    hypothesis: ""
    outcome: []
    predictor: []
    covariates: []
    files: []
    prep: ""
    prior: ""

  # Add more questions:
  # - id: 2
  #   priority: secondary
  #   text: ""
  #   type: ""
  #   hypothesis: ""
  #   outcome: []
  #   predictor: []
  #   covariates: []
  #   files: []
  #   prep: ""
  #   prior: ""

data:
  files:
    - name: ""
      description: ""
      format: csv  # csv | tsv | parquet | xlsx | sav | dta | sas7bdat
      path: "data/raw/"
      estimated_rows: null
      estimated_columns: null
      identifiers: []
      time_period: ""
      issues: []
  relationships: []
  # Example:
  # relationships:
  #   - from: survey_data.csv
  #     to: clinical_data.parquet
  #     on: patient_id

context:
  target_output: journal_article  # journal_article | report | presentation | policy_brief
  target_venue: ""
  timeline: ""
  ethics: not_required  # approved | pending | not_required
  constraints: ""
  prior_work: ""
  notes: ""

metadata:
  created: ""
  last_updated: ""
  version: 1
  method: manual  # manual | interview | api
