[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "research-os"
version = "0.1.0"
description = "An MCP-native research operating system for reproducible, citation-verified academic workflows."
readme = "README.md"
authors = [
    {name = "Vibhav", email = "vibhav.setlur@gmail.com"}
]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0.1",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "numpy>=1.24.0",
    "firecrawl-py>=0.0.15",
    "scholarly>=1.7.11",
    "bs4>=0.0.2",
    "metapub>=0.5.5",
    "habanero>=1.2.6"
]

[project.urls]
Repository = "https://github.com/VibhavSetlur/Research-OS"

[project.optional-dependencies]
mcp = [
    "mcp>=0.1.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.0.0",
    "mypy>=1.0.0"
]
all = [
    "research-os[mcp,dev]"
]

[project.scripts]
research-os = "research_os.server:main"

[tool.ruff.lint]
per-file-ignores = { "src/research_os/server.py" = ["E402"], "src/research_os/state/state_ledger.py" = ["E402"], "src/research_os/tools/actions/citation_verifier.py" = ["E402"], "src/research_os/utils/executor.py" = ["E402"], "src/research_os/utils/parallel_runner.py" = ["E402"], "src/research_os/utils/skill_indexer.py" = ["E402"] }

[tool.pytest.ini_options]
norecursedirs = ["scratch", "scripts", ".git", "templates"]

[tool.hatch.build.targets.wheel]
packages = ["src/research_os"]
