[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "research-copilot"
version = "9.0.0"
description = "A self-healing, citation-verified research engine that any LLM can operate — from raw data to publication-ready manuscript"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Research Copilot Contributors"}
]
keywords = ["research", "ai", "llm", "academic", "analysis", "reproducible", "mcp", "citation-verification"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "diskcache>=5.0",
    "pandas>=2.0",
    "numpy>=1.24",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "seaborn>=0.12",
    "rank-bm25>=0.2",
    "habanero>=1.2",
    "semanticscholar>=0.3",
    "metapub>=0.5",
    "sqlalchemy>=2.0",
    "polars>=0.20",
    "pyarrow>=14.0",
    "statsmodels>=0.14",
    "scikit-learn>=1.3",
    "pingouin>=0.5",
    "networkx>=3.0",
    "Pillow>=10.0",
    "jinja2>=3.0",
    "tenacity>=8.0",
    "openpyxl>=3.1",
    "missingno>=0.5",
    "matplotlib-venn>=0.11",
    "wordcloud>=1.9",
    "pycirclize>=0.13",
]

[project.optional-dependencies]
mcp = [
    "mcp>=1.0",
    "starlette>=0.27",
    "uvicorn>=0.23",
]
dashboard = [
    "panel>=1.3",
    "bokeh>=3.3",
    "plotly>=5.18",
    "altair>=5.2",
    "dash>=2.16",
    "dash-bootstrap-components>=1.5",
    "param>=2.1",
    "holoviews>=1.18",
    "pygwalker>=0.4",
    "vega_datasets>=0.9",
]
export = [
    "pypandoc>=1.11",
]
watcher = [
    "watchdog>=3.0",
]
hpc = [
    "paramiko>=3.0",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "mypy>=1.0",
]
all = [
    "research-copilot[mcp,dashboard,export]",
]

[project.scripts]
research-os = "research_copilot.cli:main"
rcp = "research_copilot.cli:main"
research-copilot-mcp = "research_copilot.server:main"

[project.urls]
Homepage = "https://github.com/VibhavSetlur/research-copilot"
Documentation = "https://github.com/VibhavSetlur/research-copilot/blob/main/docs/README.md"
Repository = "https://github.com/VibhavSetlur/research-copilot"
Issues = "https://github.com/VibhavSetlur/research-copilot/issues"
Changelog = "https://github.com/VibhavSetlur/research-copilot/blob/main/docs/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["src"]
include = ["research_copilot*"]

[tool.setuptools.package-data]
"research_copilot" = [
    "assets/**/*",
]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
