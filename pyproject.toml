[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "research-copilot"
version = "9.0.0"
description = "A self-healing, citation-verified, multi-modal research engine that any LLM can operate"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Research Copilot Contributors"}
]
keywords = ["research", "ai", "llm", "academic", "analysis", "reproducible"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]

dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "diskcache>=5.0",
    "pandas>=2.0",
    "numpy>=1.24",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "seaborn>=0.12",
    "habanero>=1.2",
    "semanticscholar>=0.3",
    "metapub>=0.5",
    "sqlalchemy>=2.0",
    "polars>=0.20",
    "pyarrow>=14.0",
    "statsmodels>=0.14",
    "scikit-learn>=1.3",
    "pingouin>=0.5",
]

[project.optional-dependencies]
mcp = [
    "mcp>=1.0",
    "starlette>=0.27",
    "uvicorn>=0.23",
]
dashboard = [
    "panel>=1.3",
    "bokeh>=3.3",
    "plotly>=5.18",
    "altair>=5.2",
]
export = [
    "pypandoc>=1.11",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "mypy>=1.0",
]
all = [
    "research-copilot[mcp,dashboard,export]",
]

[project.scripts]
rcp = "research_copilot.cli:main"

[project.urls]
Homepage = "https://github.com/your-org/research-copilot"
Documentation = "https://github.com/your-org/research-copilot#readme"
Repository = "https://github.com/your-org/research-copilot"
Issues = "https://github.com/your-org/research-copilot/issues"

[tool.setuptools.packages.find]
where = ["src"]
include = ["research_copilot*"]

[tool.setuptools.package-data]
"research_copilot" = [
    ".research/**/*",
    "inputs/**/*",
    "environment/**/*",
    "AGENTS.md",
]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
