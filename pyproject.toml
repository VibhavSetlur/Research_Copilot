[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "research-os"
version = "0.1.0"
description = "A Guidance Engine for Autonomous Research Workflows"
readme = "README.md"
authors = [
    {name = "Vibhav", email = "vibhav@example.com"}
]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0.1",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "numpy>=1.24.0",
    "firecrawl-py>=0.0.15",
    "scholarly>=1.7.11",
    "bs4>=0.0.2",
    "metapub>=0.5.5",
    "habanero>=1.2.6"
]

[project.optional-dependencies]
mcp = [
    "mcp>=0.1.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.0.0",
    "mypy>=1.0.0"
]

[project.scripts]
research-os = "research_os.server:main"
