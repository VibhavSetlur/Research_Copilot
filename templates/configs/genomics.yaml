# Genomics — preset researcher_config.yaml
# Copy to inputs/researcher_config.yaml of your project, then customise.

project_name: "Genomics Analysis"
research_question: ""
domain: "bioinformatics"

researcher:
  name: ""
  field: "bioinformatics"
  expertise_level: "intermediate"
  institution: ""
  orcid: ""

interaction:
  autonomy_level: "supervised"

model_profile: "medium"

research_goal:
  output_types: ["paper"]
  target_venue: "journal"
  reporting_standard: "MINSEQE (sequencing) / MIAME (microarray)"
  suggested_methodology: "machine_learning"
  suggested_protocols:
    - "methodology/methodology_selection"
    - "methodology/machine_learning"

writing_preferences:
  citation_style: "vancouver"
  language: "en-US"

api_keys:
  firecrawl: ""
  semantic_scholar: ""
  pubmed: ""
  crossref: ""
  serpapi: ""

notifications:
  on_step_complete: true
  on_error: true
  on_decision_required: true

domain_hints:
  expected_columns: [gene_id, expression, log2fc, pvalue, padj, chromosome, position]
  expected_file_extensions: [.fasta, .fastq, .bam, .vcf, .gtf, .gff, .h5, .csv, .tsv]
  biases_to_monitor:
    - batch effects (sequencing run / lane / library prep)
    - GC content bias
    - read mapping / multi-mapper bias
    - multiple testing without proper FDR control
