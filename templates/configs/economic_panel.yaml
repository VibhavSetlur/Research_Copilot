# Economic Panel Data — preset researcher_config.yaml
# Copy to inputs/researcher_config.yaml of your project, then customise.

project_name: "Economic Panel Analysis"
research_question: ""
domain: "economics"

researcher:
  name: ""
  field: "economics"
  expertise_level: "intermediate"
  institution: ""
  orcid: ""

interaction:
  autonomy_level: "supervised"

model_profile: "medium"

research_goal:
  output_types: ["paper"]
  target_venue: "journal"
  reporting_standard: "AEA Data and Code Availability Policy"
  suggested_methodology: "causal_inference_deep"   # IV / DiD / panel FE
  suggested_protocols:
    - "methodology/causal_inference_deep"
    - "methodology/research_methods"

writing_preferences:
  citation_style: "apa"
  language: "en-US"

api_keys:
  firecrawl: ""
  semantic_scholar: ""
  pubmed: ""
  crossref: ""
  serpapi: ""

notifications:
  on_step_complete: true
  on_error: true
  on_decision_required: true

# Domain hints for the AI
domain_hints:
  expected_columns: [country, year, gdp, inflation, unemployment, interest_rate]
  expected_file_extensions: [.dta, .csv, .xlsx, .parquet]
  biases_to_monitor:
    - endogeneity / reverse causality
    - omitted variable bias
    - selection on observables
    - serial correlation in panel errors (use clustered SEs)
