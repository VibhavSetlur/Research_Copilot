# Geospatial / GIS — preset researcher_config.yaml
# Copy to inputs/researcher_config.yaml. Tuned for raster + vector spatial
# analysis, remote sensing, or spatial epidemiology.

project_name: "Geospatial Study"
research_question: ""
domain: "geospatial"
hypotheses: []

researcher:
  name: ""
  field: "geospatial / remote sensing"
  expertise_level: "intermediate"
  institution: ""
  orcid: ""

interaction:
  autonomy_level: "supervised"

model_profile: "medium"

runtime:
  shared_server: true   # raster ops are RAM-hungry; default to backgrounded
  long_running_threshold_seconds: 30
  default_n_for_sampling: 10000

research_goal:
  output_types: ["paper", "dashboard"]
  target_venue: "journal"
  reporting_standard: ""  # no single dominant standard; cite MAUP awareness
  suggested_methodology: "research_methods"
  suggested_protocols:
    - "domain/research_design"
    - "methodology/methodology_selection"
    - "guidance/analysis_plan"

writing_preferences:
  citation_style: "apa"
  language: "en-US"

api_keys:
  semantic_scholar: ""
  pubmed: ""
  crossref: ""
  firecrawl: ""
  serpapi: ""

domain_hints:
  expected_columns: [latitude, longitude, elevation, geometry, crs]
  expected_file_extensions:
    [.shp, .geojson, .gpkg, .tiff, .tif, .nc, .hdf, .h5, .zarr, .kml, .gml]
  biases_to_monitor:
    - Modifiable Areal Unit Problem (MAUP)
    - Edge effects in spatial models
    - Coordinate reference system mismatches across layers
    - Temporal misalignment when joining raster + vector
    - Spatial autocorrelation violating IID assumptions
    - Hidden missingness in remote sensing (cloud cover, sensor gaps)
