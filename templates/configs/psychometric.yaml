# Psychometric / Survey — preset researcher_config.yaml
# Copy to inputs/researcher_config.yaml. Tuned for scale development,
# validation, factor analysis, IRT, and survey-based research.

project_name: "Psychometric Study"
research_question: ""
domain: "psychometric"
hypotheses: []

researcher:
  name: ""
  field: "psychometrics / survey research"
  expertise_level: "intermediate"
  institution: ""
  orcid: ""

interaction:
  autonomy_level: "supervised"

model_profile: "medium"

runtime:
  shared_server: false
  long_running_threshold_seconds: 60
  default_n_for_sampling: 500

research_goal:
  output_types: ["paper"]
  target_venue: "journal"
  reporting_standard: "AERA / APA Standards for Educational and Psychological Testing"
  suggested_methodology: "survey_psychometrics"
  suggested_protocols:
    - "methodology/survey_psychometrics"
    - "guidance/analysis_plan"

writing_preferences:
  citation_style: "apa"
  language: "en-US"

api_keys:
  semantic_scholar: ""
  pubmed: ""
  crossref: ""
  firecrawl: ""
  serpapi: ""

domain_hints:
  expected_columns:
    [respondent_id, item_1, item_2, scale_total, demographic, condition]
  expected_file_extensions: [.csv, .sav, .dta, .xlsx, .parquet, .rds]
  biases_to_monitor:
    - Acquiescence / extreme-response bias
    - Social desirability (esp. self-report sensitive items)
    - Common-method variance when DV + IV from same instrument
    - Differential item functioning (DIF) across subgroups
    - Floor / ceiling effects masking true variance
    - Inadequate factor-retention criteria (parallel analysis preferred)
    - Cross-loadings ignored in CFA reporting
    - Reliability reported only as α when ω or AVE is more appropriate
