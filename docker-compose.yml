version: '3.8'

services:
  research-os:
    build: .
    volumes:
      - ./workspace:/app/workspace
      - ./inputs:/app/inputs
      - ./synthesis:/app/synthesis
    env_file:
      - .env
    # Optional GPU support: uncomment to enable
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  jupyter:
    build: .
    entrypoint: ["jupyter", "lab", "--ip=0.0.0.0", "--allow-root", "--NotebookApp.token=''", "--NotebookApp.password=''"]
    ports:
      - "8888:8888"
    volumes:
      - ./workspace:/app/workspace
      - ./inputs:/app/inputs
      - ./synthesis:/app/synthesis
    env_file:
      - .env
    # Optional GPU support: uncomment to enable
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
