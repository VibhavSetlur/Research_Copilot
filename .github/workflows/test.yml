name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run for the same ref when a new commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast feedback: lint + preflight + unit tests on one Python ─────────
  fast:
    name: Lint + preflight + unit (3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev/all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ scripts/

      - name: Preflight smoke check
        run: python scripts/preflight.py

      - name: Unit tests
        run: pytest tests/unit -v

  # ── Full matrix: integration + tools tests on every supported Python ───
  full:
    name: Integration + tools (Python ${{ matrix.python-version }})
    needs: fast
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev/all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Integration tests
        run: pytest tests/integration -v

      - name: Tools tests
        env:
          # The scratch + tasks tests spawn real subprocesses; they need a
          # writable HOME. Default GitHub-hosted runners are fine, but be
          # explicit.
          HOME: ${{ runner.temp }}
        run: pytest tests/tools -v

  # ── Build sdist + wheel to confirm packaging is healthy ────────────────
  build:
    name: Build sdist + wheel
    needs: fast
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Confirm wheel imports cleanly
        run: |
          python -m venv /tmp/wheel-check
          /tmp/wheel-check/bin/pip install dist/*.whl
          /tmp/wheel-check/bin/python -c "import research_os; print('OK', research_os.__version__)"
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
