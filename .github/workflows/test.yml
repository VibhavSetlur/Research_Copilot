name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,all] || echo "Install fallback"
    - name: Run tests
      run: |
        pytest
    - name: Verify MCP tool docs generation
      run: |
        PYTHONPATH=src python scripts/generate_tool_docs.py
        git diff --exit-code docs/MCP_TOOLS_REFERENCE.md || (echo "Docs out of sync" && exit 1)
