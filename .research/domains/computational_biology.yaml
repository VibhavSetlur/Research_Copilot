domain_id: "computational_biology"
name: "Computational Biology & Bioinformatics"
reporting_standard: "PLOS Computational Biology"
significance_threshold: 0.05
default_effect_size_metric: "log2_fold_change"
preferred_visualizations: ["volcano_plot", "heatmap", "ma_plot", "pathway_diagram", "pca_plot"]
citation_style: "plos"
quality_gates:
  - multiple_testing_correction_benjamini_hochberg
  - batch_effect_detection_and_correction
  - normalization_method_validation
  - sample_quality_metrics
  - reproducibility_across_replicates
confounders_to_check:
  - batch_effects
  - library_preparation_variation
  - sequencing_depth
  - rna_quality_rin_scores
  - gc_content_bias
typical_effect_size_benchmarks:
  differential_expression: "log2FC_greater_than_1_with_adj_p_less_than_0.05"
  pathway_enrichment: "fdr_less_than_0.05"
  classification_accuracy: "auc_greater_than_0.8_for_biomarkers"
outlier_handling: "pca_based_outlier_detection_with_quanorm"
default_method: "deseq2_or_limma_for_differential_analysis"
leaf_nodes:
  - genomics_wgs
primary_tools:
  - GATK4
  - BWA-MEM2
container: "genomics"
file_formats:
  - FASTQ
  - FASTQ_GZ
  - BAM
  - VCF
