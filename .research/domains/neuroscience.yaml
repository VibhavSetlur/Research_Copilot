domain_id: "neuroscience"
name: "Neuroscience & Neuroimaging"
reporting_standard: "APA + SfN (Society for Neuroscience)"
significance_threshold: 0.05
default_effect_size_metric: "cohens_d_and_bold_percent"
preferred_visualizations: ["brain_activation_map", "time_series", "connectivity_matrix", "violin_plot"]
citation_style: "apa"
quality_gates:
  - multiple_comparison_correction_fdr_or_fwe
  - motion_artifact_threshold_check
  - signal_to_noise_ratio_minimum
  - preprocessing_pipeline_validation
  - roi_definition_justification
confounders_to_check:
  - head_motion_parameters
  - physiological_noiseocardiac_respiratory
  - scanner_drift
  - task_order_effects
  - habituation_effects
typical_effect_size_benchmarks:
  bold_activation: "0.5-2% signal change typical"
  structural_differences: "cohens_d_0.4-0.8_for_group_differences"
  connectivity_changes: "r_0.2-0.5_for_task_modulation"
outlier_handling: "motion_based_exclusion_with_sensitivity_analysis"
default_method: "glm_with_mixed_effects_for_fmri"
