domain_id: "political_science"
name: "Political Science"
reporting_standard: "APSR (American Political Science Review)"
significance_threshold: 0.05
default_effect_size_metric: "average_marginal_effect"
preferred_visualizations: ["coefficient_plot", "interaction_plot", "map", "time_series"]
citation_style: "apsr"
quality_gates:
  - endogeneity_assessment
  - robustness_to_model_specification
  - balance_checks_for_experimental_designs
  - placebo_test_for_quasi_experimental
  - clustering_at_appropriate_level
confounders_to_check:
  - selection_bias
  - omitted_variable_bias
  - temporal_autocorrelation
  - spatial_dependence
  - measurement_error_in_independent_variables
typical_effect_size_benchmarks:
  survey_experiments: "ame_5-15_percentage_points"
  electoral_studies: "r_squared_0.1-0.3_typical"
  policy_impact: "ame_2-10_percentage_points"
outlier_handling: "robust_standard_errors_with_cluster_adjustment"
default_method: "ols_with_robust_se_or_logit_probit_for_binary"
