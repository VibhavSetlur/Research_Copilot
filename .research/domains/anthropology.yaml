domain_id: "anthropology"
name: "Anthropology"
reporting_standard: "AAA (American Anthropological Association)"
significance_threshold: 0.05
default_effect_size_metric: "cohens_d_for_quantitative_thematic_for_qualitative"
preferred_visualizations: ["bar_chart", "network_diagram", "map", "timeline"]
citation_style: "aaa"
quality_gates:
  - reflexivity_statement
  - triangulation_of_sources
  - inter_coder_reliability_for_coding
  - ethical_approval_documentation
  - positionality_disclosure
confounders_to_check:
  - researcher_bias
  - sampling_bias_accessibility
  - cultural_translation_issues
  - historical_context_changes
  - power_dynamics_in_data_collection
typical_effect_size_benchmarks:
  ethnographic_studies: "thick_description_over_statistics"
  cross_cultural_comparisons: "cohens_d_0.3-0.6_typical"
  survey_based_anthropology: "cramers_v_0.1-0.3"
outlier_handling: "contextual_analysis_rather_than_exclusion"
default_method: "mixed_methods_with_thematic_analysis"
leaf_nodes: []
primary_tools:
  - statsmodels
container: "general"
file_formats:
  - CSV
  - SAV
  - DTA
