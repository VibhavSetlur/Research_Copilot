domain_id: "public_policy"
name: "Public Policy & Policy Analysis"
reporting_standard: "Policy Brief Format"
significance_threshold: 0.05
default_effect_size_metric: "policy_impact_magnitude"
preferred_visualizations: ["before_after_comparison", "cost_benefit_chart", "map", "time_series"]
citation_style: "apa"
quality_gates:
  - causal_identification_strategy
  - parallel_trends_assessment_for_did
  - placebo_policy_test
  - heterogeneity_by_subgroup
  - external_validity_assessment
confounders_to_check:
  - concurrent_policy_changes
  - secular_trends
  - selection_into_treatment
  - spillover_effects
  - measurement_period_choice
typical_effect_size_benchmarks:
  policy_interventions: "5-20_percent_change_in_outcome"
  program_evaluation: "cohens_d_0.2-0.5_typical"
  cost_effectiveness: "cost_per_outcome_unit_with_ci"
outlier_handling: "winsorization_with_transparency"
default_method: "difference_in_differences_or_regression_discontinuity"
