workflow_id: "full_publication"
name: "Full Publication"
description: "Intake → literature → route → data → analysis → manuscript → audit"

agents:
  - research_init
  - literature_deep
  - methodology_scout
  - method_route
  - data_scaffold
  - execute_analysis
  - replication_validator
  - compile_outputs
  - audit_validate

quality_gates:
  - after: research_init
    gate: "research_init"
    on_fail: "halt — fix failed checks before proceeding"

  - after: literature_deep
    gate: "literature_deep"
    on_fail: "expand literature search or document why minimum not met"

  - after: method_route
    gate: "method_route"
    on_fail: "revise analysis plan — each question needs a valid method"

  - after: data_scaffold
    gate: "data_scaffold"
    on_fail: "fix data pipeline — ensure lineage is recorded"

  - after: execute_analysis
    gate: "execute_analysis"
    on_fail: "complete analysis for all questions before proceeding"

  - after: replication_validator
    gate: "replication_validator"
    on_fail: "fix replication issues before proceeding"

  - after: compile_outputs
    gate: "compile_outputs"
    on_fail: "complete all manuscript sections"

  - after: audit_validate
    gate: "audit_validate"
    on_fail: "remediate audit failures and re-run"

iteration_support:
  enabled: true
  agent: research_iterate
  loop_points:
    - after: literature_deep
      trigger: "literature reveals gap in analysis plan"
      options:
        - literature_compare: "compare findings to new literature"
        - method_switch: "adjust method based on literature"
      after_iteration:
        - "return to method_route with updated plan"
        - "proceed to data_scaffold"

    - after: execute_analysis
      trigger: "user requests investigation, method change, or robustness check"
      options:
        - investigate: "why did we get this result?"
        - method_switch: "try a different method"
        - variable_change: "add/remove variables"
        - robustness: "sensitivity analysis"
        - validate: "double-check finding"
        - literature_compare: "compare to prior work"
        - optimize: "find better approach"
      after_iteration:
        - "return to execute_analysis with new method"
        - "proceed to replication_validator if satisfied"

    - after: audit_validate
      trigger: "audit reveals issue needing investigation"
      options:
        - validate: "fix and re-validate"
        - investigate: "dig into audit finding"
      after_iteration:
        - "return to audit_validate"
        - "proceed if resolved"

branching:
  - after: research_init
    if: "feasibility == stop"
    then: "halt — see follow_up_questions.md"

  - after: research_init
    if: "feasibility == caution"
    then: "proceed — review follow_up_questions.md"

  - after: execute_analysis
    if: "primary_finding == not_supported"
    then: "report null finding honestly"

  - after: execute_analysis
    if: "user requests iteration"
    then: "run research_iterate → return to execute_analysis or compile_outputs"

  - after: audit_validate
    if: "verdict == FAIL"
    then: "remediate and re-run audit"

feedback:
  - from: execute_analysis
    to: method_route
    when: "assumption violation not in analysis plan"

  - from: audit_validate
    to: compile_outputs
    when: "reporting incomplete"

notes:
  - "Use research_iterate at any point to explore, pivot, or investigate."
  - "All iterations are documented in docs/iterations/ — never deleted."
  - "Null findings are reported with the same detail as significant results."
  - "Quality gates are checked between every phase — run 'research validate <phase>'"
  - "Data lineage is recorded in docs/data_lineage.json — required for reproducibility"

---

## Lifecycle Hook Integration

The hook system intercepts pipeline execution at 5 stages. Each hook triggers specific interceptors that modify or validate state.

| Hook Event | Trigger Point | Active Interceptors | What Happens |
|-----------|--------------|-------------------|-------------|
| `pre_routing` | User submits query to CLI or agent starts | `semantic_skill_router` | Scans task against skill index. Loads only 2-4 relevant skills into `state["loaded_skills"]`. Suppresses remaining 88+ unused skills. |
| `pre_execution` | Prompt payload packaged for LLM | `apply_token_budget_throttle`<br>`check_cache_before_execution` | 1. Checks token budget. At 60%: summarize phases. At 80%: flush non-essential. At 90%: force split.<br>2. Queries `research_cache.db`. On cache hit: returns cached result, skips execution. |
| `post_execution` | LLM returns text or script payload | `evaluate_code_sandbox`<br>`run_critic_review` | 1. Validates generated Python syntax via `ast.parse`. On failure: sets `execution_failure=True`.<br>2. For critical phases: triggers critic agent, writes brief to `reports/audit/critic_report_<phase>.json`. |
| `pre_ledger_commit` | Output passes validation, before state save | `enforce_pydantic_gatekeeper`<br>`check_approval_gate` | 1. Validates output against Pydantic schema for the active task. On failure: `rollback_triggered=True`.<br>2. For target phases (method_route, execute_analysis, compile_outputs, audit_validate): creates approval gate, blocks until human approves. |
| `on_failure` | Unresolvable script error or structural failure | `freeze_state_on_failure` | Freezes current state. Serializes to JSON snapshot in `docs/dead_ends/`. Records recovery point for `research resume --from <phase>`. |

### Usage from AI Agents

```python
from hooks import hook_engine
import interceptors  # registers all interceptors on import

# Before starting any task — load only relevant skills
state = hook_engine.trigger_sync("pre_routing", state, task="regression analysis")

# Before executing — check budget and cache
state = hook_engine.trigger_sync("pre_execution", state, operation="mean", data_hash="abc123")
if state.get("skip_execution"):
    result = state["cached_result"]  # Use cached value, skip computation

# After generating code — validate syntax
state = hook_engine.trigger_sync("post_execution", state, generated_code=code)
if not state.get("syntax_valid"):
    fix_code(state["syntax_error"])  # Auto-fix before running

# Before saving state — validate schema + check approval
state = hook_engine.trigger_sync("pre_ledger_commit", state, action="complete_phase", phase="execute_analysis")
if state.get("approval_status") == "pending":
    wait_for_human_approval()  # CLI or dashboard handles the wait
if state.get("rollback_triggered"):
    fix_schema_error(state["validation_error"])  # Fix and retry

# On any failure — freeze state for recovery
state = hook_engine.trigger_sync("on_failure", state, error=str(e))
print(f"Recovery point: {state['recovery_point']}")  # Use with research resume
```
