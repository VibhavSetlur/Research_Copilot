project_id: "research-copilot"
schema_version: "8.0.0"

default_workflow: "quick_exploratory"

# Multi-agent LLM delegation
multi_agent:
  enabled: false
  models_config: ".research/models.yaml"
  cost_tracking: true
  budget_warning_pct: 0.80
  budget_hard_limit_usd: 50.00

# Input paths (user-provided, never modified by AI)
intake_path: "inputs/intake.md"
data_raw: "inputs/data/raw"
context_dir: "inputs/context"
papers_dir: "inputs/papers"

# CLI cache (internal working files, stored in .research/)
cache_dir: ".research/cache"
cache_research_map: ".research/cache/research_map.json"
cache_followups: ".research/cache/follow_up_questions.md"
cache_scan_result: ".research/cache/scan_result.json"

# Documentation paths (created by AI during init)
docs_dir: "docs"
research_log: "docs/research_log.md"
methodology: "docs/methodology.md"
changelog: "docs/changelog.md"
manifest: "docs/manifest.json"
data_lineage: "docs/data_lineage.json"
iterations_dir: "docs/iterations"
decisions_dir: "docs/decisions"
dead_ends_dir: "docs/dead_ends"
quality_gates_dir: "docs/quality_gates"

# Report paths (created by AI during init)
reports_dir: "reports"
reports_baseline: "reports/baseline"
reports_literature: "reports/literature"
reports_analysis: "reports/analysis"
reports_figures: "reports/figures"
reports_tables: "reports/tables"
reports_dashboards: "reports/dashboards"
reports_manuscript: "reports/manuscript"
reports_audit: "reports/audit"
reports_summary: "reports/summary"

# Data pipeline paths (created by AI during init)
data_dir: "data"
data_ingested: "data/01_ingested"
data_processed: "data/02_processed"
data_analytical: "data/03_analytical"

# Script paths (system scripts in .research/, user scripts in scripts/)
scripts_dir: "scripts"
system_scripts: ".research/scripts"
system_scripts_utils: ".research/scripts/utils"

# File paths (where AI writes final outputs)
research_map: "reports/baseline/research_map.json"
follow_up_questions: "reports/baseline/follow_up_questions.md"
literature_corpus: "reports/literature/literature_corpus.json"
evidence_matrix: "reports/literature/evidence_matrix.md"
gap_analysis: "reports/literature/gap_analysis.md"
prisma_flow: "reports/literature/prisma_flow.json"
bibliography: "reports/literature/bibliography.bib"
preregistration_dir: "reports/literature"
analysis_plan: "reports/analysis/analysis_plan.md"
full_audit: "reports/audit/full_audit_report.md"
manuscript_findings: "reports/manuscript/research_findings.md"
key_findings: "reports/summary/key_findings.md"
executive_summary: "reports/summary/executive_summary.md"
layman_summary: "reports/summary/layman_summary.md"
reviewer2_critique: "reports/audit/reviewer2_critique.md"
dag_viewer: "reports/dashboards/dag_viewer.html"

# Iteration tracking
iteration_registry: "docs/iterations/registry.json"

# Workflow
dag_json: ".research/workflow_dag.json"
dag_mermaid: ".research/workflow_dag.mermaid"

# Thresholds
literature_min_papers: 10
literature_recursion_depth: 2
power_adequate: 0.80
power_minimum: 0.50
missingness_warning: 0.20
sensitivity_tests_min: 3

# Reproducibility
requirements_file: "environment/requirements.txt"
environment_check_script: ".research/scripts/00_environment_check.py"
pin_dependency_versions: true

# Quality gates
quality_gates_enabled: true
gate_fail_blocks_pipeline: true

# State ledger & checkpoint system
state_ledger: ".research/cache/state.json"
checkpoint_dir: ".research/cache/checkpoints"
core_dir: ".research/core"
token_budget_limit: 200000

# Data scale thresholds (file size classification for library selection)
data_scale_thresholds:
  medium_mb: 100      # Files >= 100MB: polars recommended
  large_gb: 1         # Files >= 1GB: polars lazy frames REQUIRED
  massive_gb: 10      # Files >= 10GB: pyarrow + chunked processing REQUIRED

# Multi-language execution
execution:
  supported_runtimes: [python, r, bash, nextflow, snakemake, julia]
  container_engine: "docker"
  container_fallback: "conda"
  executor_log: ".research/cache/execution_log.jsonl"

# Domain registries
registries:
  domain_registry: ".research/domains/domain_registry.json"
  tool_registry: ".research/domains/tool_registry.json"
  assumption_registry: ".research/domains/assumption_registry.json"

# Container configuration
containers:
  base_image: "research-copilot-base:latest"
  domain_images_dir: "environment/domains"
  shared_volumes:
    - "inputs"
    - "data"
    - "scripts"
    - "reports"
  cache_dir: ".research/cache/containers"

# Literature integration
literature:
  zotero:
    enabled: false
    api_key_env: "ZOTERO_API_KEY"
    user_id_env: "ZOTERO_USER_ID"
    collection_key: ""
  semantic_scholar:
    enabled: true
    api_key_env: "SEMANTIC_SCHOLAR_API_KEY"
    rate_limit_per_5min: 100

# Cloud/HPC execution
cloud_hpc:
  enabled: false
  supported_platforms: ["snowflake", "bigquery", "redshift", "emr", "dataproc", "slurm"]
  snowflake:
    account_env: "SNOWFLAKE_ACCOUNT"
    user_env: "SNOWFLAKE_USER"
    password_env: "SNOWFLAKE_PASSWORD"
  bigquery:
    project_env: "GOOGLE_CLOUD_PROJECT"
    credentials_env: "GOOGLE_APPLICATION_CREDENTIALS"
  slurm:
    default_partition: "compute"
    default_time: "24:00:00"
    default_mem: "64G"

# Dependency management
dependency_management:
  auto_detect: true
  preferred_installer: "uv"
  fallback_installer: "pip"
  requirements_file: "environment/requirements.txt"
