# Research Copilot — Project Configuration
# Schema version: 9.0.0
# This file is created by `rcp init` and customized per project.

project_id: "research-copilot"
schema_version: "9.0.0"

# Default workflow: quick_exploratory | full_publication | systematic_review | causal_investigation | predictive_modeling
default_workflow: "quick_exploratory"

# Intent routing (token optimization)
intent_routing:
  enabled: true
  auto_classify: true
  default_depth: "academic"
  allowed_depths: ["exploratory", "academic", "publication"]
  null_space_optimization: true

# Branching engine
branching:
  enabled: true
  auto_scaffold: true

# Knowledge graph
knowledge_graph:
  enabled: true
  auto_extract_triplets: true

# Semantic file system
semantic_filesystem:
  enabled: true
  enforce_on_generation: true

# Interpretative coupling
interpretative_coupling:
  enabled: true
  auto_generate: true

# Data scale thresholds
data_scale_thresholds:
  medium_mb: 100
  large_gb: 1
  massive_gb: 10

# Execution
execution:
  supported_runtimes: [python, r, bash]
  container_engine: "docker"

# Dependency management
dependency_management:
  auto_detect: true
  preferred_installer: "uv"
  fallback_installer: "pip"
  requirements_file: "environment/requirements.txt"

# Quality gates
quality_gates_enabled: true
gate_fail_blocks_pipeline: true

# Reproducibility
pin_dependency_versions: true
