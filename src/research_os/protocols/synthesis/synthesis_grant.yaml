id: synthesis_grant
name: Synthesis — Grant Proposal (funder-tailored)
version: '1.0.0'
schema_version: '2.0'
description: Draft a grant proposal narrative tuned to the target funder (NIH / NSF / Wellcome / ERC / DoE / DARPA / industry).
trigger: Researcher asks "draft a grant" / "write the R01" / "Specific Aims page"; OR `research_goal.output_types` includes "grant".

quality_bar:
  specific_aims_words_max: 500          # one page
  significance_words_minimum: 400
  innovation_words_minimum: 300
  approach_words_minimum: 1500
  preliminary_data_required: true       # link to workspace experiments
  rigour_and_reproducibility_section: true
  citations_minimum: 15
  citations_maximum: 60
  every_aim_has_milestones: true
  every_aim_has_pitfalls_and_alternatives: true

funder_profile:
  nih_r01:
    sections: [Specific_Aims, Research_Strategy_Significance, Research_Strategy_Innovation, Research_Strategy_Approach, Bibliography, Rigour_and_Reproducibility]
    page_limit:
      specific_aims: 1
      research_strategy: 12
    citation_style: vancouver
    notes: |
      NIH R01. 12-page Research Strategy + 1-page Specific Aims. Sex as a
      biological variable section in Approach. Authentication of key resources.
  nsf:
    sections: [Project_Summary, Project_Description_Intellectual_Merit, Project_Description_Broader_Impacts, Research_Plan, References_Cited]
    page_limit:
      project_summary: 1
      project_description: 15
    citation_style: acm
    notes: |
      NSF. 15-page Project Description; 1-page Project Summary with separate
      Intellectual Merit and Broader Impacts paragraphs.
  wellcome:
    sections: [Vision, Approach, Research_Environment, Impact, References]
    page_limit:
      vision: 1
      approach: 8
    citation_style: vancouver
    notes: |
      Wellcome Discovery / Investigator. Emphasises Vision + Impact equally
      with Approach. Less prescriptive on format than NIH.
  erc:
    sections: [Extended_Synopsis, State_of_the_Art, Methodology, Project_Team]
    page_limit:
      extended_synopsis: 5
      part_b2: 15
    citation_style: nature
    notes: |
      European Research Council (Starting / Consolidator / Advanced).
      B1 + B2 structure, "high-risk / high-gain" framing required.
  doe:
    sections: [Project_Narrative_Background, Project_Narrative_Approach, Project_Narrative_Timeline, References]
    page_limit:
      project_narrative: 12
    citation_style: ieee
    notes: |
      U.S. Department of Energy. Explicit timeline + deliverables for each task.
  industry:
    sections: [Executive_Summary, Problem, Solution, Validation, Roadmap, Team, Budget]
    page_limit:
      total: 8
    citation_style: apa
    notes: |
      Industry / philanthropic. Business framing, less academic, ROI focus.

steps:
  - id: select_funder
    name: Select Funder Profile
    description: |
      Ask: "Funder? nih_r01 | nsf | wellcome | erc | doe | industry"
      Read research_goal.target_venue if it matches one of these.

  - id: aims_first
    name: Draft Specific Aims First (always)
    description: |
      The Specific Aims (or equivalent ≤1 page summary) is the most important
      page. Write it BEFORE any other section.
      Structure for nih_r01 / nsf:
        - Opening paragraph: problem + significance.
        - Long-term goal sentence.
        - Central hypothesis (singular, testable).
        - Rationale.
        - 2-3 Aims, each with: title + hypothesis + 1-3 sub-aims + expected outcome.
        - Closing: impact paragraph.
      Word count ≤ specific_aims_words_max. Cite ≤5 high-impact references.

  - id: gather_preliminary_data
    name: Gather Preliminary Data from workspace
    description: |
      For every completed experiment in workspace/ that supports an Aim:
        sys_file_read conclusions.md + outputs/reports/*.md
      Note headline findings. These become "Preliminary Studies" in NIH or
      embedded results in NSF / Wellcome.

  - id: ground_in_literature
    name: Ground Background + Significance
    description: |
      For each Aim, call tool_research_method (deep) and pull verified
      citations via the synthesis citations module. Cap at 60 total across
      the whole proposal.

  - id: draft_each_section
    name: Draft Each Funder Section
    description: |
      Loop over funder_profile.sections. For each, call
      tool_synthesize section="<name>" output_type="grant".
      Apply the section-specific word minimum (significance / innovation /
      approach all have minimums in quality_bar).

      For Approach (or equivalent):
        - For each Aim, write: Premise + Rationale + Experimental Design +
          Expected Outcomes + Potential Pitfalls + Alternative Approaches.
        - Include preliminary data figures (copy from workspace experiments).
        - Include a timeline (Gantt-style or year-by-year bullets).

  - id: rigour_and_reproducibility
    name: Add Rigour & Reproducibility Section
    description: |
      Required (especially NIH). Cover:
        - Scientific Premise (cite the prior work; identify weaknesses).
        - Scientific Rigour (statistical plan, sample size justification,
          blinding/randomisation if applicable — pull from
          docs/research_design.md).
        - Biological Variables (sex, age, ancestry — when relevant).
        - Authentication of Key Resources (cell lines, antibodies, reagents).

  - id: assemble_bibliography
    name: Assemble Bibliography (verified)
    description: |
      tool_synthesize output_type="grant"
      Writes synthesis/grant.md + synthesis/grant_references.bib.
      tool_citations_verify — ensure ZERO unverified entries (funders DO check).

  - id: audit
    name: Final Audit
    description: |
      tool_audit_synthesis paper_path="synthesis/grant.md"
      Check: every Aim mentioned in Summary appears in Approach; every claim
      has a citation; no banned phrases; word counts within limits.

expected_outputs:
  - synthesis/grant.md
  - synthesis/grant_references.bib

next_protocol: null
on_failure: guidance/dead_end_routing
