id: synthesis_null_findings
name: Synthesis — Null findings & inconclusive results
version: '1.0.0'
schema_version: '2.0'
description: |
  Assemble a publishable companion document for findings that DIDN'T
  pan out: refuted hypotheses, underpowered tests, abandoned
  experimental paths. Null results are first-class scientific
  outputs — the file-drawer problem distorts literature, and a
  preregistered project that publishes its non-confirmations
  contributes more credibility than one that only publishes
  positives.

  This protocol is opt-in but strongly recommended whenever the
  project's hypothesis tracker carries any `refuted` or
  `inconclusive` entries, or when `tool_audit_power` flagged tests
  as underpowered.

trigger: |
  Researcher asks "what didn't work" / "write up the null result" /
  "document the dead ends". Also auto-suggested when the dashboard
  surfaces refuted hypotheses + the synthesis paper is being assembled.

prerequisites:
  - At least one hypothesis with status `refuted` or `inconclusive`,
    OR at least one __DEAD_END path, OR at least one underpowered
    test in workspace/<step>/outputs/reports/power_report.md.

editorial_voice:
  mode: hybrid
  rules:
    - "Distinguish 'no evidence of an effect' (honest, underpowered)
       from 'evidence of no effect' (rare, requires equivalence
       testing or a small-enough confidence interval to rule out
       meaningful effects)."
    - "Lead with study power. A null finding in an underpowered
       study has different implications than one in a pre-registered,
       adequately powered study."
    - "Cite the pre-registration prominently when it exists — it
       earns the credibility a null result needs."
    - "Avoid hedging language ('failed to find', 'unable to detect')
       in favour of factual framing ('observed effect was X, 95% CI
       [L, U] — within the equivalence margin / spanning the null')."

steps:
  - id: inventory
    name: Inventory what didn't pan out
    description: |
      Walk three sources of "didn't pan out":
        1. Hypothesis tracker — every status `refuted` or `inconclusive`.
        2. Step power reports — any computed power < 0.80.
        3. Dead-end paths — every `workspace/<id>__DEAD_END/` folder.

      The tool `tool_null_findings_report` does this walk automatically
      and produces `synthesis/null_findings.md` as the starting
      draft; refine the prose from there.

  - id: classify_each_null
    name: Classify each null result honestly
    description: |
      For every refuted or inconclusive hypothesis, decide which kind
      of null it is:

        - **Underpowered null** — the study didn't have enough
          observations to detect a plausible effect. Report the
          minimum detectable effect (MDE) at the achieved n and
          frame as "no evidence of an effect ≥ X."
        - **Adequately powered null** — the observed effect was small
          AND the CI is narrow enough to rule out practically
          meaningful effects. Frame as "evidence consistent with no
          effect / a small effect."
        - **Specification-fragile null** — the result depends on the
          analytic choices made. Consider running a sensitivity grid
          (`tool_sensitivity_run`) before concluding; specification
          curves are the standard companion plot here.
        - **Dead-end** — methodological / data quality reason the
          test couldn't run as planned. Document the reason
          transparently.

      The classification drives the framing in the writeup.

  - id: write_honest_framing
    name: Write the honest framing
    description: |
      For each null, the writeup should answer four questions:

        1. What was the pre-registered hypothesis?
        2. What was the observed effect (with 95% CI)?
        3. What CAN and CANNOT be concluded from this result?
        4. What follow-up would resolve the ambiguity?

      Avoid the "we did not find" phrasing in isolation — pair it
      with the precision of the estimate and the power achieved.

  - id: link_preregistration
    name: Link the pre-registration prominently
    description: |
      If the project carries a frozen SAP
      (`workspace/.preregistration/prereg_*.yaml`), the null
      findings document should reference it at the top — the
      pre-registration is what makes a null finding credible.
      Include the OSF / AsPredicted URL if the SAP was registered
      externally.

  - id: figure_companion
    name: Add a specification curve when appropriate
    description: |
      For each "specification-fragile" classification, the
      strongest companion figure is a specification curve
      (`tool_sensitivity_run`'s output). It shows reviewers exactly
      how robust (or not) the null is to the analytic choices.

      For adequately powered nulls, an equivalence-test forest plot
      or a posterior-distribution figure (Bayesian) is often the
      strongest visual companion.

  - id: choose_venue
    name: Choose a publication venue
    description: |
      Several venues actively welcome null results:
        - PLOS ONE
        - BMC Research Notes
        - F1000Research
        - Royal Society Open Science
        - The All Results Journals
        - Registered Reports tracks at Cortex, Nature, eLife, PLOS
          Biology, and 300+ other journals.
      Pre-registered nulls usually fit best at Registered Report
      tracks (Stage 2 acceptance is contingent only on methods,
      not on result direction).

expected_outputs:
  - synthesis/null_findings.md

next_protocol: synthesis/synthesis_paper
on_failure: guidance/dead_end_routing
