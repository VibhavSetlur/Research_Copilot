id: synthesis_poster
name: Synthesis — Poster (audience-tailored)
version: '5.0.0'
schema_version: '2.0'
description: Generate a poster (LaTeX → PDF) sized and styled for the target audience.
trigger: Researcher asks for "a poster"; OR `research_goal.output_types` includes "poster".

quality_bar:
  figures_minimum: 2
  figures_maximum: 6
  citations_maximum: 6
  font_size_minimum_pt: 24              # readable from 1.5 m
  figure_dpi_minimum: 300
  whitespace_target_percent: 35         # avoid wall-of-text posters
  one_headline_message: true            # the visitor must grok the point in 10 seconds

audience_profile:
  academic_conference:
    template: tikzposter
    dimensions: "36x48"                 # inches portrait
    blocks: [Background, Methods, Results, Conclusions, References]
    headline_font_pt: 60
    notes: |
      Default. Standard academic poster. Lots of figures, dense data, methods block.
  symposium:
    template: tikzposter
    dimensions: "36x48"
    blocks: [Hypothesis, Approach, Results, Significance]
    headline_font_pt: 72
    notes: |
      Smaller venue, often student/lab symposia. Big "so-what" framing.
  industry:
    template: tikzposter
    dimensions: "48x36"                 # landscape
    blocks: [Problem, Solution, Impact, Validation, Contact]
    headline_font_pt: 80
    notes: |
      For booths / trade shows. Larger headline, fewer technical details,
      explicit Impact section + Contact block at bottom right.
  teaching:
    template: tikzposter
    dimensions: "36x48"
    blocks: [Question, Big_Idea, Activity, Takeaway]
    headline_font_pt: 84
    notes: |
      Classroom display. Big plain-language ideas, minimal jargon.

steps:
  - id: select_audience
    name: Select Audience Profile
    description: |
      Ask the researcher: "Audience? academic_conference (default) | symposium |
      industry | teaching." Read research_goal.poster_dimensions if set
      (override the default dims).

  - id: curate_headline_figures
    name: Curate 2-4 Headline Figures
    description: |
      sys_file_list directory="workspace" — find every outputs/figures/*.png.
      Pick the 2-4 BEST: clearest message, highest DPI, most surprising result.
      Run tool_audit_figure on each candidate. Replace any with DPI < figure_dpi_minimum.
      If you don't have 2 publication-grade figures, STOP and tell the researcher:
        "Need at least 2 ≥300 DPI figures before I can build the poster."

  - id: draft_block_text
    name: Draft Text for Each Block
    description: |
      For each block in audience.blocks, write 2-4 sentences MAX. No wall of
      text. Use bullet points for Methods + Results.
      Cite ≤6 references total (verified via tool_citations_verify).

  - id: build_poster
    name: Build Poster
    description: |
      tool_poster_create — generates synthesis/poster.tex (tikzposter) and
      compiles to synthesis/poster.pdf (if pdflatex is available).
      The generator pulls in the curated figures + your block text.

  - id: quality_audit
    name: Quality Audit
    description: |
      Open the PDF (or have the researcher open it). Verify:
        - Headline visible from 1.5 m (use ≥60pt for academic, ≥80pt for industry).
        - ≤6 citations.
        - One headline message dominates.
        - Whitespace looks reasonable (~30-40%, not packed).
      Iterate if any check fails.

expected_outputs:
  - synthesis/poster.tex
  - synthesis/poster.pdf

next_protocol: null
on_failure: null
