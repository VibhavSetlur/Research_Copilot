id: synthesis_poster
name: Synthesis — Poster
version: '4.0.0'
schema_version: '2.0'
description: Generate a conference-style poster (LaTeX → PDF) summarising the project.
trigger: output_types includes "poster", or researcher asks for a poster.

steps:
  - id: ensure_figures
    name: Ensure 2-4 Headline Figures Exist
    description: |
      sys_file_list directory="workspace" looking for outputs/figures/*.png.
      The poster will pick the first few — make sure they are the BEST ones
      (highest DPI, clearest message). If the headline figure isn't ready, run
      tool_audit_figure on candidates and pick winners.

  - id: generate
    name: Generate Poster
    description: |
      tool_poster_create — produces synthesis/poster.tex and synthesis/poster.pdf
      (if pdflatex is available). The poster contains: title, background, methods,
      headline figures, conclusions.

  - id: refine
    name: Refine in-place if Needed
    description: |
      Open synthesis/poster.tex via sys_file_read. Adjust block contents (title,
      bullet text) using sys_file_write force=true. If LaTeX is rebuilt manually,
      re-run tool_latex_compile via the synthesis path is not required for poster.

expected_outputs:
  - synthesis/poster.tex

next_protocol: null
on_failure: null
