id: synthesis_dashboard
name: Synthesis — Dashboard
version: '4.0.0'
schema_version: '2.0'
description: Generate a standalone HTML dashboard summarising all experiments, figures, conclusions, and citations.
trigger: output_types includes "dashboard", or the researcher asks for an interactive overview.

steps:
  - id: gather
    name: Confirm Sources Exist
    description: |
      sys_path_list — verify at least one experiment has outputs/figures/ or
      outputs/reports/. If nothing exists yet, dashboard will be largely empty
      (warn the researcher).

  - id: build
    name: Build Dashboard
    description: |
      tool_dashboard_create title="<short title>"
      Produces synthesis/dashboard.html plus a synthesis/figures/<step>/ tree
      of copied figures. Single file — opens directly in any browser.

  - id: share
    name: Tell the Researcher Where to Find It
    description: |
      Report the absolute path so the researcher can open it. If running in a
      remote workspace (SSH / container), advise download or port forward.

expected_outputs:
  - synthesis/dashboard.html

next_protocol: null
on_failure: null
