name: synthesis_dashboard
version: 1.0.0
description: Generate an interactive dashboard from experiment outputs.
always_include: []
trigger: When output_types includes 'dashboard'.
tool: tool.dashboard.create
sources:
- workspace/*/outputs/figures/
- workspace/*/outputs/tables/
steps:
- id: gather_data
  name: Gather Data
  description: Collect figures and tables from all completed experiment steps.
- id: create_dashboard
  name: Create Dashboard
  description: Call tool.dashboard.create to generate an interactive HTML dashboard.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''synthesis_dashboard completed''.

    5. Ask researcher: ''I''ve completed synthesis_dashboard. Want me to proceed to
    the next protocol?'''
schema_version: '1.0'
