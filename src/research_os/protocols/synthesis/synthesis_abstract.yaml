name: synthesis_abstract
version: 1.0.0
description: Generate a standalone structured abstract (250 words).
always_include:
- writing_core
trigger: When output_types includes 'abstract' but not a full paper.
sources:
- synthesis/methods.md
- synthesis/results.md
- synthesis/discussion.md (if exists)
template:
  background: 1‑2 sentences on research gap.
  methods: 2‑3 sentences on design, sample, analysis.
  results: 2‑3 sentences with key numbers and confidence interval.
  conclusion: 1‑2 sentences on implications.
  word_limit: 250
steps:
- id: gather_sources
  name: Gather Sources
  description: Read the required source files.
- id: draft_abstract
  name: Draft Abstract
  description: Write the abstract following the template.
- id: apply_writing_core
  name: Apply Writing Core
  description: Check for banned phrases, causal language, number formatting.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='synthesis_abstract
    completed'.\n5. Ask researcher: 'I've completed synthesis_abstract. Want me to
    proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new
    tools/libraries have been snapshotted to the step's environment file.\n    - GROUNDING
    CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
schema_version: '1.0'
