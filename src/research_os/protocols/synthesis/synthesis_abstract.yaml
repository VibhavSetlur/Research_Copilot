id: synthesis_abstract
name: Synthesis — Abstract
version: '4.0.0'
schema_version: '2.0'
description: Generate a structured ~250-word abstract.
trigger: After the main results/discussion are drafted, or whenever output_types includes "abstract".

steps:
  - id: gather
    name: Gather Sources
    description: |
      Read synthesis/methods.md, synthesis/results.md, synthesis/discussion.md
      (if present) via sys_file_read. Optionally also workspace/methods.md and
      the latest conclusions.md if synthesis sections aren't drafted yet.

  - id: draft
    name: Draft Abstract — Structured
    description: |
      Follow the structure (~250 words total, ~50/section):
        ## Background     1-2 sentences on the gap or motivation.
        ## Methods        Design, sample/dataset, primary analysis.
        ## Results        2-3 sentences with quantitative findings + CIs.
        ## Conclusion     Implications + key limitation.
      Save via sys_file_write to synthesis/abstract.md.

  - id: validate
    name: Validate Against Writing Standards
    description: |
      sys_file_validate_md filepath="synthesis/abstract.md" protocol_name="writing_core"
      Apply fixes: no banned phrases, exact p-value formatting, no causal
      over-reach unless the design supports it.

expected_outputs:
  - synthesis/abstract.md

next_protocol: null
on_failure: null
