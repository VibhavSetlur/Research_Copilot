name: synthesis_paper
version: 1.0.0
description: "Guide to building synthesis/paper.md section-by-section. Produces the final IMRAD academic paper."
always_include: ["writing_core"]
schema_version: "1.0"
trigger: "When the final task is to synthesize all research outputs into a paper."

section_order:
  1: "Methods"
  2: "Results"
  3: "Discussion"
  4: "Abstract"
  5: "Final Assembly"

tool_calls: "Use tool.synthesize with section parameter (e.g. section='methods'). Call without section for final assembly."

small_model_workflow: "Treat EACH synthesis section as a separate chat session to avoid context bloat. Wait for user approval before moving to the next section. Use sys.session.handoff."

sources:
  - "workspace/methods.md"
  - "workspace/analysis.md"
  - "workspace/citations.md"
  - "workspace/*/conclusions.md"
  - "workspace/*/outputs/figures/*"

review_prompts:
  methods: "Does the methods section provide enough detail for an independent researcher to replicate the study? Are all software versions and statistical tests documented?"
  results: "Are all p-values and confidence intervals included? Are references to figures correct?"
  discussion: "Does the discussion directly answer the research question without overstating the findings?"

steps:
  - id: draft_methods
    name: "Draft Methods Section"
    description: "Synthesize workspace/methods.md into the formal Methods section. Apply the methods review prompt."
  
  - id: draft_results
    name: "Draft Results Section"
    description: "Synthesize analysis.md, conclusions.md, and figures into the Results section. Apply the results review prompt."
    
  - id: draft_discussion
    name: "Draft Discussion Section"
    description: "Write the Discussion section based on the Results. Apply the discussion review prompt."
    
  - id: draft_abstract
    name: "Draft Abstract"
    description: "Summarize the entire paper into a 250-word abstract following writing_core."
    
  - id: final_assembly
    name: "Final Assembly"
    description: "Combine all sections into synthesis/paper.md. Call tool.audit.synthesis for final checks."
