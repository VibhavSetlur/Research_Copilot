id: synthesis_paper
name: Synthesis — Paper (IMRAD)
version: '4.0.0'
schema_version: '2.0'
description: Compile the final IMRAD paper into synthesis/paper.md (and optionally synthesis/paper.tex → PDF).
trigger: After audit_and_validation passes. Final pipeline step.
prerequisites:
  - workspace/logs/audit_report.md exists with no BLOCKER lines
  - At least one experiment step has a non-empty conclusions.md
  - workspace/methods.md, workspace/citations.md exist

steps:
  - id: plan_sections
    name: Plan the Synthesis
    description: |
      tool_synthesize_plan — returns the available sources and recommended order
      (methods → results → discussion → abstract → final). Read it. Discuss the
      structure with the researcher in autopilot/supervised mode if it deviates
      from the default.

  - id: draft_methods
    name: Draft Methods Section
    description: |
      tool_synthesize section="methods"
      Reads workspace/methods.md verbatim into synthesis/methods.md.
      Review: does it provide enough detail that an independent researcher could
      replicate the study? Tools + versions + parameters + datasets + seeds.

  - id: draft_results
    name: Draft Results Section
    description: |
      tool_synthesize section="results"
      Aggregates workspace/*/conclusions.md and outputs/reports/*.md.
      Review: every p-value with 3 decimals (or <0.001), every CI explicit,
      every figure referenced by its path.

  - id: draft_discussion
    name: Draft Discussion Section
    description: |
      tool_synthesize section="discussion"
      Combines conclusions + citations + evidence_table (if present).
      Review: directly answers the research question without overstating.

  - id: draft_abstract
    name: Draft Abstract
    description: |
      load synthesis/synthesis_abstract protocol and follow it (~250 words,
      structured: background / methods / results / conclusion).

  - id: final_assembly
    name: Final Assembly
    description: |
      tool_synthesize     # no section → assembles full paper.md + figures
      Then tool_audit_synthesis paper_path="synthesis/paper.md".
      Read the audit, fix any BLOCKER warnings, re-assemble. If output_format
      requires LaTeX/PDF: call tool_latex_compile.

expected_outputs:
  - synthesis/paper.md
  - synthesis/methods.md
  - synthesis/results.md
  - synthesis/discussion.md
  - synthesis/abstract.md

next_protocol: null
on_failure: guidance/dead_end_routing
