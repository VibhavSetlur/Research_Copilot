name: figure_guidelines
version: 1.0.0
description: Guidelines for creating publication-ready figures.
schema_version: "1.0"
guidelines:
  - id: resolution
    name: "Resolution"
    description: "All figures must be at least 300 DPI."
  - id: colors
    name: "Color Palette"
    description: "Use colorblind-friendly palettes (e.g., viridis)."
  - id: labels
    name: "Labels"
    description: "Ensure all axes and legends are clearly labeled."
