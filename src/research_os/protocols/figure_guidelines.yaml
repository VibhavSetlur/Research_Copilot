name: figure_guidelines
version: 2.0.0
description: Guidelines for selecting and formatting publication-ready figures.
schema_version: "1.0"
expected_outputs:
  - "workspace/03_synthesis/figures/: Generated figures matching guidelines"
  - "workspace/logs/figures.log"
chart_chooser:
  comparison:
    over_time: "Line Chart"
    categories: "Bar Chart (Horizontal if many categories)"
  relationship:
    two_continuous: "Scatter Plot"
    three_continuous: "Bubble Chart"
  distribution:
    single_variable: "Histogram / Density Plot"
    multiple_variables: "Box Plot / Violin Plot"
  meta_analysis:
    effect_sizes: "Forest Plot"
    publication_bias: "Funnel Plot"
formatting:
  color_blind_palettes:
    viridis: ["#440154", "#31688E", "#35B779", "#FDE725"]
    okabe_ito: ["#E69F00", "#56B4E9", "#009E73", "#F0E442", "#0072B2", "#D55E00", "#CC79A7"]
  typography:
    min_font_size: "8pt (for publication)"
    title_font_size: "10pt"
  layouts:
    forest_plot: "Ensure lines for 95% CI are distinct, align study names left, align OR/RR values right."
    funnel_plot: "Symmetrical pseudo-95% confidence limits must be drawn as dashed lines."
steps:
  - id: select_chart
    name: "Select Chart Type"
    description: "Use the chart chooser decision tree."
  - id: apply_formatting
    name: "Apply Formatting"
    description: "Ensure color-blind friendly palettes and minimum font sizes are used."
