name: writing_standards
version: 1.0.0
description: Academic writing standards for publication-ready outputs.
schema_version: "1.0"
guidelines:
  - id: tone
    name: "Tone and Voice"
    description: "Maintain an objective, formal academic tone. Avoid passive voice where possible."
  - id: structure
    name: "IMRAD Structure"
    description: "Follow Introduction, Methods, Results, and Discussion structure."
  - id: citations
    name: "Citation Format"
    description: "Use consistent APA style for all citations unless otherwise specified."
