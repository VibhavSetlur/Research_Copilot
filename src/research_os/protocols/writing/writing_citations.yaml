name: writing_citations
version: 1.0.0
description: How to format and manage citations in workspace/citations.md.
always_include:
- writing_core
citation_entry_template:
  format: "### [{citation_key}]\n- **Authors:** {authors_et_al}\n- **Year:** {year}\n\
    - **Title:** {title}\n- **Venue:** {journal_or_conference}\n- **DOI:** [{doi}]({doi_url})\n\
    - **Verified:** {status} — {verification_date}\n- **Claims Used:** {list_of_claims}\n\
    - **BibTeX:**\n  ```bibtex\n  {bibtex_entry}\n  ```\n"
  rules:
  - 'citation_key format: FirstAuthorLastNameYear'
  - 'Verified status: VERIFIED | CONDITIONAL | FAILED | PENDING'
  - Always run citation verification before marking VERIFIED.
steps:
- id: add_entry
  name: Add Citation Entry
  description: Insert a new citation in citations.md using the template above.
- id: verify
  name: Verify Citation
  description: Call tool_audit.citations on the entry and update verification 
    status.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='writing_citations
    completed'.\n5. Ask researcher: 'I've completed writing_citations. Want me to
    proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new
    tools/libraries have been snapshotted to the step's environment file.\n    - GROUNDING
    CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
schema_version: '1.0'
