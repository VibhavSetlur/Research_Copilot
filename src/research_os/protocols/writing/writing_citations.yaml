id: writing_citations
name: Writing — Citations
version: '4.0.0'
schema_version: '2.0'
description: Maintain workspace/citations.md so every claim is grounded and every citation is verified online.

steps:
  - id: regenerate_from_index
    name: Regenerate citations.md from literature_index
    description: |
      mem_citations_generate — rebuilds workspace/citations.md from
      inputs/literature_index.yaml. The literature_index gets entries when:
        - Papers are dropped into inputs/literature/.
        - tool_literature_download is called.

  - id: verify_each_citation
    name: Verify Each Citation Online
    description: |
      tool_audit_citations — queries Crossref / Semantic Scholar for each
      citation_key, marks entries verified/unverified. Update
      inputs/literature_index.yaml entries.verified=true accordingly (sys_file_write
      with the relevant edit).

  - id: format_for_paper
    name: Format for the Paper
    description: |
      The synthesis pipeline will reference citations by key (e.g. [@smith2024]).
      Make sure each citation_key in workspace/citations.md matches what the
      paper drafts use. Keys are auto-generated from the filename stem and are
      lowercase with underscores.

expected_outputs:
  - workspace/citations.md

next_protocol: null
on_failure: null
