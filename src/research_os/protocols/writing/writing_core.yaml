id: writing_core
name: Writing — Core Rules
version: '4.0.0'
schema_version: '2.0'
description: Universal writing rules. Loaded implicitly by every writing/ and synthesis/ protocol.
trigger: Loaded as a prerequisite — invoke directly only when auditing an arbitrary markdown file.

rules:
  banned_phrases:
    - "it is important to note that"
    - "interestingly,"
    - "it is well known"
    - "obviously"
    - "naively"
    - "trivially"
    - "intuitively"
    - "as a language model"
    - "needless to say"
    - "in order to"
    - "due to the fact that"
    - "novel approach"
  causal_language:
    - Do NOT use "causes", "leads to", "results in", "impacts", "proves" unless
      the study is an RCT, instrumented variable, regression discontinuity, or
      mathematical proof.
    - For observational data, use "is associated with", "is correlated with",
      "suggests", "is consistent with".
  number_formatting:
    - p-values: exactly 3 decimals (p = 0.042). If p < 0.001, write "p < 0.001".
    - Always report 95% CIs alongside point estimates.
    - Use scientific notation for |x| < 1e-3 or > 1e5 (e.g. 3.2e-5).
    - Always include units (e.g. "1.2 mg/dL", "12.5 °C", "0.85 (AUROC)").
  tense:
    - Methods + Results → past tense ("We fit", "Models were fit").
    - Established facts / implications → present tense.
    - Future work → future tense.

steps:
  - id: apply_rules
    name: Apply Writing Rules
    description: |
      Self-check any draft you are about to commit:
        - No banned phrases.
        - No causal over-reach unless design warrants.
        - p-values, CIs, units present and correctly formatted.
        - Tense consistent across sections.

  - id: optional_validation
    name: Optional Programmatic Validation
    description: |
      For substantial drafts:
        sys_file_validate_md filepath="<path>" protocol_name="writing_core"
      The validator flags banned phrases and missing structural headers.

expected_outputs: []

next_protocol: null
on_failure: null
