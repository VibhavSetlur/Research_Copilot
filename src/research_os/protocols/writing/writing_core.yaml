name: writing_core
version: 1.0.0
description: Universal writing rules (ALWAYS loaded for any writing task)
rules:
  banned_phrases:
    - "delve"
    - "tapestry"
    - "in conclusion"
    - "it is important to note"
  causal_language: "Use 'associated with' instead of 'causes' unless backed by randomized control trials. Avoid definitive claims."
  number_formatting: "Spell out numbers less than 10; use digits for 10 and above. Always use leading zeros for decimals (0.05)."
  tense: "Use past tense for Methods and Results. Use present tense for Conclusions and general truths."
