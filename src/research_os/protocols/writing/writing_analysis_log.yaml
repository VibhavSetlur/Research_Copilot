id: writing_analysis_log
name: Writing — Analysis Log
version: '4.0.0'
schema_version: '2.0'
description: Format for structured entries appended to workspace/analysis.md via mem_analysis_log.

entry_template: |
  [{timestamp}] **{step_id} — {status}**
  - tools: {tool_list}
  - key result: {quantitative summary with number}
  - decision: {next action}
  - routing: {continue|new_path|dead_end}
  - warnings: {warnings or "none"}

steps:
  - id: pick_status
    name: Pick a Status
    description: |
      One of: STARTED · COMPLETED · ABANDONED · PAUSED · BLOCKED.

  - id: log
    name: Log the Entry
    description: |
      mem_analysis_log entry=<formatted entry from template>
      The mem_analysis_log handler timestamps automatically; you only need to
      provide the {step_id} {status} ... portion.

  - id: refresh_workflow_diagram
    name: Refresh Workflow Diagram
    description: |
      mem_analysis_log automatically regenerates workspace/workflow.mermaid.
      Spot-check that your new step node appears with the right colour
      (active=yellow, completed=green, dead_end=red).

expected_outputs:
  - workspace/analysis.md
  - workspace/workflow.mermaid

next_protocol: null
on_failure: null
