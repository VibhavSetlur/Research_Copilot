name: writing_methods
version: 1.0.0
description: How to write to workspace/methods.md and per-step methods_research.md
template: |
  ## [Step Name]
  - **Tool/Library**: [Name and Version]
  - **Function**: [Specific function used]
  - **Assumptions Checked**: [List of assumptions, e.g. normality, independence]
  - **Data Checksum**: [Checksum of inputs used]
  - **Rationale**: [Why this method was chosen]
instructions: "Always include checksums to ensure reproducibility. Explicitly list any statistical assumptions and whether they were verified."
