id: writing_methods
name: Writing — Methods
version: '4.0.0'
schema_version: '2.0'
description: Document the methods used in an experiment in workspace/methods.md (append-only).
trigger: Whenever a method, library, or parameter is chosen — either inside analysis_plan or as a standalone task.

template: |
  ## Step {step_number}: {step_name}
  - **Dataset:** {dataset_name} (sha256: {dataset_hash})
  - **Method:** {method_name}
  - **Implementation:** {library} v{version}
  - **Key parameters:** {parameters}
  - **Justification:** {short justification with citation}
  - **Assumptions to test:** {list}

steps:
  - id: gather
    name: Gather Information
    description: |
      Confirm: dataset, library, version, parameters, justification, and the
      assumptions you'll test. Source the dataset hash from inputs/intake.md.

  - id: append
    name: Append to methods.md
    description: |
      mem_methods_append
        method=<method_name>
        step_number=<NN>
        step_name=<slug>
        dataset_name=<name>
        dataset_hash=<sha256>
        implementation=<library==version>
        parameters=<key=value;...>
        justification=<sentence with citation key>
        assumptions=[<list>]

  - id: cross_check
    name: Cross-Check Against Citations
    description: |
      Any citation referenced must exist in workspace/citations.md. If not,
      run mem_citations_generate after updating inputs/literature_index.yaml.

  - id: validate
    name: Validate Style
    description: |
      sys_file_validate_md filepath="workspace/methods.md" protocol_name="writing_core"

expected_outputs:
  - workspace/methods.md

next_protocol: null
on_failure: null
