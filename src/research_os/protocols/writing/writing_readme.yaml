id: writing_readme
name: Writing — README
version: '4.0.0'
schema_version: '2.0'
description: Maintain the project-level README and per-step READMEs.

project_readme_template: |
  # {project_name}

  **Research Question:** {question}
  **Status:** {status}
  **Last Updated:** {date}

  ## Pipeline
  ![Workflow](workspace/workflow.png)

  ## Key Findings
  - {top finding 1}
  - {top finding 2}
  - {top finding 3}

  ## Outputs
  - [Abstract](synthesis/abstract.md)
  - [Paper](synthesis/paper.md) · [PDF](synthesis/paper.pdf)
  - [Dashboard](synthesis/dashboard.html)

  ## Reproduce
  1. Clone the repo.
  2. `pip install -r environment/requirements.txt`
  3. Run experiment scripts in order: see workspace/*/README.md.

per_step_readme_template: |
  # {step_id}
  Created: {date}

  ## Goal
  {one-paragraph goal}

  ## Input data
  - {input file 1} (sha256:{hash})

  ## Methods
  - {method 1}

  ## Outputs
  - {output 1}

  ## Decision
  {proceed | branch | dead-end} — {one-line rationale}

steps:
  - id: update_project
    name: Update Project README
    description: |
      After synthesis completes, populate README.md at the project root using the
      template above. sys_file_write filepath="README.md" force=true.

  - id: update_step
    name: Update Step README
    description: |
      After each experiment step's conclusions are written, refresh
      workspace/<step>/README.md with the actual inputs/methods/outputs.

expected_outputs:
  - README.md

next_protocol: null
on_failure: null
