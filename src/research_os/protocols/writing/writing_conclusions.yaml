name: writing_conclusions
version: 1.0.0
description: How to write per-step conclusions.md
template: |
  # Step Conclusions
  
  ## Key Findings
  - [Finding 1]
  
  ## Statistical Summary
  | Metric | Value | CI |
  |--------|-------|----|
  | [M]    | [V]   | [C]|
  
  ## Bugs & Issues Encountered
  - [Issue 1]
  
  ## Routing Decision
  - [Next Step / Decision]
instructions: "Summarize the experiment step. Include a markdown table for key statistics. Note any bugs encountered for reproducibility."
