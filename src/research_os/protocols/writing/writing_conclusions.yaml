id: writing_conclusions
name: Writing — Conclusions (per step)
version: '4.0.0'
schema_version: '2.0'
description: How to write per-step conclusions.md. Called by analysis_plan's document_conclusions step.

template: |
  # {step_id} — Conclusions

  ## Findings
  - {quantitative finding 1 with number + unit}
  - {quantitative finding 2}

  ## Statistical summary
  | Metric | Value | 95% CI | p-value |
  |---|---|---|---|
  | {metric} | {value} | [{lo}, {hi}] | {p} |

  ## Limitations
  - {assumption checks performed + their result}

  ## Decision
  - {one of: proceed | branch | dead-end}

  ## Next steps
  1. {candidate 1 with rationale}
  2. {candidate 2}

steps:
  - id: write
    name: Write Conclusions
    description: |
      sys_file_write filepath="workspace/<step>/conclusions.md"
      content=<template above filled in>

  - id: log
    name: Log to analysis.md
    description: |
      mem_analysis_log entry="<step_id> conclusions: <one-line summary, key number>"

  - id: validate
    name: Validate Against Writing Standards
    description: |
      sys_file_validate_md filepath="workspace/<step>/conclusions.md"
        protocol_name="writing_core"

expected_outputs:
  - workspace/*/conclusions.md

next_protocol: null
on_failure: null
