id: audit_and_validation
name: Audit & Validation
version: '4.0.0'
schema_version: '2.0'
description: Validate citations, statistical assumptions, figure quality, and code style across the project.
trigger: After every experiment completes and reproducibility has been recorded. Re-run before synthesis.
prerequisites:
  - At least one workspace/<step>/conclusions.md exists
  - workspace/citations.md exists

steps:
  - id: audit_citations
    name: Audit Citations
    description: |
      tool_audit_citations
      Reads workspace/citations.md, queries Crossref / Semantic Scholar for each
      entry, flags those that don't resolve. Writes report to the current step's
      outputs/reports/citation_audit.md (or workspace/logs/ if no active step).

  - id: audit_assumptions
    name: Re-test Statistical Assumptions
    description: |
      For each experiment step that ran a statistical model, find the residuals
      file (typically workspace/<step>/data/output/residuals.csv) and call:
        tool_audit_assumptions filepath=<that file>
      Then read the report and append any FAILED assumptions to the step's
      conclusions.md under "## Limitations".

  - id: audit_figures
    name: Audit Figure Quality
    description: |
      For every PNG in workspace/<step>/outputs/figures/, call:
        tool_audit_figure filepath=<png>
      Aggregate warnings (low DPI, small size) into workspace/logs/figure_audit_summary.md.

  - id: audit_causal_language
    name: Scan for Causal Over-Reach
    description: |
      Only if the study design is NOT causal (no RCT / IV / RDD / DiD), grep the
      drafts for: "causes", "leads to", "results in", "impacts".
      For each hit, propose an associational rewrite ("is associated with",
      "is correlated with"). Append a list of findings + suggested fixes to
      workspace/logs/causal_language_audit.md.

  - id: audit_code_style
    name: Lint Code (optional)
    description: |
      If ruff or pylint is available in the env, run on workspace/*/scripts/.
      Otherwise skip. Save warnings to workspace/logs/code_lint.md.

  - id: write_audit_summary
    name: Aggregate Audit Report
    description: |
      Write workspace/logs/audit_report.md combining all findings + counts.
      One section per audit. Mark blocking issues with "BLOCKER:" prefix.

expected_outputs:
  - workspace/logs/audit_report.md

next_protocol: synthesis/synthesis_paper
on_failure: guidance/dead_end_routing
