name: figure_guidelines
version: 2.0.0
description: Guidelines for selecting and formatting publication-ready figures.
schema_version: '1.0'
expected_outputs:
- 'synthesis/figures/: Publication-ready figures compiled by tool_synthesize'
chart_chooser:
  comparison:
    over_time: Line Chart
    categories: Bar Chart (Horizontal if many categories)
  relationship:
    two_continuous: Scatter Plot
    three_continuous: Bubble Chart
  distribution:
    single_variable: Histogram / Density Plot
    multiple_variables: Box Plot / Violin Plot
  meta_analysis:
    effect_sizes: Forest Plot
    publication_bias: Funnel Plot
formatting:
  color_blind_palettes:
    viridis:
    - '#440154'
    - '#31688E'
    - '#35B779'
    - '#FDE725'
    okabe_ito:
    - '#E69F00'
    - '#56B4E9'
    - '#009E73'
    - '#F0E442'
    - '#0072B2'
    - '#D55E00'
    - '#CC79A7'
  typography:
    min_font_size: 8pt (for publication)
    title_font_size: 10pt
  layouts:
    forest_plot: Ensure lines for 95% CI are distinct, align study names left, 
      align OR/RR values right.
    funnel_plot: Symmetrical pseudo-95% confidence limits must be drawn as 
      dashed lines.
  technical:
    dpi_requirements: Minimum 300 DPI for print publication, 600 DPI for line 
      art.
    axis_labeling: Always include units in parentheses, e.g., 'Blood Pressure 
      (mmHg)'. Do not use variable names like 'bp_sys'.
    error_bars_vs_confidence_bands:
      error_bars: Use standard error (SE) or 95% CI for point estimates (e.g., 
        bar charts of means). Explicitly state which one in the caption.
      confidence_bands: Use shaded 95% confidence bands for continuous trends 
        (e.g., regression lines or survival curves).
steps:
- id: select_chart
  name: Select Chart Type
  description: Use the chart chooser decision tree.
- id: apply_formatting
  name: Apply Formatting
  description: Ensure color-blind friendly palettes and minimum font sizes are 
    used.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='figure_guidelines
    completed'.\n5. Ask researcher: 'I've completed figure_guidelines. Want me to
    proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new
    tools/libraries have been snapshotted to the step's environment file.\n    - GROUNDING
    CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
