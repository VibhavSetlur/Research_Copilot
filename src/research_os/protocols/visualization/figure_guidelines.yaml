id: figure_guidelines
name: Figure Guidelines
version: '4.0.0'
schema_version: '2.0'
description: Rules for picking the right chart type and styling figures for publication.

chart_chooser:
  comparison:
    over_time: line chart
    categories_few: vertical bar
    categories_many: horizontal bar
  relationship:
    two_continuous: scatter (+ optional regression line w/ CI band)
    three_continuous: bubble OR small multiples
    matrix: heatmap (clustered if appropriate)
  distribution:
    single_variable: histogram + KDE
    multiple_variables: violin OR box+strip
    paired: ridgeline OR small multiples
  meta_analysis:
    effect_sizes: forest plot (CI bars)
    publication_bias: funnel plot

formatting:
  palettes:
    sequential: viridis
    diverging: PuOr / RdBu_r
    qualitative: Okabe-Ito (colorblind safe)
  typography:
    axis_label_size: ≥10pt
    tick_label_size: ≥8pt
    title_size: ≥12pt
  technical:
    dpi: ≥300 (print); ≥150 (screen only)
    figure_format: PNG primary; SVG for editable vectors; PDF for LaTeX inclusion
    axis_units: always include units in parentheses (e.g. "Blood pressure (mmHg)")
    error_indicator:
      bar_chart: 95% CI or SE — declare in caption
      regression: shaded 95% CI band
      forest_plot: lines for 95% CI

steps:
  - id: pick_chart
    name: Pick the Chart Type
    description: |
      Use the chart_chooser above. Default to the simplest chart that conveys
      the comparison. Avoid 3-D charts, dual-y-axes, and pie charts (>4 slices).

  - id: style_chart
    name: Apply Standard Styling
    description: |
      In the analysis script: set DPI, choose a palette from formatting.palettes,
      label axes with units, include CI / error bars, save as PNG to
      workspace/<step>/outputs/figures/. Filename pattern:
        <step_number>_<short_descriptor>.png  e.g.  02_age_distribution.png

  - id: audit
    name: Audit the Figure
    description: |
      tool_audit_figure filepath="workspace/<step>/outputs/figures/<name>.png"
      Fix DPI/size warnings before finalising.

expected_outputs:
  - workspace/*/outputs/figures

next_protocol: null
on_failure: null
