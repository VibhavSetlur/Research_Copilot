name: systematic_review
version: 2.0.0
description: Full PRISMA workflow for systematic reviews.
schema_version: "1.0"
expected_outputs:
  - "workspace/<path_number>/outputs/reports/search_strategy.md"
  - "workspace/<path_number>/outputs/figures/prisma_flow_diagram.png"
  - "workspace/<path_number>/outputs/reports/extracted_data_table.csv"
  - "workspace/<path_number>/outputs/reports/rob_assessment.json"
_output_path_note: "<path_number> is the numbered experiment directory created by sys.path.create (e.g., 02_meta_analysis)."
prerequisites:
  - "Defined research question (PICO framework)."
  - "Access to academic databases (PubMed, Semantic Scholar)."
steps:
  - id: create_experiment_path
    name: "Create Experiment Path"
    description: "Create a new path via sys.path.create to store scripts and outputs."
  - id: search_strategy
    name: "Search Strategy Creation"
    description: "Formulate boolean queries and execute database querying."
  - id: deduplication
    name: "Deduplication"
    description: "Apply deduplication algorithm to combined search results."
  - id: screening
    name: "Title/Abstract & Full-Text Screening"
    description: "Screen records based on inclusion/exclusion criteria. Track counts for PRISMA."
  - id: data_extraction
    name: "Data Extraction"
    description: "Extract study characteristics into a standardized table."
  - id: rob_assessment
    name: "Risk of Bias Assessment"
    description: "Perform ROB-2 (RCTs) or ROBINS-I (observational) assessment."
  - id: prisma_diagram
    name: "Generate PRISMA Diagram"
    description: "Create a PRISMA flow diagram summarizing the screening process."
checkpoints:
  - "Ensure inclusion/exclusion criteria were applied consistently."
  - "Verify PRISMA counts match total retrieved."
