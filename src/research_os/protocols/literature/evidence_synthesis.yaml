id: evidence_synthesis
name: Evidence Synthesis
version: '4.0.0'
schema_version: '2.0'
description: Build an evidence table from the literature corpus, grade each entry, and flag contradictions.
trigger: After literature_search. Useful as the foundation for the paper's Introduction and Discussion.

steps:
  - id: build_evidence_table
    name: Build Evidence Table
    description: |
      From the entries in inputs/literature_index.yaml (and any PDFs in inputs/literature/),
      build a table at synthesis/evidence_table.md with columns:
        | citation_key | year | design | n | population | primary outcome | direction | GRADE |
      Use sys_file_write to create the file. Fill each row by reading the abstract
      from the literature_index entry; for missing fields, mark "n/r" (not reported).

  - id: grade_quality
    name: Apply GRADE Rating
    description: |
      Use the GRADE framework — pick one of {high, moderate, low, very_low} per entry:
        high       — RCT without serious limitations; or overwhelming observational evidence.
        moderate   — RCT with limitations or strong observational study.
        low        — Observational study with limitations.
        very_low   — Case series, single-arm, or studies with severe flaws.
      Justify each rating in a short note column.

  - id: detect_contradictions
    name: Detect Contradictions
    description: |
      For each (population, exposure, outcome) triple represented in the evidence
      table, group entries by direction (positive / negative / null). Any group
      that contains BOTH positive and (negative or null) directions for the same
      triple is a contradiction. Log to synthesis/contradictions.md with:
        - Triple
        - Conflicting citation_keys
        - Hypothesised reason (different population? dose? era? definition?)

expected_outputs:
  - synthesis/evidence_table.md
  - synthesis/contradictions.md

next_protocol: guidance/analysis_plan
on_failure: null
