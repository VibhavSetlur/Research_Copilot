id: glossary_update
name: Glossary Update
version: '4.0.0'
schema_version: '2.0'
description: Add or refine a definition in docs/glossary.md. Run this protocol the first time any non-trivial term appears in the project.
trigger: A jargon term, acronym, or domain-specific concept appears in methods/analysis/conclusions for the first time.

steps:
  - id: identify_terms
    name: Identify Undefined Terms
    description: |
      Scan workspace/methods.md, workspace/analysis.md, and the latest conclusions.md
      for acronyms (uppercase >= 2 chars), domain-specific terms, statistical or
      computational terms with a non-obvious meaning. List those not already in
      docs/glossary.md.

  - id: write_definitions
    name: Write Definitions
    description: |
      For each undefined term:
        - 1-2 sentence plain-English definition.
        - Where used in the project (which step or method).
        - 1 citation if the term was sourced from literature.
      Append rows to docs/glossary.md table. Keep entries alphabetised.

  - id: ground_unclear
    name: Ground Definitions in Literature
    description: |
      For any term you are not 100% confident about:
        tool_search_web query="<term> definition"
        OR tool_search_semantic_scholar query="<term> review"
      Cite the source in the glossary entry.

expected_outputs:
  - docs/glossary.md

next_protocol: null
on_failure: null
