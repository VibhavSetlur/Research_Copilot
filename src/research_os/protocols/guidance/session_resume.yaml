id: session_resume
name: Session Resume
version: '2.0.0'
schema_version: '2.0'
description: |
  Re-enter a paused / interrupted / handed-off project — possibly in a
  different chat or with a different AI model. Two MCP calls: tool_session_resume
  reconstructs intent + status; tool_route on the researcher's first message
  picks the right protocol.
trigger: |
  Researcher says "where were we" / "resume" / "another session" / "pick up",
  OR sys_boot returned pause_classification ∈ {mid_step, long_running_job,
  ctx_exhaustion}.
prerequisites:
  - session_boot has run (sys_boot called)

steps:
  - id: read_state
    name: One-Call Resume Brief
    description: |
      Call tool_session_resume — single MCP call returns:
        - project_name + pipeline_stage + current_path
        - pause_reason (fresh_session | mid_step | dead_end |
                        long_running_job | ctx_exhaustion | completed_step)
        - last_protocol_entry + active_path_ids
        - hypotheses (by id + status)
        - background_tasks.running (with PIDs + commands)
        - analysis_tail + methods_tail (last 30 lines of each)
        - latest_handoff (path to most recent handoff doc, if any)
        - recommended_next_protocol
        - resume_message — exact text to read aloud to the researcher

      DO NOT call sys_state_get / sys_protocol_history / mem_hypothesis_list
      / sys_path_list separately. They are all bundled.

  - id: poll_background_tasks
    name: Poll Live Background Tasks (only if any)
    description: |
      If tool_session_resume reported background_tasks.running > 0, call
      tool_task_status for each task_id:
        - finished → log result, surface a one-line summary
        - still running → report elapsed time + log tail
        - stuck (no log growth in 10+ min) → flag for researcher review

  - id: read_handoff_if_present
    name: Read Latest Handoff Doc (only if ctx_exhaustion)
    description: |
      If latest_handoff is non-null, sys_file_read filepath=<latest_handoff>.
      The handoff includes: open hypotheses, dead-end lessons, critical
      assumptions, and a "Notes for the next AI" addendum. Use it to
      avoid re-asking the researcher questions they already answered.

  - id: present_brief
    name: Present the Resume Brief
    description: |
      Read tool_session_resume's `resume_message` field verbatim. Append
      ONE question:
        "Continue the recommended next protocol (<name>), pivot, or start
         something new?"
      Wait for the researcher's answer.

  - id: route_their_answer
    name: Route Their Answer
    description: |
      When they respond, call tool_route(prompt=<their answer>) — same
      flow as session_boot's last step. Load primary protocol with
      format="summary", drill into a step with format="step" when ready.

expected_outputs: []
next_protocol: null
on_failure: guidance/dead_end_routing

quality_bar: |
  - tool_session_resume is the ONE state-recovery call; nothing else duplicates
    its payload.
  - Background tasks are polled, not assumed.
  - If a handoff doc exists, it is read before asking the researcher questions.
