id: autopilot
name: Autopilot Mode
version: '1.0.0'
schema_version: '2.0'
description: |
  Hands-off "drive the project to its next deliverable without checking in
  on every step" mode. Defines the exact gates where the AI MUST stop and
  ask, the safety net for risky operations, and the recovery procedure when
  a long batch breaks midway.
trigger: |
  Researcher says any of: "you drive", "autopilot", "run with it", "just do
  it", "wake me up when it's done", OR config has
  ``interaction.autonomy_level: autopilot``.
prerequisites:
  - session_boot has completed and set autonomy=autopilot
  - inputs/intake.md exists (researcher won't be available to fix gaps)
  - research_question.md is non-placeholder

steps:
  - id: declare_scope
    name: Declare Scope + End Condition
    description: |
      ONE sentence to the researcher: "Autopilot until <end-condition>.
      I'll page you if: <gates>." End-conditions can be:
        - "synthesis/paper.md exists and passes audit_synthesis"
        - "N planned experiment steps are completed"
        - "all active hypotheses reach status != testing"
        - "I hit a configured gate (see below)"

  - id: mandatory_gates
    name: Mandatory Confirmation Gates
    description: |
      Autopilot DOES stop and ask before:
        1. tool_synthesize for the final deliverable (paper / grant / report).
           If tool_audit_step_completeness has BLOCKERS, autopilot HALTS
           before even asking — the gate is server-enforced and refuses
           the call until fixed.
        2. tool_dashboard_create / tool_poster_create for the FINAL
           deliverable (mid-flight progress dashboards bypass the ask,
           but flag any open completeness blockers).
        3. tool_audit_reproducibility (slow + expensive).
        4. Any tool_research_tool candidate tagged paid_or_licensed.
        5. sys_path_abandon (dead-end declarations are reversible but loud).
        6. Any sys_file_write to synthesis/ with force=true.
        7. tool_package_install for a package not already in
           environment/requirements.txt.
        8. Any tool_task_run with an estimated cost > 1 GPU-hour OR > 10 GB
           of memory OR > 50 GB of disk I/O.
      For each gate, sys_notify level="action_required" and wait one turn.

      NEVER one-shot the full research project. Autopilot may iterate
      through experiment steps without checking in, but the gates above
      are floors — they cannot be bypassed even by an explicit
      "do everything" prompt. The researcher must consent to each final
      deliverable separately so the synthesis is a deliberate act, not a
      side effect.

  - id: scheduled_checkpoints
    name: Auto-Checkpoint Every Major Step
    description: |
      After each completed numbered experiment step, in this order:
        1. tool_path_finalize — rewrites the step's READMEs from what was
           produced (so empty environment/literature/data folders carry an
           informative note, not blank space).
        2. sys_checkpoint_create description="autopilot after <step_id>"
           — keeps a rollback target so a runaway autopilot can be undone
           in one call.

  - id: heartbeat
    name: Hourly Heartbeat (long runs)
    description: |
      If the autopilot run will exceed 30 minutes wall-clock, sys_notify
      level="info" every ~60 min with: completed steps, open tasks, any
      hypothesis status changes. Researcher can quietly observe or jump in.

  - id: failure_handling
    name: Failure Handling Without a Human in the Loop
    description: |
      On ANY tool error during autopilot:
        - Log to workspace/logs/autopilot_errors.log via sys_file_write
        - Retry once if the error looks transient (network timeout, rate
          limit, missing optional dep — try tool fallback)
        - On second failure, sys_notify level="action_required" describing
          the failed call + best-guess fix, then HALT autopilot
        - Never silently fall through to the next step on hard failures
      On ANY dead-end (e.g. assumption violated), abandon the step,
      sys_notify level="warn", and route to guidance/dead_end_routing.

  - id: final_deliverable_gate
    name: Final Deliverable Gate
    description: |
      Before tool_synthesize for the named deliverable:
        - tool_audit_synthesis (dry-run on what's queued)
        - tool_audit_citations
        - Present the proposed section order + figure count + citation
          count to the researcher
      Wait for approval. Only after explicit "go" does the synthesis run.

expected_outputs:
  - workspace/logs/autopilot_errors.log (only on failures)
  - .os_state/checkpoints/ (one per completed step)

quality_bar: |
  - Every autopilot run produces a clear audit trail in protocol_execution_log
    + checkpoints; the researcher can replay any choice.
  - No mandatory gate is silently bypassed even if the autonomy_level is
    autopilot — these are floors, not ceilings.
  - The researcher always has a "halt + show me" out: sys_notify level=
    "action_required" is the universal handshake.

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
