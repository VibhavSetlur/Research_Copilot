id: collaboration_handoff
name: Collaboration Handoff (to a human, not the next AI)
version: '1.0.0'
schema_version: '2.0'
description: |
  Package the project for handoff to a human collaborator who is
  not running Research-OS. Distinct from `chat_handoff` (AI-to-AI,
  same workspace) and from the share-archive script (which preserves
  workspace structure for a Research-OS-aware reader). The
  collaborator may be on a different OS, different language stack,
  different lab — they need an onboarding doc written in their
  vocabulary, not ours.

trigger: |
  Researcher says "send this to <name>" / "hand off to a
  collaborator" / "share with the team" / "another lab is taking
  this forward".

editorial_voice:
  mode: guidance
  rules:
    - "Write the COLLABORATOR.md in THEIR vocabulary, not Research-OS's.
       The reader has never heard of `sys_path_create` or
       `pipeline.yaml`."
    - "Include the questions you expected them to ask FIRST — the
       reasoning behind the design choices, not just the choices."
    - "List the unspoken assumptions explicitly. The 80% the original
       author thought was obvious is the 80% the new collaborator
       will get wrong."

steps:
  - id: scope_handoff
    name: Scope the handoff
    description: |
      Ask the researcher:
        - WHO is taking this forward? (Stranger / known colleague /
          their student?)
        - WHAT are they expected to do? (Reproduce the result /
          extend it / write a follow-up / port to a different
          stack?)
        - WHAT's their stack? (Same Python env / R-only / Stata-only /
          no programming background?)
      The answers determine what to include and what to translate.

  - id: write_collaborator_md
    name: Author COLLABORATOR.md
    description: |
      Produces a top-level `COLLABORATOR.md` (NOT `README.md` — we
      don't want to clobber whatever README the existing project
      already has). Structure:

        # <Project> — for the new collaborator

        ## Project in 60 seconds
        <one paragraph: what was studied, what was found, where
         the analysis lives.>

        ## Why we made the choices we did
        <2-3 paragraphs: the genuine reasoning behind the methodology,
         not just "we used X". Cover the close-call decisions —
         "we considered Y, picked X because Z".>

        ## What we'd want you to do first
        <numbered list: read the paper draft → walk the analysis
         folder for step <N> → re-run the final figure → ask
         questions.>

        ## The unspoken assumptions
        <bullet list: things we assumed about the data, the design,
         the audience that we now realise are non-obvious.>

        ## Stack + how to reproduce
        <Concrete: Python version, key library versions, the one
         command to reproduce the headline result, where the data
         lives.>

        ## Open questions / known limitations
        <Bullet list: what we didn't resolve, where we'd start if
         we had another month.>

        ## Contact + escalation
        <Names, channels, response-time expectation.>

  - id: package_share_safe
    name: Package the share-safe bundle
    description: |
      Run the existing `scripts/export_share_archive.py` (or its
      sh wrapper) — this builds the zip without AI-internal files
      (no AGENTS.md, no .os_state, no .claude/.cursor configs).
      The COLLABORATOR.md authored above goes IN this bundle.

      Verify the resulting zip:
        - Opens cleanly (file listing matches expectations).
        - Contains the final paper / dashboard / dataset.
        - Excludes AI configs that would confuse a non-RO reader.
        - Includes the `requirements.txt` / `environment.yml` so
          the collaborator can recreate the env.

  - id: confidence_in_reproduction
    name: Confidence in reproduction
    description: |
      Before handing off, the AI should verify the project ACTUALLY
      reproduces from the bundled assets:
        - `tool_audit_reproducibility` (slow but the gold standard)
          OR a manual walk through the final step's
          `entrypoint.sh`.
        - Record the verification outcome in
          `COLLABORATOR.md > Stack + how to reproduce`.

      A handoff that doesn't reproduce will burn the collaborator's
      first two days and damage the trust the project needs.

  - id: schedule_followup
    name: Schedule a follow-up
    description: |
      Suggest to the researcher a 30-minute call with the
      collaborator 1-2 weeks after the handoff. Two weeks is
      long enough that the collaborator has tried something;
      short enough that the original team's context isn't gone.
      Write the suggested follow-up date / agenda into
      `COLLABORATOR.md > Contact + escalation`.

expected_outputs:
  - COLLABORATOR.md (top-level, share-safe)
  - <project>_share_<date>.zip (via existing export script)

next_protocol: null
on_failure: null
