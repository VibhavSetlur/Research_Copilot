id: writing_standards
name: Writing Standards
version: '4.0.0'
schema_version: '2.0'
description: Universal style and grounding rules that apply to every writing output (methods, conclusions, paper sections).
trigger: Loaded implicitly by every writing/* and synthesis/* protocol — invoke directly only when auditing a draft.

steps:
  - id: voice_and_tense
    name: Voice & Tense
    description: |
      - Methods: past tense, active or passive, third person ("We fit a model"
        is acceptable; "Models were fit" is also acceptable — be consistent).
      - Results: past tense, third person, no causal language unless the design
        warrants it (RCT / instrumented variable / explicit causal identification).
      - Discussion: present tense for what the evidence supports, past for what was done.
      - Conclusion: present + future ("These results suggest", "Future work should").

  - id: claim_grounding
    name: Every Quantitative Claim Has a Source
    description: |
      Every number, every comparison, every method choice must be traceable to:
        - A specific row in workspace/methods.md, OR
        - A specific output in workspace/<step>/outputs/, OR
        - A specific citation in workspace/citations.md.
      No "it is well known", "studies suggest", "many researchers". Always cite.

  - id: avoid_banned_phrases
    name: Banned Phrases
    description: |
      Do NOT use: "it is well known", "many studies have shown", "intuitively",
      "obviously", "naively", "trivially", "proves" (for empirical evidence),
      "causes" (unless causally identified), "100% accurate", "perfect", "novel"
      (without comparison to prior work).

  - id: figure_referencing
    name: Figure & Table Referencing
    description: |
      Every figure cited in text must exist on disk and be referenced by its full
      relative path (e.g. ![Fig 1](workspace/01_eda/outputs/figures/dist.png)) or
      by a numbered label that resolves to a file in synthesis/. Use sys_file_list
      directory="<exp>/outputs/figures" to confirm presence.

rules:
  banned_phrases:
    - "it is well known"
    - "many studies have shown"
    - "intuitively"
    - "obviously"
    - "naively"
    - "trivially"
    - "100% accurate"
    - "novel approach"

expected_outputs: []

next_protocol: null
on_failure: null
