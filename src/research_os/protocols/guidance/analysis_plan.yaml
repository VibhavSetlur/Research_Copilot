name: analysis_plan
version: 2.1.0
description: Plan workspace structure, manage step folders, and experiment paths.
schema_version: "1.0"

# ── Workspace folder naming ───────────────────────────────────────────
# Every experiment is a folder inside workspace/ named:
#   {step_number}_{descriptive_name}
# Examples:
#   workspace/01_experiment_baseline/
#   workspace/02_data_preparation/
#   workspace/03_causal_model_path_1/
#
# When a research track begins, subsequent steps that belong to that track
# append _path_{N} (N = 1, 2, …).  A new track gets the next integer.
# Path numbers are optional; use them only to group steps logically.

expected_outputs:
  - "workspace/{step_number}_{descriptive_name}/README.md"
  - "workspace/{step_number}_{descriptive_name}/scripts/analysis.py"

structure:
  note: "Steps are chronological and uniquely named. Synthesis is NOT a workspace step – it is a separate top‑level folder populated by tool.synthesize."

templates:
  boilerplate_readme: |
    # {folder_name}
    **Objective**: {description}
    **Inputs**: {list}
    **Outputs**: {list}
    **Scripts**: {list}

path_creation_criteria:
  create_new_path_when:
    - "Testing a high‑risk data transformation."
    - "Trying an alternative, unproven model architecture."
    - "Starting a separate sensitivity analysis that might disrupt the main flow."
    - "Beginning a new research track."
  continue_in_same_path_when:
    - "Adding robustness checks."
    - "Fixing bugs in the current script."
    - "Running the next logical step on the same track."

steps:
  - id: setup_directories
    name: "Setup directories"
    description: "Use sys.path.create to create each step folder with the format {step_number}_{descriptive_name}. Do not create a synthesis step."
  - id: write_readmes
    name: "Write READMEs"
    description: "Populate each step folder with the boilerplate README."
  - id: evaluate_path_creation
    name: "Evaluate path creation"
    description: "Review path_creation_criteria to decide whether the next step starts a new track (new path number) or continues on the current one."

multi_language_workflow:
  description: "Guidelines for multi‑language workflows."
  best_practices:
    - "Use tool.data.convert to move data between R, Python, Julia (e.g., .csv ↔ .feather)."
    - "Run language‑specific scripts sequentially inside the same step folder."
    - "Snapshot all environments with sys.env.snapshot when ready."
