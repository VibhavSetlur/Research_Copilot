id: analysis_plan
name: Analysis Plan (Core Loop)
version: '4.0.0'
schema_version: '2.0'
description: The core per-step loop. Scope, ground methods in literature, execute, document, environment-snapshot. Iterates once per experiment step.
trigger: After methodology_selection — or whenever the researcher asks for a new experiment step.
prerequisites:
  - workspace/methods.md exists with at least one method entry
  - workspace/citations.md exists (literature_search has been run at least once)

steps:
  - id: scope_step
    name: Scope the Step
    description: |
      Determine the goal of this step in ≤2 sentences. Examples:
        - "Baseline EDA: distributions, missingness, basic correlations."
        - "Fit a logistic regression with covariates X1..Xk, evaluate AUC and calibration."
      Decide:
        - One-shot script vs sub-steps (use sub-steps if >3 distinct methods).
        - Inputs (from previous step's data/output/ — symlinked automatically).
      For supervised/manual autonomy, ask the researcher to confirm the scope.

  - id: ground_methods
    name: Ground Methods in Literature
    description: |
      You MUST search literature before choosing a method. In ONE turn:
        - tool_search_semantic_scholar query=<methodology question>
        - tool_search_web query=<methodology question + year>
        - Optionally tool_search_arxiv / tool_search_pubmed / tool_search_crossref.
      For each method you intend to use, append to workspace/methods.md via
      mem_methods_append with at minimum: method, implementation, parameters,
      justification, assumptions, and 1-3 citation references. Also call
      mem_decision_log to record the methodological choice and rejected alternatives.

  - id: create_step
    name: Create the Numbered Experiment Folder
    description: |
      sys_path_create name="<slug>" hypothesis="<one-sentence hypothesis>".
      This creates workspace/NN_<slug>/{scripts,data,outputs/{reports,figures,tables,dashboards},environment}
      and updates state. The new step becomes current_path.

  - id: write_and_run_script
    name: Write + Run the Analysis Script
    description: |
      Write the analysis script(s) to workspace/<step>/scripts/. Naming convention:
        <step_number>_<step_name>_v<n>.<ext>     e.g. 03_logistic_baseline_v1.py
      Bump the version number when you change the script meaningfully.

      Every script MUST:
        - Read from workspace/<step>/data/input/  (symlinked to prior data/output/).
        - Write derived data to workspace/<step>/data/output/.
        - Write at least one markdown report to outputs/reports/ summarising findings.
        - Write at least one figure (PNG ≥150 DPI) to outputs/figures/ — unless the
          step is purely textual; in that case generate a table to outputs/tables/.
        - Set random seeds explicitly; print library versions to stderr.

      Run via tool_python_exec / tool_r_exec / tool_julia_exec / tool_bash_exec.
      If the script fails, iterate (next version) and re-run; do NOT silently swallow errors.

  - id: document_conclusions
    name: Document Conclusions & Update Workspace Logs
    description: |
      Populate workspace/<step>/conclusions.md with:
        ## Findings
          - 2-5 concrete quantitative bullets (with numbers and units).
        ## Limitations
          - Assumption checks performed and their result.
        ## Decision
          - One of: proceed | branch (new experiment) | dead-end.
        ## Next steps
          - 2-3 candidate next analysis steps (with brief rationale).
      Then update workspace/<step>/README.md with the actual inputs/methods/outputs.
      mem_analysis_log with a one-line summary of what was done.

  - id: snapshot_step_environment
    name: Snapshot Step Environment
    description: |
      sys_env_snapshot — this writes the current interpreter's packages into
      workspace/<step>/environment/requirements.txt (and Project.toml / renv.lock
      if R or Julia were used).

  - id: audit_step
    name: Lightweight Step Audit
    description: |
      If outputs/figures has a primary figure, call tool_audit_figure on it.
      If a statistical test was run with a known n, call tool_audit_power
      (effect_size hint can be Cohen's small-medium defaults if unknown).
      If model residuals were saved, call tool_audit_assumptions on them.
      Add any warnings to the conclusions.md "Limitations" section.

  - id: decide_next
    name: Decide Next Step
    description: |
      Based on conclusions, recommend ONE of:
        - Proceed to a new analysis step → return to scope_step (this protocol again).
        - Abandon: sys_path_abandon path_name=<id> rationale=<short>.
          Then run guidance/dead_end_routing.
        - Advance to reproducibility: only when ALL planned experiments are
          completed (conclusions.md decisions are "proceed" or "branch", none "dead-end")
          and you have at least one terminal experiment with publishable findings.

expected_outputs:
  - workspace/*/README.md
  - workspace/*/conclusions.md
  - workspace/*/scripts
  - workspace/*/environment
  - workspace/logs

next_protocol: reproducibility/reproducibility
on_failure: guidance/dead_end_routing
