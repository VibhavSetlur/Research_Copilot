name: project_startup
version: 2.0.0
description: 'End-to-end startup protocol: from empty inputs/ to baseline EDA complete.'
next_protocol: domain/domain_analysis
pre_conditions:
- researcher_config.yaml has been read (session_boot completed)
- At least one file exists in inputs/
model_adaptations:
  small:
    run_eda:
      description: Use sys.state.minimal_context. Read only first 20 rows of data.
        Generate only the top 3 most important plots.
  medium:
    run_eda:
      description: Standard EDA — full sample, standard plot set.
  large:
    run_eda:
      description: Full dataset EDA. Generate complete plot battery. Read full analysis.md
        history.
turn_structure:
  autonomy_manual:
    steps_per_turn: 1
    approval_required_before: all
  autonomy_supervised:
    steps_per_turn: 2
    approval_required_before:
      - create_baseline_path
      - run_eda
      - write_conclusions
  autonomy_autopilot:
    steps_per_turn: 5
    approval_required_before:
      - write_conclusions
steps:
- id: scan_inputs
  name: Scan All Input Files
  description: '1. Call sys.file.list on inputs/raw_data/, inputs/literature/, inputs/context/

    2. For each data file found, call tool.data.sample (n_rows=20, strategy=head)
    to understand columns and types

    3. Read any .md, .txt, .yaml files in inputs/context/ fully via sys.file.read

    4. Read inputs/intake.md if it exists

    '
- id: read_researcher_config
  name: Load Researcher Preferences
  description: 'Call sys.config.get. Extract:

    - research_goal.output_types (what kind of output they want)

    - researcher.expertise_level (how to communicate)

    - interaction.autonomy_level (how much to ask vs do)

    - Any pre-set research_question

    '
- id: domain_analysis
  name: Classify Domain
  description: 'Call sys.guidance.get protocol_name="domain/domain_analysis" and follow
    it.

    Map file types and column names to a domain.

    Log result to workspace/analysis.md.

    '
- id: formalize_research_question
  name: Formalize Research Question
  description: 'If researcher_config has a research_question, use it.

    If not, propose 2-3 candidate questions based on data columns and domain.

    Write finalized question to docs/research_question.md.

    DO NOT proceed to next step until researcher confirms the question.

    '
- id: present_summary
  name: Present Structured Summary to Researcher
  description: 'Present in this EXACT format, adapting language to expertise_level:

    ---

    **Project Startup Summary**

    - Data: {N files, total size, key columns found}

    - Domain: {classified domain} → Reporting standards: {e.g., STROBE}

    - Research Question: {confirmed question}

    - Data Quality: {missing values %, any issues noted}

    - Suggested First Experiment: Create 01_baseline_eda to explore {specific aspect}


    **Shall I create the baseline experiment path and start the EDA?**

    ---

    Wait for explicit YES before proceeding.

    '
- id: create_baseline_path
  name: Create First Experiment Path
  description: 'After researcher approval, call sys.path.create name="baseline_eda".

    This creates workspace/01_baseline_eda/.

    Update docs/research_question.md with the formalized research question.

    '
- id: methods_research
  name: Research EDA Methods
  description: Research appropriate EDA methods for the data. Use methodology/research_methods
    and methodology/tool_discovery if needed. Write findings to workspace/01_baseline_eda/methods_research.md.
- id: run_eda
  name: Execute Baseline EDA
  description: 'Write a Python script at workspace/01_baseline_eda/scripts/01_eda.py
    that:

    - Loads data via tool.data.sample (NOT direct pd.read_csv on full file)

    - Produces: shape, dtypes, missing%, basic descriptive stats, 2-3 distribution
    plots

    - Saves figures to workspace/01_baseline_eda/outputs/figures/

    - Saves summary table to workspace/01_baseline_eda/outputs/reports/eda_summary.md

    Call tool.python.exec on the script.

    On completion, call mem.analysis.log and mem.methods.append.

    '
- id: write_conclusions
  name: Document EDA Conclusions
  description: 'Load sys.guidance.get protocol_name="writing/writing_conclusions"
    and populate

    workspace/01_baseline_eda/conclusions.md.

    Include: key findings, data quality verdict, 2-3 concrete next step ideas.

    '
- id: suggest_next
  name: Propose Next Steps
  description: 'Present 2-3 numbered options with one-line descriptions.

    For example:

    1. Data preparation (handle missing values, encode categoricals)

    2. Literature search (find similar studies, establish context)

    3. Hypothesis testing (if question is clear enough to test)

    Ask: "Which direction would you like to go?"

    '
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''project_startup completed''.

    5. Ask researcher: ''I''ve completed project_startup. Want me to proceed to the
    next protocol?'''
schema_version: '1.0'
