id: project_startup
name: Project Startup
version: '5.1.0'
schema_version: '2.0'
description: First substantive protocol. Auto-fills intake from researcher dumps, locks in research question, classifies domain, snapshots the base environment.
trigger: Second protocol every new project — and any time inputs/ changes substantially.
prerequisites:
  - session_boot has completed this session (sys_boot was called)
  - inputs/researcher_config.yaml exists (auto-created on `research-os init`)

steps:
  - id: route_first
    name: Route Through tool_route Before Loading the Full Protocol
    description: |
      If you got here via session_boot's tool_route call, you already have
      the right protocol — skip this step.

      Otherwise, before loading this YAML at format='full', call
      tool_route(prompt=<researcher's ask>). For an intake-shaped ask
      ("fill the intake", "I dropped files", "what do I have") tool_route
      will recommend tool_intake_autofill as a SHORTCUT — you can call
      that directly without the full project_startup load.

  - id: scan_inputs
    name: Scan inputs/ at Coarse Granularity
    description: |
      In ONE batch:
        - sys_file_list directory="inputs/raw_data"
        - sys_file_list directory="inputs/literature"
        - sys_file_list directory="inputs/context"
      If all three are empty, ask the researcher to drop their data + papers +
      notes into the relevant folders. Do NOT proceed further until at least
      one input exists.

  - id: autofill_intake
    name: Auto-fill Intake from Researcher Dumps
    description: |
      Call tool_intake_autofill (no args).
      This:
        - infers domain from columns / file extensions / context keywords
        - extracts research_question from context notes (looks for explicit
          "Research question:" / "Aim:" / "Objective:" or the first
          sentence ending in "?")
        - extracts hypotheses (H1/H2/H3 lines, or "Hypothesis:")
        - rewrites inputs/intake.md with the proposal
        - fills the BLANK fields in researcher_config.yaml
        - registers each inferred hypothesis in state.active_hypotheses
      Then show the researcher the proposed (question, domain, hypotheses) in
      one short message and ask "Approve, or refine?"
      Wait for approval before any code is written.

  - id: profile_each_dataset
    name: Profile Each Data File (sampled)
    description: |
      For every tabular file (csv|tsv|parquet|feather|xlsx|json|jsonl) in
      inputs/raw_data/, call tool_data_profile filepath=<that file>.
      Read the resulting reports — note any high-missingness columns or tiny
      sample sizes. These constraints feed methodology_selection later.
      For non-tabular files (.fasta, .nii, .dcm, …) just note their presence
      and size; defer specialised inspection to the methodology protocol.

  - id: snapshot_global_environment
    name: Initialise Global Environment
    description: |
      sys_env_snapshot — writes the current interpreter's packages to
      environment/requirements.txt. Per-experiment environments inherit from
      this baseline. R / Julia / conda lockfiles are picked up automatically
      if they exist at the project root.

  - id: present_startup_summary
    name: Summarise to Researcher
    description: |
      Format:
        **Startup summary**
        - Inputs: N data files (top types), M PDFs, K notes
        - Domain: <classified domain> · reporting standard candidate: <name>
        - Question: <confirmed question>
        - Hypotheses: <H1, H2, ...> (each tracked in state)
        - Data quality flags: <missingness / small-n / class imbalance>
        - Recommended next: domain_analysis (light formal classification + bias list)
                            OR jump straight to analysis_plan if exploratory and tiny.

expected_outputs:
  - inputs/intake.md
  - docs/research_question.md

next_protocol: domain/domain_analysis
on_failure: guidance/dead_end_routing
