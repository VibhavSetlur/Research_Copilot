name: project_startup
version: 1.0.0
description: "First actions after the researcher has placed files in inputs/."
steps:
  - id: scan_inputs
    description: "List all files in inputs/ using sys.file.list. Read research notes, variable dictionaries, and any context files. Profile the raw data with sys.file.read (first 50 lines) to understand columns and types."
  - id: domain_analysis
    description: "Load domain/domain_analysis and follow it. Classify the research domain, identify reporting standards, and note domain-specific pitfalls."
  - id: research_design
    description: "Load domain/research_design. Formalise the research question and hypotheses. Write them to docs/research_question.md and docs/hypotheses.md."
  - id: create_baseline_path
    description: "Create the first experiment path with sys.path.create name='baseline_eda'. This will make workspace/01_baseline_eda/."
  - id: methods_research
    description: "Research appropriate EDA methods for the data. Use methodology/research_methods and methodology/tool_discovery if needed. Write findings to workspace/01_baseline_eda/methods_research.md."
  - id: run_eda
    description: "Write an analysis script in 01_baseline_eda/scripts/ that loads the data, checks for missingness, generates descriptive statistics, and creates visualisations. Execute with tool.python.exec. Save outputs to 01_baseline_eda/outputs/."
  - id: conclude_baseline
    description: "Write conclusions.md using writing/conclusions. Include key findings, data quality issues, feasibility, and concrete next-step ideas for data preparation or modelling."
  - id: update_logs
    description: "Log the step completion with mem.analysis.log and record methods in workspace/methods.md via writing/methods."
  - id: suggest_next
    description: "Summarise what was done and suggest 2-3 possible next steps based on the analysis plan."
