id: project_startup
name: Project Startup
version: '4.0.0'
schema_version: '2.0'
description: Initial scan of researcher inputs, intake regeneration, research question lock-in, and global environment baseline.
trigger: Second protocol every NEW project (or whenever inputs change substantially).
prerequisites:
  - session_boot has completed this session
  - inputs/researcher_config.yaml exists

steps:
  - id: scan_inputs
    name: Scan inputs/ Completely
    description: |
      1. sys_file_list directory="inputs/raw_data"   → enumerate data files.
      2. sys_file_list directory="inputs/literature" → enumerate PDFs.
      3. sys_file_list directory="inputs/context"    → enumerate notes/context.
      4. For each tabular file in raw_data/ (csv|tsv|parquet|feather|xlsx|json):
            tool_data_profile filepath=<that file>
         The profile writes a markdown report to workspace/<step>/outputs/reports/
         when an experiment exists, otherwise workspace/logs/. Read each profile.
      5. For every .md / .txt in inputs/context/: sys_file_read it.
      6. mem_intake_regenerate — this rewrites inputs/intake.md with SHA-256 hashes,
         file sizes, and the current researcher_config values.

  - id: classify_domain_quick
    name: Domain & Study-Type Snapshot
    description: |
      Inspect column names, file types, and any context notes. Write a ONE-paragraph
      domain classification to docs/domain_summary.md via sys_file_write. Cover:
        - Likely field (e.g. environmental epidemiology, NLP, finance).
        - Study type (observational | experimental | survey | simulation | secondary).
        - Reporting standard to follow (e.g. STROBE, CONSORT, PRISMA, JARS, ARRIVE).

  - id: lock_research_question
    name: Confirm Research Question
    description: |
      Read researcher_config.research_question. If empty:
        - Propose 2-3 candidate questions tied directly to columns/files you observed.
        - Wait for the researcher to choose or rewrite.
      Once a single question is confirmed:
        - sys_file_write filepath="docs/research_question.md" with sections
          Question, Sub-questions, Operational definitions, Population, Outcome.
        - sys_config_set key="research_question" value="<final wording>"

  - id: snapshot_global_environment
    name: Initialise Global Environment
    description: |
      sys_env_snapshot to seed the project-level environment/requirements.txt
      with the current interpreter's packages. Per-experiment environments
      inherit from this baseline.

  - id: present_summary
    name: Summarise to Researcher
    description: |
      Reply in this exact shape:
        **Startup summary**
        - Data: <N files; key columns / units>
        - Domain: <classified domain> · standard: <e.g. STROBE>
        - Question: <confirmed question>
        - Data quality flags: <missingness / outliers / sample size warnings>
        - First experiment suggested: <slug> — <one-line scope>
      Then ask: "Move to analysis_plan to scope the first experiment?"

expected_outputs:
  - inputs/intake.md
  - docs/domain_summary.md
  - docs/research_question.md

next_protocol: domain/domain_analysis
on_failure: guidance/dead_end_routing
