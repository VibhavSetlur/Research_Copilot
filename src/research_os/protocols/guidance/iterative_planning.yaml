id: iterative_planning
name: Iterative Planning
version: '1.0.0'
schema_version: '2.0'
description: For researchers who want the AI to PROPOSE next steps rather than dictate them. Iteratively assesses state + literature + tools and recommends the best move.
trigger: Researcher says "what should I do next?" / "iterate with me" / "propose the next step" — OR analysis_plan finishes a step and autopilot is on.

steps:
  - id: assess_state
    name: Read the Current State
    description: |
      ONE batch in parallel:
        - sys_state_get
        - sys_path_list
        - sys_protocol_history limit=10
        - mem_hypothesis_list
      Combine into a working summary. Do NOT call other tools yet.

  - id: propose_via_tool
    name: Generate a Next-Step Plan
    description: |
      tool_plan_next_step goal="<optional focus>"
      This:
        - pulls recent conclusions + audit warnings
        - searches Semantic Scholar for fresh literature on the open hypothesis
        - searches the web for relevant tools / libraries (if goal supplied)
        - writes a structured plan markdown into the active step
        - returns recommendations sorted by priority

  - id: present_options
    name: Present 2-3 Concrete Options
    description: |
      Distil the plan markdown into 2-3 concrete options for the researcher:
        OPTION A: <action> — pros, cons, time estimate
        OPTION B: <action> — pros, cons, time estimate
        OPTION C: <action> — pros, cons, time estimate
      Recommend ONE (with rationale). Ask the researcher to pick or refine.

      AUTONOMY GATE:
        manual / supervised → wait for the researcher to choose.
        autopilot           → pick OPTION A (your top choice), tell the
                              researcher "I'm going with A — say stop to switch".

  - id: branch_or_extend
    name: Branch vs Extend (when ambiguous)
    description: |
      If two options both have merit, call tool_branch_recommendation reason="<short>".
      The recommendation tells you whether to fork a new parallel experiment
      OR finish the current one first.

  - id: commit_and_run
    name: Commit the Decision and Run It
    description: |
      mem_decision_log
        context="Iterative-planning step"
        selected="<the chosen option>"
        rationale="<from the plan markdown>"

      Then load the matching protocol:
        - new experiment → guidance/analysis_plan
        - failed direction → guidance/dead_end_routing
        - ready for paper → synthesis/synthesis_paper
        - reproducibility check → reproducibility/reproducibility

expected_outputs: []

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
