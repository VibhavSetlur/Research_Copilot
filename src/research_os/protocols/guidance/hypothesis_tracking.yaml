id: hypothesis_tracking
name: Hypothesis Tracking
version: '4.0.0'
schema_version: '2.0'
description: Maintain a clear ledger of active, supported, and refuted hypotheses across the project.
trigger: Whenever a step generates evidence that confirms / disconfirms / refines a hypothesis.

steps:
  - id: record_hypothesis
    name: Record / Update Hypothesis
    description: |
      State the hypothesis as a single declarative sentence with predicted direction
      and effect (e.g. "PM2.5 exposure is positively associated with ER visits,
      effect size r > 0.3"). Append or update via:
        mem_analysis_log entry="HYPOTHESIS <id>: <statement> | status=<testing|supported|refuted|inconclusive> | evidence=<step:finding>"
      One hypothesis per line — easy to grep.

  - id: assess_evidence
    name: Tag with Current Status
    description: |
      For every hypothesis update, pick one status and justify it in one line:
        testing      — being investigated, not enough evidence
        supported    — primary evidence points toward it
        refuted      — primary evidence rules it out
        inconclusive — evidence is mixed; need more data / power
      Cite the specific experiment step(s) that drove the change.

  - id: propagate_to_writing
    name: Propagate to Methods + Conclusions
    description: |
      Make sure workspace/methods.md and the current experiment's conclusions.md
      reference the hypothesis ID. This makes the paper's "What we tested" and
      "What we found" sections trivially auditable.

expected_outputs: []

next_protocol: null
on_failure: null
