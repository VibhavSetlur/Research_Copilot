name: session_boot
version: 1.0.0
description: 'MANDATORY: Run before any other protocol. Read researcher config and
  set behavioral mode.'
steps:
- id: read_config
  description: Call sys.config.get. Parse the result.
  name: Read Researcher Config
- id: set_autonomy
  description: 'Based on interaction.autonomy_level:

    - manual: Ask for explicit approval before every tool call. Explain each step.

    - supervised: Ask for approval before destructive or creative steps (path creation,
    synthesis). Run reads and logs autonomously.

    - autopilot: Run all steps autonomously. Notify researcher on completion only.

    '
  name: Set Autonomy
- id: set_depth
  description: 'Based on researcher.expertise_level:

    - beginner: Explain every concept, use plain language, ask clarifying questions
    freely.

    - intermediate: Standard explanation depth. Define jargon once.

    - advanced: Skip basics. Focus on decisions and results.

    - pi: Minimal explanation. Present options and outcomes only.

    '
  name: Set Depth
- id: set_model_profile
  description: Note model_profile (small/medium/large). This determines protocol variant
    loaded.
  name: Set Model Profile
- id: confirm_ready
  description: 'State: ''I have loaded your researcher profile. Autonomy: X, Expertise:
    Y, Model: Z. Ready to begin.'''
  name: Confirm Ready
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''session_boot completed''.

    5. Ask researcher: ''I''ve completed session_boot. Want me to proceed to the next
    protocol?'''
next_protocol: guidance/project_startup
schema_version: '1.0'
