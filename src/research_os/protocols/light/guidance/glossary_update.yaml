name: glossary_update
version: 1.0.0
description: Update docs/glossary.md with new domain-specific terms introduced 
  during analysis.
steps:
- id: collect_terms
  name: Collect Terms
  description: Identify 3-10 domain-specific terms introduced in this step.
- id: update_glossary
  name: Update Glossary
  description: Read docs/glossary.md, add new terms in table format, write back.
- id: confirm
  name: Confirm Update
  description: Confirm update count to researcher.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call sys_checkpoint.create with description='glossary_update completed'.\n\
    3. Ask researcher: 'I've completed glossary_update. Want me to proceed?'\n\n \
    \   - ENVIRONMENT CHECK: Validate that any new tools/libraries have been snapshotted
    to the step's environment file.\n    - GROUNDING CHECK: Ensure you have ACTUALLY
    called search tools (search_semantic_scholar, search_web, etc.) to ground your
    decisions, and updated workspace/logs/methods_research.log. Do not rely solely
    on pre-trained knowledge!"
schema_version: '1.0'
