name: hypothesis_tracking
version: 1.0.0
description: Track, update, and validate research hypotheses throughout 
  analysis.
steps:
- id: read_hypotheses
  name: Read Hypotheses
  description: Read docs/hypotheses.md or create from research_question.md.
- id: update_status
  name: Update Status
  description: 'For each hypothesis, assess and update status: TESTING, SUPPORTED,
    REJECTED, or INCONCLUSIVE.'
- id: log_update
  name: Log Update
  description: Call mem_analysis.log with hypothesis status summary.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call sys_checkpoint.create with description='hypothesis_tracking
    completed'.\n3. Ask researcher: 'I've completed hypothesis_tracking. Want me to
    proceed?'\n\n    - ENVIRONMENT CHECK: Validate that any new tools/libraries have
    been snapshotted to the step's environment file.\n    - GROUNDING CHECK: Ensure
    you have ACTUALLY called search tools (search_semantic_scholar, search_web, etc.)
    to ground your decisions, and updated workspace/logs/methods_research.log. Do
    not rely solely on pre-trained knowledge!"
schema_version: '1.0'
