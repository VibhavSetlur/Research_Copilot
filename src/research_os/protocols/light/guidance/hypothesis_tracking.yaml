name: hypothesis_tracking
version: 1.0.0
description: Track, update, and validate research hypotheses throughout analysis.
steps:
- id: read_hypotheses
  name: Read Hypotheses
  description: Read docs/hypotheses.md or create from research_question.md.
- id: update_status
  name: Update Status
  description: 'For each hypothesis, assess and update status: TESTING, SUPPORTED, REJECTED, or INCONCLUSIVE.'
- id: log_update
  name: Log Update
  description: Call mem.analysis.log with hypothesis status summary.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call sys.checkpoint.create with description=''hypothesis_tracking completed''.

    3. Ask researcher: ''I''ve completed hypothesis_tracking. Want me to proceed?'''
schema_version: '1.0'
