name: session_boot
version: 1.1.0
description: 'MANDATORY: Run before any other protocol. Read researcher config and set behavioral mode. Consolidates all session-start reads into a single turn.'
steps:
- id: load_context
  name: Load Session Context (Single Turn)
  description: |
    Make EXACTLY these two calls, in order — no more, no less:
    1. sys_config_get — get researcher profile (autonomy, expertise, model_profile, goals)
    2. sys_state_get — get current pipeline_stage, active path, protocol history

    DO NOT call sys_workspace_tree, sys_file_list, sys_protocol_history, or any other
    tool during boot. Those are called during the active protocol steps.
    Combine all information from these two calls into your internal session state.

- id: set_behavior
  name: Set Behavioral Mode
  description: |
    Based on interaction.autonomy_level from config:
    - manual: Ask before every tool call. steps_per_turn=1.
    - supervised: Ask before path creation, synthesis, writing. steps_per_turn=2.
    - autopilot: Run all steps autonomously. steps_per_turn=5.

    Based on researcher.expertise_level:
    - beginner: Plain language, explain every concept.
    - intermediate: Standard depth. Define jargon once.
    - advanced: Skip basics. Focus on decisions and results.
    - pi: Minimal explanation. Present options and outcomes only.

    Note model_profile for protocol variant selection.

- id: confirm_ready
  name: Confirm Ready
  description: |
    In ONE message, state:
    - Current pipeline stage and what has been done (from state)
    - Autonomy mode and expertise level loaded
    - What the next recommended action is (from pipeline_stage)

    Example: "Profile loaded (autopilot / intermediate). Project is at stage 'init'
    — ready to begin project_startup. Shall I proceed?"

    If pipeline_stage is NOT 'init', summarize what has been completed and ask
    what the researcher wants to do next.

next_protocol: guidance/project_startup
schema_version: '1.0'
