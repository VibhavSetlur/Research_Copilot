name: writing_core
version: 1.0.0
description: "Universal writing rules for all Research OS outputs."
schema_version: "1.0"

rules:
  banned_phrases:
    - "It is important to note that"
    - "Interestingly,"
    - "Surprising as it may seem"
    - "Delve into"
    - "In this tapestry of"
    - "As a language model"
    - "Needless to say"
    - "It goes without saying"
    - "As shown above"
    - "Due to the fact that"
    - "In order to"

  causal_language:
    - "Do not use 'causes', 'proof', or 'proves' unless RCT/proof."
    - "Use 'associated with', 'correlated with' for observational data."

  number_formatting:
    - "p-values with exactly 3 decimals (p = 0.042)."
    - "Report 95% CI."

  tense_rules:
    - "Past tense for methods/results."
    - "Present tense for facts/conclusions."

steps:
  - id: verify_core_rules
    name: "Verify Core Rules"
    description: "Check for banned phrases, causal language, numbers, and tenses."
