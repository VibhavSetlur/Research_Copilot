name: writing_conclusions
version: 1.0.0
description: How to write per‑step conclusions.
always_include:
- writing_core
template: '# {step_name} — Conclusions


  ## Key Findings

  1. {finding_1_with_number}

  2. {finding_2_with_number}


  ## Statistical Summary

  | Metric | Value | 95% CI | p-value |

  |--------|-------|--------|---------|

  | {metric} | {value} | [{lower}, {upper}] | {p} |


  ## Bugs / Issues Encountered

  - {bug_or_none}


  ## Routing Decision

  - **Next Step:** {next_step}

  - **Rationale:** {why}

  - **Continue in Same Path:** {yes/no}

  - **New Path Number (if applicable):** {path_number}


  ## Data Changes

  - {new_data_or_none}

  '
steps:
- id: write_conclusions
  name: Write Conclusions
  description: Populate conclusions.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='writing_conclusions
    completed'.\n5. Ask researcher: 'I've completed writing_conclusions. Want me to
    proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new
    tools/libraries have been snapshotted to the step's environment file.\n    - GROUNDING
    CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
schema_version: '1.0'
