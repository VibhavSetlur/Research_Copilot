name: synthesis_paper
version: 1.0.0
description: Guide to building synthesis/paper.md section-by-section.
always_include:
- writing_core
schema_version: '1.0'
section_order:
  1: Methods
  2: Results
  3: Discussion
  4: Abstract
  5: Final Assembly
tool_calls: Use tool_synthesize with section parameter.
sources:
- workspace/methods.md
- workspace/analysis.md
- workspace/citations.md
- workspace/*/conclusions.md
- workspace/*/outputs/figures/*
turn_structure:
  autonomy_manual:
    steps_per_turn: 1
    approval_required_before: all
  autonomy_supervised:
    steps_per_turn: 2
    approval_required_before:
      - final_assembly
  autonomy_autopilot:
    steps_per_turn: 5
    approval_required_before:
      - final_assembly
steps:
- id: draft_methods
  name: Draft Methods Section
  description: Draft Methods.
- id: draft_results
  name: Draft Results Section
  description: Draft Results.
- id: draft_discussion
  name: Draft Discussion Section
  description: Draft Discussion.
- id: draft_abstract
  name: Draft Abstract
  description: Draft Abstract.
- id: final_assembly
  name: Final Assembly
  description: Combine all sections.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem_analysis.log with completion summary.

    2. Call mem_methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys_file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys_checkpoint.create with description=''synthesis_paper completed''.

    5. Ask researcher: ''I''ve completed synthesis_paper. Want me to proceed to the
    next protocol?'''
