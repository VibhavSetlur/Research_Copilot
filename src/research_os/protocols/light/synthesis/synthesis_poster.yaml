name: synthesis_poster
version: 1.0.0
description: Generate a professional research poster.
always_include:
- writing_core
steps:
- id: collect_content
  name: Collect Content
  description: Gather key findings, figures, and conclusions from workspace.
- id: call_poster_tool
  name: Generate Poster
  description: Call tool_
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem_analysis.log with completion summary.

    2. Call mem_methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys_file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys_checkpoint.create with description=''synthesis_poster completed''.

    5. Ask researcher: ''I''ve completed synthesis_poster. Want me to proceed to the
    next protocol?'''
schema_version: '1.0'
