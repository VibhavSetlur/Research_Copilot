name: analysis_plan
version: 2.1.0
schema_version: "1.0"

structure:
  01_data_prep:
    purpose: Data cleaning, filtering, feature engineering.
  02_analysis:
    purpose: Statistical modelling, core computations.
  note: "Do NOT create a synthesis step. Synthesis is handled by tool.synthesize into the top‑level synthesis/ folder. Step folders are named {step_number}_{descriptor} (e.g., 01_data_prep). Path tracking adds _path_N when starting a new research track."

templates:
  boilerplate_readme: '# {folder_name} **Objective**: {description} **Inputs**: {list} **Outputs**: {list} **Scripts**: {list} '

path_creation_criteria:
  create_new_path_when:
    - Testing high‑risk data transformations.
    - Trying an alternative model architecture.
    - Beginning a new research track.
  continue_in_same_path_when:
    - Adding robustness checks.
    - Fixing bugs.
    - Continuing the same research track.

steps:
  - id: setup_directories
    name: Setup directories
    description: Ensure experiment folders exist (01_, 02_, …). No synthesis step.
  - id: write_readmes
    name: Write READMEs
    description: Populate directories with boilerplate README.
  - id: evaluate_path_creation
    name: Evaluate path creation
    description: Decide whether next step starts a new track or continues.
