name: causal_inference_deep
version: 2.0.0
schema_version: '1.0'
description: Concise checklist for causal inference
expected_outputs:
- workspace/{step_number}_{descriptive_name}/outputs/figures/causal_dag.png
- workspace/{step_number}_{descriptive_name}/outputs/reports/causal_estimates.json
- workspace/{step_number}_{descriptive_name}/outputs/reports/refutation_results.json
steps:
- id: create_experiment_path
  name: Create Experiment Path
  description: Execute create_experiment_path step.
- id: dag_creation
  name: DAG Creation
  description: Execute dag_creation step.
- id: identification
  name: Identification
  description: Execute identification step.
- id: estimation
  name: Estimation
  description: Execute estimation step.
- id: refutation
  name: Refutation Tests
  description: Execute refutation step.
- id: evalue
  name: E-value Calculation
  description: Execute evalue step.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='causal_inference_deep
    completed'.\n5. Ask researcher: 'I've completed causal_inference_deep. Want me
    to proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any
    new tools/libraries have been snapshotted to the step's environment file.\n  \
    \  - GROUNDING CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
next_protocol: methodology/methodology_selection
