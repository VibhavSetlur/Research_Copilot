name: research_methods
version: 1.0.0
description: Guide to researching and selecting appropriate statistical/analytical
  methods for a given dataset and research question.
always_include: []
schema_version: '1.0'
steps:
- id: understand_data
  name: Understand Data Characteristics
  description: Use the data inventory (workspace/logs/data_inventory.json) to extract variable types, scales, sample size, and missingness.
- id: define_goal
  name: Define Research Goal
  description: 'Identify the primary objective: description, prediction, association,
    causal inference, classification, clustering, etc.'
- id: search_literature
  name: Search Literature for Methods
  description: '- Construct a query for Semantic Scholar: "[domain] [goal] statistical
    method".'
- id: search_documentation
  name: Search for Tool/Library Documentation
  description: Search for official documentation of candidate methods via web search or Semantic Scholar.
- id: evaluate_options
  name: Evaluate Options
  description: For each candidate method, assess data compatibility, assumption testability, and package availability.
- id: log_decision
  name: Log Decision
  description: Populate workspace/{step_number}_.../methods_research.md with selected method, reasoning, and sources.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''research_methods completed''.

    5. Ask researcher: ''I''ve completed research_methods. Want me to proceed to the
    next protocol?'''
next_protocol: methodology/methodology_selection
