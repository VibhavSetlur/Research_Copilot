name: research_methods
version: 1.0.0
description: Guide to researching and selecting appropriate 
  statistical/analytical methods for a given dataset and research question.
always_include: []
schema_version: '1.0'
steps:
- id: understand_data
  name: Understand Data Characteristics
  description: Use the data inventory (workspace/logs/data_inventory.json) to 
    extract variable types, scales, sample size, and missingness.
- id: define_goal
  name: Define Research Goal
  description: 'Identify the primary objective: description, prediction, association,
    causal inference, classification, clustering, etc.'
- id: search_literature
  name: Search Literature for Methods
  description: '- Construct a query for Semantic Scholar: "[domain] [goal] statistical
    method".'
- id: search_documentation
  name: Search for Tool/Library Documentation
  description: Search for official documentation of candidate methods via web 
    search or Semantic Scholar.
- id: evaluate_options
  name: Evaluate Options
  description: For each candidate method, assess data compatibility, assumption 
    testability, and package availability.
- id: log_decision
  name: Log Decision
  description: Populate workspace/{step_number}_.../methods_research.md with 
    selected method, reasoning, and sources.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='research_methods
    completed'.\n5. Ask researcher: 'I've completed research_methods. Want me to proceed
    to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new tools/libraries
    have been snapshotted to the step's environment file.\n    - GROUNDING CHECK:
    Ensure you have ACTUALLY called search tools (search_semantic_scholar, search_web,
    etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
next_protocol: methodology/methodology_selection
