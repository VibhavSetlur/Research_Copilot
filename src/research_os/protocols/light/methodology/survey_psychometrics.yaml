name: survey_psychometrics
version: 2.0.0
schema_version: '1.0'
description: Concise checklist for survey psychometrics
expected_outputs:
- workspace/{step_number}_{descriptive_name}/outputs/reports/reliability_metrics.json
- workspace/{step_number}_{descriptive_name}/outputs/reports/cfa_results.txt
- workspace/{step_number}_{descriptive_name}/outputs/reports/non_response_bias.md
steps:
- id: create_experiment_path
  name: Create Experiment Path
  description: Execute create_experiment_path step.
- id: scale_validation
  name: Scale Validation
  description: Execute scale_validation step.
- id: sampling_weights
  name: Apply Sampling Weights
  description: Execute sampling_weights step.
- id: non_response_bias
  name: Non-Response Bias Analysis
  description: Execute non_response_bias step.
- id: reporting
  name: Reporting Standards
  description: Execute reporting step.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='survey_psychometrics
    completed'.\n5. Ask researcher: 'I've completed survey_psychometrics. Want me
    to proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any
    new tools/libraries have been snapshotted to the step's environment file.\n  \
    \  - GROUNDING CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
next_protocol: methodology/methodology_selection
