name: machine_learning
version: 2.0.0
schema_version: '1.0'
description: Concise checklist for predictive modelling
expected_outputs:
- workspace/{step_number}_{descriptive_name}/outputs/reports/model_performance.json
- workspace/{step_number}_{descriptive_name}/outputs/figures/shap_summary.png
- workspace/{step_number}_{descriptive_name}/outputs/figures/calibration_plot.png
steps:
- id: create_experiment_path
  name: Create Experiment Path
  description: Execute create_experiment_path step.
- id: data_splitting
  name: Data Splitting
  description: Execute data_splitting step.
- id: feature_engineering
  name: Feature Engineering
  description: Create and select features for the model.
- id: model_selection
  name: Model Selection & Tuning
  description: Compare and select the best model.
- id: performance_metrics
  name: Calculate Performance Metrics
  description: Execute performance_metrics step.
- id: model_interpretation
  name: Model Interpretation
  description: Execute model_interpretation step.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''machine_learning completed''.

    5. Ask researcher: ''I''ve completed machine_learning. Want me to proceed to the
    next protocol?'''
next_protocol: methodology/methodology_selection
