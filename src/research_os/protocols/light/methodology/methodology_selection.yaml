name: methodology_selection
version: 2.0.0
schema_version: '1.0'
decision_matrix:
  layers:
    1_outcome_type:
    - continuous
    - binary
    - count
    - time-to-event
    2_data_structure:
    - independent
    - repeated
    - nested
    - spatial
    3_number_of_variables:
    - univariate
    - multivariate
    - high-dimensional
  mappings:
    continuous_independent_multivariate:
      method: Multiple Linear Regression
      library: statsmodels (Python) / lm (R)
      assumptions:
      - Linearity
      - Independence of errors
      - Homoscedasticity
      - Normality of residuals
      - No multicollinearity
    binary_independent_multivariate:
      method: Logistic Regression
      library: scikit-learn (Python) / glm (R)
      assumptions:
      - Linearity of independent variables and log-odds
      - Absence of multicollinearity
    time-to-event_independent_multivariate:
      method: Cox Proportional Hazards
      library: lifelines (Python) / survival (R)
      assumptions:
      - Proportional hazards
      - Non-informative censoring
    fallback:
      method: Random Forest / Gradient Boosting (Non-parametric)
      library: scikit-learn / xgboost
      assumptions:
      - Representative sampling
      - Stationarity (if time series)
    count_independent_multivariate:
      method: Poisson / Negative Binomial Regression
      library: statsmodels (Python) / MASS (R)
      assumptions:
      - Events are independent
      - Mean equals variance (Poisson) or variance > mean (NB)
    continuous_repeated_multivariate:
      method: Mixed Effects / GEE
      library: statsmodels (Python) / lme4 (R)
      assumptions:
      - Random effects are normally distributed
      - Independence between subjects
    continuous_nested_multivariate:
      method: Multilevel Models (Hierarchical)
      library: statsmodels (Python) / lme4 (R)
      assumptions:
      - Linearity
      - Normality at each level
      - Homoscedasticity
    continuous_spatial_multivariate:
      method: Spatial Regression / Kriging
      library: PySAL / sklearn.gaussian_process (Python) / spdep (R)
      assumptions:
      - Spatial autocorrelation
      - Stationarity
    continuous_independent_high-dimensional:
      method: LASSO / Elastic Net / PCA+Regression
      library: scikit-learn (Python) / glmnet (R)
      assumptions:
      - Sparsity (LASSO)
      - Linearity
    time-to-event_independent_competing_risks:
      method: Fine-Gray Competing Risks
      library: lifelines (Python) / cmprsk (R)
      assumptions:
      - Proportional subdistribution hazards
      - Independent censoring
steps:
- id: identify_layers
  name: Identify Matrix Layers
  description: Determine outcome type, data structure, and number of variables.
- id: select_methodology
  name: Select Methodology
  description: "Use the decision matrix mapping to pick the method, library, and template.\n\
    \nCRITICAL: You MUST use search tools (search_semantic_scholar, search_web, etc.)
    to ground your methodological choices. DO NOT hallucinate methods based on pre-trained
    knowledge."
- id: document_assumptions
  name: Document Assumptions
  description: List the assumptions that must be tested during the analysis.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='methodology_selection
    completed'.\n5. Ask researcher: 'I've completed methodology_selection. Want me
    to proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any
    new tools/libraries have been snapshotted to the step's environment file.\n  \
    \  - GROUNDING CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
next_protocol: literature/literature_search
