name: audit_and_validation
version: 2.0.0
schema_version: '1.0'
validators:
  citation_validator:
    pass_1_doi: Attempt to resolve all DOIs. Flag broken links.
    pass_2_abstract: Verify that the claim in the text matches the abstract's conclusion.
    pass_3_retraction: Query the Retraction Watch database or Crossref for retracted
      status.
  statistical_assumptions:
    action: Re-read the assumptions logged during methodology_selection. Run specific
      tests (e.g., Shapiro-Wilk for normality, VIF for multicollinearity) and log
      the p-values/metrics.
  causal_language:
    regex_patterns:
    - (?i)\b(causes?|caused|causing)\b
    - (?i)\b(leads? to|led to)\b
    - (?i)\b(results? in|resulted in)\b
    - (?i)\b(impacts?|impacted)\b
    action: Scan manuscript drafts using these regex patterns. If the study design
      is observational, flag these matches for manual review and suggest associative
      language instead.
  code_linter:
    command_python: ruff check workspace/02_analysis/ || pylint workspace/02_analysis/
steps:
- id: validate_citations
  name: Validate Citations
  description: Execute the three-pass citation validator.
- id: check_assumptions
  name: Check Assumptions
  description: Run statistical tests to verify the assumptions hold true on the actual
    data.
- id: lint_code
  name: Lint Code
  description: Run code linters to ensure syntax and style compliance.
