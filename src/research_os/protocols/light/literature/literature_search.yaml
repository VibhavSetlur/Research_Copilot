name: literature_search
version: 2.0.0
schema_version: '1.0'
search_strategies:
  mesh_discovery:
    description: Use PubMed MeSH database to find official terms before building
      the hedge.
    example: If searching for 'heart attack', discover 'Myocardial 
      Infarction'[Mesh].
  synonym_expansion:
    description: Combine MeSH terms with Title/Abstract (tiab) free-text 
      synonyms using OR.
    example: ('Myocardial Infarction'[Mesh] OR 'heart attack'[tiab] OR 
      'myocardial infarction'[tiab])
  pubmed_hedge:
    example: ("Neoplasms"[Mesh] OR "cancer"[tiab] OR "tumor"[tiab]) AND 
      ("Immunotherapy"[Mesh] OR "immunotherapy"[tiab]) AND (English[la])
  semantic_scholar:
    citation_chasing:
      description: Once key seed papers are found, use 
        `tool_search.semantic_scholar` to retrieve their `citations` (forward 
        chasing) and `references` (backward chasing) via their DOI or CorpusID.
  arxiv: {}
filters:
  quality:
    min_citations: 5
    exception_years_recent: 2
  deduplication_algorithm:
    step1: Exact match on DOI
    step2: Fuzzy match on Title (Levenshtein distance < 3) AND exact match on 
      first author's last name
prisma_flow:
  steps:
    1_identification: Record total records identified from each database.
    2_screening: Remove duplicates using the deduplication_algorithm. Record 
      count.
    3_eligibility: Apply quality filters (citations/recency). Record excluded 
      count.
    4_included: Final list of studies included in synthesis.
steps:
- id: generate_search_strings
  name: Generate Search Strings
  description: Fill the placeholders in the string templates.
- id: execute_search
  name: Execute Search
  description: Query databases, applying the quality filters.
- id: deduplicate
  name: Deduplicate
  description: Run the deduplication algorithm across all results.
- id: build_prisma_flow
  name: Build PRISMA Flow
  description: Document the PRISMA step counts in analysis.md.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='literature_search
    completed'.\n5. Ask researcher: 'I've completed literature_search. Want me to
    proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new
    tools/libraries have been snapshotted to the step's environment file.\n    - GROUNDING
    CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
next_protocol: literature/evidence_synthesis
