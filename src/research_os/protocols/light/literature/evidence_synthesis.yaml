name: evidence_synthesis
version: 2.0.0
schema_version: '1.0'
templates:
  evidence_table_apa: '| Author(s) & Year | Study Design | Sample Size | Key Findings
    | GRADE Strength |

    |------------------|--------------|-------------|--------------|----------------|

    | Doe et al., 2023 | RCT          | N=250       | ...          | High           |

    '
grade_system:
  high: RCTs without serious limitations, or overwhelming evidence from 
    observational studies.
  moderate: RCTs with limitations, or strong observational studies.
  low: Observational studies with limitations.
  very_low: Case series, expert opinion, or studies with severe flaws.
automated_contradiction_detector:
  rule: Extract the primary outcome direction (positive, negative, null) for 
    each paper. If Paper A asserts positive and Paper B asserts negative/null 
    for the same relationship, flag as a contradiction.
  action: Log all flagged contradictions in 
    workspace/synthesis/contradictions.md and prompt for potential reasons 
    (e.g., different populations, dosages, or timeframes).
steps:
- id: build_evidence_table
  name: Build Evidence Table
  description: Extract data from included papers and fill the APA-style 
    template.
- id: grade_evidence
  name: Grade Evidence
  description: Assign a GRADE strength to each paper.
- id: detect_contradictions
  name: Detect Contradictions
  description: Run the automated contradiction detector and log conflicts.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='evidence_synthesis
    completed'.\n5. Ask researcher: 'I've completed evidence_synthesis. Want me to
    proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new
    tools/libraries have been snapshotted to the step's environment file.\n    - GROUNDING
    CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
next_protocol: methodology/methodology_selection
