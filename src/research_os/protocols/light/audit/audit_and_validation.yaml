name: audit_and_validation
version: 2.0.0
schema_version: '1.0'
validators:
  citation_validator:
    pass_1_doi: Attempt to resolve all DOIs. Flag broken links.
    pass_2_abstract: Verify that the claim in the text matches the abstract's 
      conclusion.
    pass_3_retraction: Query the Retraction Watch database or Crossref for 
      retracted status.
  statistical_assumptions:
    action: Re-read the assumptions logged during methodology_selection. Run 
      specific tests (e.g., Shapiro-Wilk for normality, VIF for 
      multicollinearity) and log the p-values/metrics.
  causal_language:
    regex_patterns:
    - (?i)\b(causes?|caused|causing)\b
    - (?i)\b(leads? to|led to)\b
    - (?i)\b(results? in|resulted in)\b
    - (?i)\b(impacts?|impacted)\b
    action: Scan manuscript drafts using these regex patterns. If the study 
      design is observational, flag these matches for manual review and suggest 
      associative language instead.
  code_linter:
    command_python: ruff check workspace/*/scripts/ || pylint 
      workspace/*/scripts/
steps:
- id: validate_citations
  name: Validate Citations
  description: Execute the three-pass citation validator.
- id: check_assumptions
  name: Check Assumptions
  description: Run statistical tests to verify the assumptions hold true on the 
    actual data.
- id: lint_code
  name: Lint Code
  description: Run code linters to ensure syntax and style compliance.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='audit_and_validation
    completed'.\n5. Ask researcher: 'I've completed audit_and_validation. Want me
    to proceed to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any
    new tools/libraries have been snapshotted to the step's environment file.\n  \
    \  - GROUNDING CHECK: Ensure you have ACTUALLY called search tools (search_semantic_scholar,
    search_web, etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
next_protocol: synthesis/synthesis_paper
