name: meta_analysis
version: 2.0.0
schema_version: "1.0"
description: "Concise checklist for meta-analysis"
expected_outputs:
  - workspace/<path>/outputs/figures/forest_plot.png
  - workspace/<path>/outputs/figures/funnel_plot.png
  - workspace/<path>/outputs/reports/meta_analysis_report.md
steps:
  - id: create_experiment_path
    description: Create a new path via sys.path.create (e.g., 03_meta_analysis) to store scripts and outputs.
  - id: extract_effect_sizes
    name: "Extract Effect Sizes"
  - id: assess_heterogeneity
    name: "Assess Heterogeneity"
  - id: perform_meta_analysis
    name: "Perform Meta-Analysis"
  - id: generate_plots
    name: "Generate Plots"
  - id: test_publication_bias
    name: "Test Publication Bias"
