id: causal_inference_deep
name: Causal Inference (Deep)
version: '4.0.0'
schema_version: '2.0'
description: DAG-based causal analysis for observational data — identification, estimation, and refutation.
trigger: Researcher needs a causal estimate from observational data (e.g. DoWhy / EconML workflow).
prerequisites:
  - methodology_selection has been run and observational design chosen
  - workspace/methods.md mentions a causal target

steps:
  - id: create_step
    name: Create Experiment Step
    description: |
      sys_path_create name="causal_<treatment>_<outcome>"
      hypothesis="Treatment X has a non-zero average effect on outcome Y in population P."

  - id: dag_construction
    name: Build the Causal DAG
    description: |
      Write a DAG description as a dot file at workspace/<step>/outputs/figures/causal_dag.dot
      AND render to PNG via a matplotlib/graphviz script. Nodes: treatment, outcome,
      observed confounders, mediators, instruments (if any), unobserved confounders
      (dashed). Justify every edge with a 1-line comment.

  - id: identification
    name: Identification Strategy
    description: |
      Choose ONE based on the DAG:
        Backdoor (control for all open backdoor paths) — most common.
        Frontdoor (mediator unconfounded by treatment).
        Instrumental variable (valid instrument exists).
        Difference-in-differences (panel + parallel trends).
        Regression discontinuity (sharp cutoff exists).
      Document the choice + assumptions in workspace/<step>/outputs/reports/identification.md.

  - id: estimation
    name: Estimate the Causal Effect
    description: |
      Implement via dowhy / econml / statsmodels:
        Backdoor → IPW, OLS adjustment, matching, Double ML.
        IV       → 2SLS or LIML.
        DiD      → fixed-effects with treatment×post.
        RDD      → local linear regression at the cutoff.
      Report ATE / ATT / LATE with bootstrap or robust CIs.
      Save numerical results to workspace/<step>/outputs/reports/causal_estimates.json.

  - id: refutation
    name: Refutation Tests
    description: |
      Run ALL applicable:
        - Placebo treatment (random treatment shouldn't show effect).
        - Random common cause (adding noise covariate shouldn't change estimate).
        - Subset robustness (estimate stable across population subsets).
        - Negative control outcome (effect should be near zero on unrelated outcome).
      Log results to workspace/<step>/outputs/reports/refutation_results.md.

  - id: sensitivity_evalue
    name: Sensitivity (E-value)
    description: |
      Compute the E-value (VanderWeele & Ding 2017) for the point estimate and
      the lower CI bound. Report what magnitude of unmeasured confounding could
      explain away the effect. Add to causal_estimates.json.

expected_outputs:
  - workspace/*/outputs/figures/causal_dag.png
  - workspace/*/outputs/reports/identification.md
  - workspace/*/outputs/reports/causal_estimates.json
  - workspace/*/outputs/reports/refutation_results.md

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
