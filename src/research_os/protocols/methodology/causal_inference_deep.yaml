name: causal_inference_deep
version: 2.0.0
description: DoWhy-based causal analysis and DAG creation.
schema_version: '1.0'
expected_outputs:
- workspace/{step_number}_{descriptive_name}/outputs/figures/causal_dag.png
- workspace/{step_number}_{descriptive_name}/outputs/reports/refutation_results.md
- workspace/{step_number}_{descriptive_name}/outputs/reports/causal_estimates.json
_output_path_note: '{step_number}_{descriptive_name} is created by sys.path.create.
  Example names: 02_dag_identification, 03_causal_estimation_path_1.'
prerequisites:
- Observational dataset.
- 'Python libraries: dowhy, econml.'
decision_tree:
- Are there unobserved confounders? -> Use instrumental variables if available, or
  compute E-values.
steps:
- id: create_experiment_path
  name: Create Experiment Path
  description: Create a new path via sys.path.create to store scripts and outputs.
- id: dag_creation
  name: DAG Creation
  description: Define causal graph and identify backdoor/frontdoor paths. (Integration
    with DAGitty)
- id: identification
  name: Identification
  description: Identify the causal estimand using backdoor or instrumental variable
    criteria.
- id: estimation
  name: Estimation
  description: Estimate the causal effect using methods like IPW, Double Machine Learning
    (DML), or matching.
- id: refutation
  name: Refutation Tests
  description: 'Perform robustness checks: placebo treatment, random common cause,
    subset data.'
- id: evalue
  name: E-value Calculation
  description: Calculate E-value to quantify robustness to unmeasured confounding.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''causal_inference_deep completed''.

    5. Ask researcher: ''I''ve completed causal_inference_deep. Want me to proceed
    to the next protocol?'''
checkpoints:
- Verify covariate balance after matching or weighting.
- Ensure refutation tests do not significantly alter the estimate.
next_protocol: methodology/methodology_selection
