id: clinical_trials
name: Clinical Trial Analysis (CONSORT)
version: '4.0.0'
schema_version: '2.0'
description: CONSORT-compliant analysis of randomised clinical trial data.
trigger: Trial registry + raw trial data provided; design is RCT (with or without blinding).
prerequisites:
  - Trial protocol & registry number are in docs/research_design.md
  - Raw randomisation table + outcomes data in inputs/raw_data/

steps:
  - id: create_step
    name: Create Trial Analysis Step
    description: sys_path_create name="trial_<primary_outcome>" hypothesis="<H1 from protocol>"

  - id: randomisation_check
    name: Randomisation & Baseline Balance Check
    description: |
      Tabulate baseline characteristics by arm. Report standardised mean differences
      (SMD); flag |SMD|>0.10 as imbalance. Save to outputs/tables/baseline.csv and
      outputs/reports/randomisation_check.md.

  - id: itt_vs_pp_definition
    name: Define Analysis Populations
    description: |
      Make ITT (intention-to-treat) primary. Define per-protocol secondary. Document
      both populations and number of participants in each.

  - id: missing_data_handling
    name: Missing Data Plan
    description: |
      Quantify missingness per outcome and per arm. Apply multiple imputation (MICE)
      if MAR is reasonable. Also run sensitivity analyses: complete-case, tipping-point.
      Save imputed datasets to data/output/ and a summary to outputs/reports/missing_data.md.

  - id: primary_analysis
    name: Primary Outcome Analysis
    description: |
      Use the pre-specified test from research_design.md. Report the effect estimate,
      95% CI, and exact p-value. Save to outputs/reports/primary_analysis.md.

  - id: safety_analysis
    name: Adverse Events Reporting
    description: |
      Tabulate AEs by arm and severity (CTCAE if oncology). Include SAEs separately.
      Save to outputs/tables/adverse_events.csv and outputs/reports/safety.md.

  - id: participant_flow
    name: CONSORT Flow Diagram
    description: |
      Generate the standard CONSORT 2010 flow diagram: enrolled → randomised →
      allocated → received → followed up → analysed. Save to
      outputs/figures/consort_flow.png.

expected_outputs:
  - workspace/*/outputs/tables/baseline.csv
  - workspace/*/outputs/tables/adverse_events.csv
  - workspace/*/outputs/reports/primary_analysis.md
  - workspace/*/outputs/figures/consort_flow.png

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
