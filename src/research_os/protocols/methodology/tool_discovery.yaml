name: tool_discovery
version: 1.0.0
description: Guide to discovering and evaluating Python/R/Julia packages for a 
  specific task.
always_include: []
schema_version: '1.0'
trigger: When the AI needs a library for a task but doesn't know which one to 
  use.
steps:
- id: formulate_query
  name: Formulate Search Query
  description: 'Build a specific query: "<task> Python library", e.g., "survival analysis
    Python library".

    If the researcher''s environment includes R, also search for "<task> R package".

    '
- id: search_web
  name: Search the Web
  description: 'Use tool_search.web with the query. Gather top 5 results.

    For each, extract: library name, official documentation URL, GitHub repository
    URL.

    '
- id: evaluate_library
  name: Evaluate Library Quality
  description: 'For each candidate, check (via tool_search.web or direct GitHub API):

    - Last commit date (should be within 12 months)

    - Number of GitHub stars (indicates community trust)

    - Documentation quality (does it have a user guide? examples?)

    - Compatibility with the current language environment

    '
- id: test_installation
  name: Test Installation Feasibility
  description: 'Call tool_package.install with the library name.

    If installation fails, note the error and consider the next candidate.

    '
- id: log_decision
  name: Log Decision
  description: 'Record the selected library, its version, documentation URL, and justification
    in methods_research.md.

    '
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: "After all steps above are done:\n1. Call mem_analysis.log with completion
    summary.\n2. Call mem_methods.append with any new methods or tools used.\n3. Read
    workspace/workflow.mermaid via sys_file.read, add a node for this completed step
    (green fill), write back.\n4. Call sys_checkpoint.create with description='tool_discovery
    completed'.\n5. Ask researcher: 'I've completed tool_discovery. Want me to proceed
    to the next protocol?'\n\n    - ENVIRONMENT CHECK: Validate that any new tools/libraries
    have been snapshotted to the step's environment file.\n    - GROUNDING CHECK:
    Ensure you have ACTUALLY called search tools (search_semantic_scholar, search_web,
    etc.) to ground your decisions, and updated workspace/logs/methods_research.log.
    Do not rely solely on pre-trained knowledge!"
expected_outputs:
- workspace/{step_number}_.../methods_research.md updated with tool/library 
  decision
next_protocol: methodology/research_methods
