name: tool_discovery
version: 1.0.0
description: "Guide to discovering and evaluating Python/R/Julia packages for a specific task."
always_include: []
schema_version: "1.0"
trigger: "When the AI needs a library for a task but doesn't know which one to use."

steps:
  - id: formulate_query
    name: "Formulate Search Query"
    description: |
      Build a specific query: "<task> Python library", e.g., "survival analysis Python library".
      If the researcher's environment includes R, also search for "<task> R package".

  - id: search_web
    name: "Search the Web"
    description: |
      Use tool.search.web with the query. Gather top 5 results.
      For each, extract: library name, official documentation URL, GitHub repository URL.

  - id: evaluate_library
    name: "Evaluate Library Quality"
    description: |
      For each candidate, check (via tool.search.web or direct GitHub API):
      - Last commit date (should be within 12 months)
      - Number of GitHub stars (indicates community trust)
      - Documentation quality (does it have a user guide? examples?)
      - Compatibility with the current language environment

  - id: test_installation
    name: "Test Installation Feasibility"
    description: |
      Call tool.package.install with the library name.
      If installation fails, note the error and consider the next candidate.

  - id: log_decision
    name: "Log Decision"
    description: |
      Record the selected library, its version, documentation URL, and justification in methods_research.md.

expected_outputs:
  - "workspace/{step_number}_.../methods_research.md updated with tool/library decision"
