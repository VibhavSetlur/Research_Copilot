id: meta_analysis
name: Meta-Analysis
version: '4.0.0'
schema_version: '2.0'
description: Pool effect sizes from primary studies, evaluate heterogeneity and publication bias.
trigger: Systematic review with ≥3 quantitatively comparable studies.
prerequisites:
  - literature/systematic_review or literature/evidence_synthesis has been run
  - data_extraction.csv exists with effect sizes + SEs (or sufficient stats)

steps:
  - id: create_step
    name: Create Meta-Analysis Step
    description: sys_path_create name="meta_<outcome>" hypothesis="<pooled effect direction>"

  - id: harmonise_effect_sizes
    name: Harmonise Effect Sizes
    description: |
      Convert all studies to a common effect size:
        Continuous outcome → Standardised Mean Difference (Cohen's d / Hedges' g).
        Binary outcome     → log Odds Ratio or log Risk Ratio.
        Correlations       → Fisher Z.
      Compute / impute SE when only CI is given.

  - id: heterogeneity
    name: Assess Heterogeneity
    description: |
      Compute Cochran's Q (chi^2), tau^2 (between-study variance), I^2 (% of
      total variance from heterogeneity). Interpret I^2:
        < 25% low, 25-50% moderate, 50-75% substantial, > 75% considerable.
      If substantial, prefer random-effects model. Document in outputs/reports/heterogeneity.md.

  - id: pool
    name: Pool the Effect
    description: |
      Random-effects (REML or DerSimonian-Laird) is default. Fixed-effects only
      when heterogeneity is negligible. Use a library (pymeta, metafor in R via
      tool_r_exec, or statsmodels). Save pooled estimate + 95% CI to
      outputs/reports/pooled_effect.json.

  - id: forest_plot
    name: Forest Plot
    description: |
      Generate a publication-grade forest plot at
      outputs/figures/forest_plot.png (≥300 DPI). Order studies by year or
      effect size. Mark the pooled diamond.

  - id: publication_bias
    name: Publication Bias
    description: |
      With ≥10 studies, run Egger's regression test + funnel plot.
      Save funnel plot to outputs/figures/funnel_plot.png and test stats to
      outputs/reports/publication_bias.md. If asymmetric, run trim-and-fill
      sensitivity analysis.

  - id: sensitivity
    name: Sensitivity & Subgroup
    description: |
      Run sensitivity analyses pre-specified in the review protocol:
      leave-one-out, removal of high-RoB studies, subgroup by population /
      design / era. Tabulate to outputs/tables/sensitivity.csv.

expected_outputs:
  - workspace/*/outputs/figures/forest_plot.png
  - workspace/*/outputs/reports/pooled_effect.json

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
