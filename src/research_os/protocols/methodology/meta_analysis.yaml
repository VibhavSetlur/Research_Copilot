name: meta_analysis
version: 2.0.0
description: Guide for extracting effect sizes, assessing heterogeneity, and performing
  meta-analysis.
schema_version: '1.0'
expected_outputs:
- workspace/{step_number}_{descriptive_name}/outputs/figures/forest_plot.png
- workspace/{step_number}_{descriptive_name}/outputs/figures/funnel_plot.png
- workspace/{step_number}_{descriptive_name}/outputs/reports/meta_analysis_report.md
_output_path_note: '{step_number}_{descriptive_name} is created by sys.path.create.
  Example names: 02_effect_size_extraction, 03_meta_analysis_path_1 (with path track).'
decision_tree:
- Are studies highly heterogeneous? If yes -> Use random-effects model. If no -> Fixed-effects
  model.
- Is there risk of publication bias? -> Run Egger's test and build funnel plot.
prerequisites:
- Extracted effect sizes and variances/standard errors from primary studies.
- 'Python libraries: statsmodels, PyMARE, or R packages: metafor.'
steps:
- id: create_experiment_path
  name: Create Experiment Path
  description: Create a new path via sys.path.create (e.g., 02_meta_analysis) to store
    scripts and outputs.
- id: extract_effect_sizes
  name: Extract Effect Sizes
  description: Standardize effect sizes across heterogeneous studies (e.g., Cohen's
    d, Odds Ratios).
- id: assess_heterogeneity
  name: Assess Heterogeneity
  description: Compute I² and Q-test statistics to evaluate between-study variance.
- id: perform_meta_analysis
  name: Perform Meta-Analysis
  description: Run fixed or random-effects meta-analysis using PyMARE or R's metafor
    via tool.python.exec/tool.r.exec.
- id: generate_plots
  name: Generate Plots
  description: Create forest plots for effect sizes and funnel plots for publication
    bias.
- id: test_publication_bias
  name: Test Publication Bias
  description: Perform Egger's test or trim-and-fill method.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''meta_analysis completed''.

    5. Ask researcher: ''I''ve completed meta_analysis. Want me to proceed to the
    next protocol?'''
checkpoints:
- Verify that all standard errors are positive.
- Confirm I² interpretation is documented.
next_protocol: methodology/methodology_selection
