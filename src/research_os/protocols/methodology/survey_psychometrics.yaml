id: survey_psychometrics
name: Survey & Psychometrics
version: '4.0.0'
schema_version: '2.0'
description: Scale reliability / validity, sampling weights, non-response analysis for survey data.
trigger: Data is survey responses with multi-item scales OR complex sample design.

steps:
  - id: create_step
    name: Create Survey-Analysis Step
    description: sys_path_create name="survey_<scale>"

  - id: scale_reliability
    name: Reliability — Cronbach's α + McDonald's ω
    description: |
      For each multi-item scale: compute α and ω, interpret:
        > 0.9 excellent · 0.8-0.9 good · 0.7-0.8 acceptable · 0.6-0.7 questionable · <0.6 poor.
      Inter-item correlations: flag items with low item-rest correlation (<0.3).
      Save to outputs/reports/reliability.md.

  - id: factor_structure
    name: EFA / CFA
    description: |
      Exploratory factor analysis (EFA) for new scales, confirmatory (CFA) when
      a published structure exists. Report:
        EFA → KMO, Bartlett's, scree plot, parallel analysis, factor loadings.
        CFA → CFI, TLI (≥0.95), RMSEA (≤0.06), SRMR (≤0.08).
      Save to outputs/reports/factor_structure.md and outputs/figures/cfa_diagram.png.

  - id: sampling_weights
    name: Apply Sampling Weights
    description: |
      If complex design (stratified / clustered / oversampled), apply survey weights
      using statsmodels or the survey package in R via tool_r_exec. Document the
      weighting scheme.

  - id: nonresponse_analysis
    name: Non-response Bias
    description: |
      Compare early vs late responders OR responders vs known population margins
      (post-stratification). Report differences in key variables to
      outputs/reports/nonresponse.md.

  - id: missing_data_strategy
    name: Item-level Missingness
    description: |
      If item-level missingness exceeds 5% on any scale, use full-information ML
      (FIML) or MICE imputation; document in outputs/reports/missing_data.md.

expected_outputs:
  - workspace/*/outputs/reports/reliability.md
  - workspace/*/outputs/reports/factor_structure.md

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
