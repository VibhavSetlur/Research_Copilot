id: replication_study
name: Replication Study (Direct + Conceptual)
version: '1.0.0'
schema_version: '2.0'
description: |
  Re-execute a previously published analysis with explicit comparison to
  the original outcome. Distinguishes direct replication (same data + same
  method) from conceptual replication (same construct, new data or method).
trigger: |
  Researcher says "replicate", "reproduce <paper>", "does X hold in our
  data", "we want to check finding Y". Inputs/literature/ should contain the
  paper being replicated (PDF + its supplementary if available).

steps:
  - id: classify_replication_type
    name: Classify Replication Type
    description: |
      Write outputs/reports/replication_design.md stating:
        - direct (same data) | direct (new data) | conceptual (same theory,
          new data + new operationalisation)
        - What constitutes "same enough" — variables, sample inclusion,
          analytic specification
        - The pre-specified replication criterion: e.g. effect-size CI
          overlaps original, or sign + significance match, or |estimate −
          original| within some fraction of original SE

  - id: extract_original_analysis
    name: Extract Original Analysis Specification
    description: |
      Read the source paper (sys_file_read on PDF if extractable, else
      tool_web_scrape on a public version). Capture into
      outputs/reports/original_spec.md:
        - Sample size, inclusion/exclusion criteria
        - Variable definitions (with exact wording / units)
        - Statistical model + software + version (where stated)
        - Reported headline estimate, SE, CI, p-value

  - id: data_pipeline
    name: Build Replication Data Pipeline
    description: |
      sys_path_create name="repl_<short_paper_id>". Re-do the inclusion /
      exclusion in a script (don't trust manual filtering). If using
      different data than original, document the swap in
      methods.md with mem_methods_append justification="replication with
      new cohort".

  - id: rerun_analysis
    name: Re-run Analytic Model
    description: |
      Implement the exact original specification first. If the paper used
      Stata or SAS and we're in Python, document the translation in
      mem_decision_log context="replication translation". Save fitted model
      + standard errors to outputs/data/.

  - id: compare_to_original
    name: Compare to Original
    description: |
      Build outputs/reports/comparison.md:
        | Quantity | Original | Replication | Δ | Within criterion? |
      Use the pre-specified criterion to decide replicated / failed /
      ambiguous. Plot original vs replication CI overlap.

  - id: sensitivity
    name: Sensitivity Around Original Specification
    description: |
      One pre-specified deviation each from:
        - Inclusion (broader / stricter)
        - Specification (add/remove one covariate, change link)
        - Estimator (robust SE, alternative ML estimator)
      Show whether the conclusion is fragile. Save to
      outputs/reports/sensitivity.md.

  - id: report
    name: Per-step Conclusions
    description: |
      conclusions.md states the replication verdict, why it succeeded or
      failed, and whether the original finding generalises. Avoid
      "the original was wrong" framing unless the evidence is overwhelming —
      prefer "did not replicate in this sample under this specification".

expected_outputs:
  - workspace/*/outputs/reports/replication_design.md
  - workspace/*/outputs/reports/original_spec.md
  - workspace/*/outputs/reports/comparison.md
  - workspace/*/outputs/reports/sensitivity.md

quality_bar: |
  - Replication criterion is declared BEFORE looking at the new estimate.
  - Original spec is reconstructed from the paper, not inferred.
  - Verdict is supported by both the pre-specified criterion and sensitivity
    around the original specification.

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
