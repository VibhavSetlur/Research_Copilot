id: methodology_selection
name: Methodology Selection
version: '4.0.0'
schema_version: '2.0'
description: Pick the statistical / computational method to test the planned hypotheses. Document the implementation, parameters, and assumptions.
trigger: After research_design. Re-run if the outcome class changes.

steps:
  - id: classify_problem
    name: Classify the Problem on 3 Axes
    description: |
      Decide:
        1. Outcome type:  continuous | binary | count | time-to-event | text | image | network
        2. Data structure: independent | repeated | nested | spatial | temporal | sequential
        3. Dimensionality: univariate | low-D | high-D (p >> n)
      Write the triple to workspace/methods.md.

  - id: enumerate_candidates
    name: Enumerate Candidate Methods
    description: |
      Examples (NOT exhaustive — verify with literature):
        Continuous · independent · low-D  → OLS / Ridge / LASSO; MLR for multi-IV
        Continuous · repeated             → Mixed-effects (lme4 / statsmodels)
        Continuous · nested               → Multilevel / hierarchical Bayes
        Continuous · spatial              → Kriging / spatial regression
        Continuous · high-D               → LASSO / Elastic Net / PCA + reg
        Binary · independent              → Logistic / GLM
        Binary · time-varying covariates  → Time-varying logistic
        Count                             → Poisson / Negative Binomial / zero-inflated
        Time-to-event                     → Cox PH; Fine-Gray for competing risks
        Causal observational              → Propensity scoring, DiD, IV, RDD
        ML benchmark                      → Cross-validated baseline + main + ablations
        Text                              → Pretrained transformer fine-tune + calibration
        Image                             → CNN baseline + domain-appropriate transfer
      List 2-3 candidates with pros/cons.

  - id: ground_with_literature
    name: Ground Method Choice in Literature
    description: |
      MANDATORY: do NOT decide from training knowledge alone.
        tool_search_semantic_scholar query="<problem> <leading candidate method> review"
        tool_search_web query="<candidate method> best practices <year>"
      Cite at least 2 sources supporting the chosen method.

  - id: record_choice_and_assumptions
    name: Record Choice, Implementation & Assumptions
    description: |
      For the WINNING method, call mem_methods_append with:
        method=<name>
        step_number=<NN>           # the experiment this method will be used in
        step_name=<slug>
        dataset_name=<from intake>
        dataset_hash=<sha256 from intake>
        implementation=<lib+version, e.g. statsmodels 0.14>
        parameters=<key hyperparams>
        justification=<1-2 sentences citing references>
        assumptions=[list of assumptions you will TEST during execute_step]
      Also call mem_decision_log to record the decision in analysis.md.

  - id: list_assumption_tests
    name: Plan Assumption Tests
    description: |
      For every assumption, name the diagnostic test that will be run during
      analysis_plan's execute step. Examples:
        Normality           → Shapiro-Wilk, Q-Q plot
        Homoscedasticity    → Levene, Breusch-Pagan
        Multicollinearity   → VIF (>10 = problem)
        Independence        → Durbin-Watson (residuals)
        Proportional hazards → Schoenfeld residuals
        Calibration (binary)→ Hosmer-Lemeshow / calibration plot
      Write the test plan as a numbered list inside workspace/methods.md under
      "Assumption tests planned".

expected_outputs:
  - workspace/methods.md

next_protocol: literature/literature_search
on_failure: guidance/dead_end_routing
