id: pilot_study
name: Pilot Study
version: '1.0.0'
schema_version: '2.0'
description: |
  Small-N preliminary run to de-risk a full study: feasibility, instrument
  reliability, recruitment rate, refining inclusion/exclusion criteria,
  variance estimates for a real power calculation. NOT a small-N test of
  the hypothesis — pilots are about logistics + variance, not effects.
trigger: |
  Researcher says "pilot", "feasibility", "test the protocol", "before the
  full study", or research_design indicates a new methodology that hasn't
  been used by this team before.

editorial_voice:
  mode: guidance
  rules:
    - "A pilot is not a small confirmatory study. If the writeup
       reports the primary effect estimate as a headline, the pilot
       was misused."
    - "Variance estimates from a pilot are noisy by construction —
       use a conservative inflation factor (the UCL of the pilot
       variance is a defensible default) when feeding them into a
       full-study power calculation."

steps:
  - id: declare_pilot_aim
    name: Declare Pilot Aim Explicitly
    description: |
      Write outputs/reports/pilot_aim.md stating which of the following the
      pilot is intended to inform:
        - Recruitment feasibility (rate, drop-out)
        - Instrument / protocol feasibility (acceptability, completion time)
        - Variance estimate for a future power calculation
        - Logistics (data pipeline, response times, vendor reliability)
        - Refining inclusion / exclusion criteria
      Pilots are NOT intended to test the hypothesis. State this in writing
      so reviewers (and future-you) don't mistake the pilot for a small
      confirmatory study.

  - id: pilot_sample
    name: Choose Pilot Sample Size + Stopping Rule
    description: |
      Justify N (typically 10-30 for variance estimation, 5-15 per arm for
      feasibility). Pre-specify a stopping rule: hit N, hit a time bound, or
      hit an acceptability red flag.

  - id: run_pilot
    name: Run the Pilot
    description: |
      Use the planned full-study protocol AS-IS — do not skip steps to make
      the pilot easier. The whole point is to find friction. Log issues as
      they happen (mem_analysis_log).

  - id: feasibility_report
    name: Feasibility Report
    description: |
      outputs/reports/feasibility.md:
        - Recruitment rate (eligible / contacted / consented / completed)
        - Drop-out rate + reasons (if known)
        - Median time per participant / unit
        - Acceptability comments
        - Logistics that broke + how they were fixed mid-pilot

  - id: variance_estimate
    name: Variance Estimate (if applicable)
    description: |
      If the pilot is feeding a power calculation, report the observed
      SD / proportion / event rate for the primary outcome with a CI. Be
      explicit that these estimates are noisy — the future power calc should
      use a conservative inflation factor (e.g. UCL of pilot variance).

  - id: refine_main_protocol
    name: Refine the Main Protocol
    description: |
      In conclusions.md, list every change to the main protocol the pilot
      surfaced: clarifications, dropped questions, new exclusion criteria,
      revised consent process. Each change tied to the specific pilot
      finding that motivated it.

  - id: decision
    name: Go / No-Go / Revise
    description: |
      conclusions.md ends with a clear verdict: proceed to full study as
      written | proceed with named revisions | revise + run another pilot |
      abandon. Justify with the feasibility numbers.

expected_outputs:
  - workspace/*/outputs/reports/pilot_aim.md
  - workspace/*/outputs/reports/feasibility.md

quality_bar: |
  - The pilot does NOT report a confirmatory effect estimate; if numbers
    are shown, they are framed as "for variance estimation only".
  - Every protocol change in the main study traces back to a specific pilot
    finding.
  - The decision is justified by feasibility data, not hope.

next_protocol: domain/research_design
on_failure: guidance/dead_end_routing
