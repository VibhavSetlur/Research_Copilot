id: bayesian_analysis
name: Bayesian Analysis Workflow
version: '1.0.0'
schema_version: '2.0'
description: |
  A first-class Bayesian workflow following Gelman et al.'s Bayesian
  Workflow paper (2020): prior elicitation → simulation-based
  calibration → posterior fitting → diagnostics → posterior
  predictive checks → sensitivity to prior. Parallel in stature to
  `causal_inference_deep` and `machine_learning`; routed when the
  analytical goal is naturally Bayesian (genuine prior knowledge,
  small samples, hierarchical structure, decision-theoretic
  reporting).

trigger: |
  Researcher says any of: "bayesian", "stan", "pymc", "brms",
  "posterior", "credible interval", "ROPE", "Bayes factor",
  "hierarchical model with priors". Also routed when
  research_design selects a Bayesian frame.

prerequisites:
  - Methodology selection has narrowed the problem to where a
    Bayesian frame is warranted (genuine prior information OR small
    samples + decision-theoretic reporting OR hierarchical
    structure with rare events).
  - PyMC / Stan / brms available in the project environment.

editorial_voice:
  mode: guidance
  rules:
    - "The point of Bayesian workflow is that fitting is the EASY
       part. Most of the protocol is BEFORE fitting (prior elicitation,
       prior predictive checks) and AFTER fitting (posterior
       diagnostics, posterior predictive checks, sensitivity)."
    - "Report posteriors honestly — mean / median + 94% HDI (or 95% CI)
       + the ROPE (Region of Practical Equivalence) when applicable.
       Bayes factors are interpretable but not always the right
       summary."
    - "Sensitivity to the prior is mandatory. Run at least one
       alternative prior; show the posteriors overlay."

steps:
  - id: elicit_priors
    name: Elicit + justify priors
    description: |
      Before any data touches a model:
        - For each parameter, write down the prior + a one-sentence
          rationale. Weakly informative ("normally distributed,
          centered at 0, SD = 2") is the default; informative priors
          require explicit justification (a prior meta-analysis, a
          domain conventional value, a regulatory threshold).
        - Document priors in the methods record alongside the model
          spec. The pre-registration should freeze them BEFORE data
          inspection if the project is preregistered.

  - id: prior_predictive_check
    name: Prior predictive check (BEFORE fitting)
    description: |
      Simulate from the prior alone. Does the resulting predictive
      distribution span scientifically reasonable outcomes? If the
      prior implies infants 3 metres tall or risk ratios of 10,000,
      the prior is wrong even before any data — fix it.

      Produces `outputs/reports/prior_predictive.md` with one
      figure showing simulated outcomes from the prior + a
      one-paragraph interpretation. This step is MANDATORY when
      the prior is anything other than the most diffuse default.

  - id: sbc
    name: Simulation-based calibration (recommended)
    description: |
      When the model is non-trivial, run simulation-based
      calibration: draw a parameter from the prior, simulate data
      under it, fit the model, check whether the parameter falls
      where the posterior expects. Repeat ~1000 times; the
      coverage should match the nominal level. Catches bugs in
      the model code BEFORE you can mistake them for real findings.

  - id: fit
    name: Fit the posterior
    description: |
      Choose an inference algorithm appropriate for the model:
        - HMC / NUTS (Stan, PyMC, NumPyro) — default for
          continuous parameter spaces.
        - Variational inference — only when HMC is too expensive
          AND the posterior is unimodal-ish.
        - ABC / SMC — for likelihood-free settings.

      Run at least 4 chains, ≥1000 warmup + 1000 sampling
      iterations as a starting point. The diagnostics below tell
      you whether more is needed.

  - id: diagnostics
    name: MCMC diagnostics (BEFORE looking at the posterior)
    description: |
      The diagnostic gate is strict because looking at the
      posterior before diagnostics is asking to be biased by it:
        - R-hat (Gelman-Rubin) — target ≤ 1.01 for every parameter.
          R-hat > 1.05 = stop and investigate.
        - Effective sample size (ESS bulk + ESS tail) — target
          ≥ 400 for inferential parameters.
        - Divergences (HMC/NUTS) — zero is the target; any
          divergence demands investigation (reparameterise,
          tighten the prior, increase `adapt_delta`).
        - Energy-fraction (E-BFMI) — values < 0.3 = poor mixing
          in the energy dimension.
        - Trace plots — visual check for stuck or wandering chains.

      Persist diagnostics into
      `outputs/reports/posterior_diagnostics.md`. The audit gate
      blocks downstream consumption of the posterior until
      diagnostics pass.

  - id: posterior_predictive_check
    name: Posterior predictive check
    description: |
      Simulate from the posterior + observed predictors; compare
      to the observed outcome distribution. Pick check statistics
      that would matter for your downstream claim (mean, variance,
      max, quantiles, group-wise summaries). A model that fits the
      mean but mis-fits the variance is still wrong for many
      purposes.

      Produces `outputs/figures/<step>_ppc_<stat>.png` for each
      relevant statistic.

  - id: sensitivity_to_prior
    name: Sensitivity to prior (mandatory when prior is informative)
    description: |
      For each informative prior, refit with at least one
      reasonable alternative (a more diffuse version + a different
      centre). Overlay the resulting posteriors. The reporting
      claim should be one of:

        - "The posterior is robust across reasonable priors"
          — overlap is high, conclusions don't change.
        - "The posterior depends meaningfully on the prior"
          — explicitly acknowledge which prior assumption is
          driving the conclusion.

  - id: report_posteriors
    name: Report the posterior the right way
    description: |
      For each inferential quantity:
        - Point estimate (posterior mean OR median — pick one and
          stick with it).
        - 94% HDI (highest density interval) is the Kruschke
          convention; 95% CrI (equal-tailed credible interval) is
          common too. Pick one + state it.
        - When a Region of Practical Equivalence (ROPE) is
          defined, report the % of posterior inside ROPE.
        - Bayes factor only when the model comparison is genuinely
          model-vs-model; the inference / decision rule should
          drive whether BF is the right summary.

      The viz library's `tool_figure_create kind=posterior` renders
      the posterior with HDI + optional ROPE band.

  - id: decision_or_conclusion
    name: Decision / inferential summary
    description: |
      Map the posterior onto the original research question.
      Decision-theoretic framings ("posterior probability that the
      effect exceeds the clinical threshold = 0.87") are usually
      more useful than NHST-style verdicts in Bayesian work.

expected_outputs:
  - workspace/<step>/outputs/reports/prior_predictive.md
  - workspace/<step>/outputs/reports/posterior_diagnostics.md
  - workspace/<step>/outputs/figures/<step>_ppc_*.png
  - workspace/<step>/outputs/figures/<step>_posterior_*.png
  - workspace/methods.md (entry with prior + model spec)

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
