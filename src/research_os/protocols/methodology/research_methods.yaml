id: research_methods
name: Research Methods Lookup
version: '4.0.0'
schema_version: '2.0'
description: When unsure which statistical / analytical method fits — research candidates from literature and pick one.
trigger: AI is uncertain which method to apply, OR the researcher asks "what method should I use?".

steps:
  - id: characterise_data
    name: Characterise the Data
    description: |
      Pull data characteristics from inputs/intake.md and any data_profile reports
      under workspace/*/outputs/reports/. Record:
        - Outcome type (continuous | binary | count | time-to-event | ordinal | nominal | text)
        - Predictor types (numeric, categorical, mixed)
        - Sample size + missingness
        - Structure (independent | repeated | nested | spatial | temporal)
        - Dimensionality (p << n | p ~ n | p >> n)

  - id: define_goal
    name: Define the Analytical Goal
    description: |
      Pick the primary goal:
        Description / EDA · Association · Prediction · Causal effect ·
        Classification · Clustering · Ranking · Anomaly detection · Generation.
      The goal narrows methods quickly.

  - id: search_methods
    name: Search the Literature
    description: |
      tool_search_semantic_scholar query="<goal> for <outcome-type> with <structure>"
      tool_search_web query="<goal> best method <year>"
      Extract 2-4 candidates. For each: name, year of recent best practice, library/tool,
      strengths, weaknesses.

  - id: evaluate_libraries
    name: Verify Tooling
    description: |
      For each candidate method, call methodology/tool_discovery (or inline):
        tool_search_web query="<method> Python|R|Julia library documentation"
      Check the library is maintained (commits in past 12 months), well-documented,
      compatible with the project environment.

  - id: pick_and_log
    name: Pick, Justify, Log
    description: |
      Pick the winner. Call mem_decision_log with context/selected/rationale.
      Call mem_methods_append with full structured fields (see analysis_plan.execute).

expected_outputs:
  - workspace/methods.md

next_protocol: guidance/analysis_plan
on_failure: guidance/dead_end_routing
