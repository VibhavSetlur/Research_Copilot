name: audit_and_validation
version: 1.0.0
description: Process for auditing and validating research outputs.
schema_version: "1.0"
steps:
  - id: peer_review
    name: "Simulated Peer Review"
    description: "Critique the methodology and findings as an external reviewer."
  - id: data_integrity
    name: "Data Integrity Check"
    description: "Verify that all data points in the text match the figures and tables."
  - id: logical_flow
    name: "Logical Flow"
    description: "Ensure the conclusions logically follow from the results."
