id: domain_analysis
name: Domain Analysis
version: '4.0.0'
schema_version: '2.0'
description: Classify the research domain, surface the relevant reporting standards, and list domain-specific biases to watch for.
trigger: After project_startup, OR whenever the data class changes (e.g. new modality added to inputs/raw_data/).

steps:
  - id: identify_domain
    name: Identify Domain
    description: |
      Combine signals to pick ONE primary domain (and optional secondary):
        - File extensions in inputs/raw_data/ (e.g. .dcm → clinical imaging,
          .fastq → bioinformatics, .nc → climate, .shp → geospatial).
        - Column names in tabular files (e.g. "patient_id" → clinical,
          "ticker" → finance, "log2fc" → bioinformatics).
        - Researcher's stated field (researcher.field in config) and any text
          notes in inputs/context/.
      If signals conflict, ask the researcher.

  - id: select_reporting_standard
    name: Select Reporting Standard
    description: |
      Pick the standard the eventual paper will follow, based on the design:
        Clinical RCT          → CONSORT
        Clinical observational → STROBE
        Systematic review      → PRISMA
        Meta-analysis          → PRISMA + MOOSE
        Diagnostic accuracy    → STARD
        Qualitative            → SRQR / COREQ
        Animal studies         → ARRIVE
        Machine learning       → MI-CLAIM / TRIPOD-AI / Model Cards
        Genomics microarray    → MIAME
        Genomics sequencing    → MINSEQE
        Psychology / behavioral → APA JARS
        Economics              → AEA data & code policy
      Cite the standard explicitly in docs/domain_summary.md and append to
      workspace/methods.md as a "Reporting standard" entry.

  - id: surface_biases
    name: Surface Domain-Specific Biases
    description: |
      Write a "Biases to monitor" list in docs/domain_summary.md, e.g.:
        Clinical    → selection bias, attrition, confounding by indication.
        Finance     → survivorship, look-ahead, data snooping.
        Surveys     → social-desirability, non-response, sampling.
        Genomics    → batch effects, GC bias, library prep.
        Geospatial  → spatial autocorrelation, MAUP, edge effects.
        ML benchmarks → leakage, distribution shift, dataset bias.
      Each bias gets a one-line "How we'll mitigate" companion.

  - id: ground_with_search
    name: Ground the Classification in Literature
    description: |
      tool_search_web query="<domain> reporting standard <year>"
      tool_search_semantic_scholar query="<domain> systematic review"
      Cite at least one anchor source in docs/domain_summary.md. The standards
      list above is a starting point — verify it's current.

expected_outputs:
  - docs/domain_summary.md

next_protocol: domain/research_design
on_failure: guidance/dead_end_routing
