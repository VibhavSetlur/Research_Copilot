name: research_design
version: 2.0.0
description: Select the appropriate research design and compute sample size justification.
schema_version: '1.0'
expected_outputs:
- 'workspace/methods.md: Appended chosen research design and sample size justification'
- workspace/logs/research_design.log
decision_tree:
  flowchart:
    q1:
      question: Is the treatment assigned randomly by the researcher?
      true: Randomised Controlled Trial (RCT)
      false: q2
    q2:
      question: Is there a control group?
      true: q3
      false: Case Series / Cross-sectional (No comparator)
    q3:
      question: Is the outcome rare?
      true: Case-Control Study
      false: q4
    q4:
      question: Is time a factor (before/after)?
      true: Longitudinal / Difference-in-Differences (DiD)
      false: Cohort Study
sample_size_justification:
  formulae:
    continuous_outcome:
      description: Using Cohen's d for comparing two means.
      power: 0.8
      alpha: 0.05
      formula: n = 2 * ( (Z_{alpha/2} + Z_{beta}) / d )^2
      example: For d=0.5, n ≈ 64 per group.
    binary_outcome:
      description: Comparing two proportions.
      power: 0.8
      alpha: 0.05
      formula: n = (p1(1-p1) + p2(1-p2)) * ( (Z_{alpha/2} + Z_{beta}) / (p1 - p2)
        )^2
steps:
- id: traverse_flowchart
  name: Traverse Design Flowchart
  description: Answer the flowchart questions to determine the correct research design.
- id: calculate_sample_size
  name: Calculate Sample Size
  description: Use the provided formulae to compute and justify the required sample
    size, given power=0.8 and alpha=0.05.
- id: protocol_completion
  name: Complete Protocol & Update Workspace
  description: 'After all steps above are done:

    1. Call mem.analysis.log with completion summary.

    2. Call mem.methods.append with any new methods or tools used.

    3. Read workspace/workflow.mermaid via sys.file.read, add a node for this completed
    step (green fill), write back.

    4. Call sys.checkpoint.create with description=''research_design completed''.

    5. Ask researcher: ''I''ve completed research_design. Want me to proceed to the
    next protocol?'''
next_protocol: methodology/methodology_selection
