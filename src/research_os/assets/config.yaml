project_id: "research-os"
schema_version: "9.0.0"

default_workflow: "quick_exploratory"

# Branching engine (Git-like state branching)
branching:
  enabled: true
  auto_scaffold: true
  branch_dirs:
    - 02_experiments/{branch}/scripts
    - 02_experiments/{branch}/outputs/figures
    - 02_experiments/{branch}/outputs/tables
    - 02_experiments/{branch}/outputs/artifacts
    - 02_experiments/{branch}/outputs/analysis

# Intent routing (token optimization)
intent_routing:
  enabled: true
  auto_classify: true
  default_depth: "academic"
  allowed_depths: ["exploratory", "academic", "publication"]
  save_decisions: true
  null_space_optimization: true
  exploratory_constraint: "Prioritize speed and simple descriptive statistics. Do not run adversarial audits."

# Knowledge graph (context management)
knowledge_graph:
  enabled: true
  storage: ".research/cache/knowledge_graph.pkl"
  json_export: ".research/cache/knowledge_graph.json"
  auto_extract_triplets: true
  max_depth: 3

# Semantic file system
semantic_filesystem:
  enabled: true
  enforce_on_generation: true
  taxonomy_strict: true

# Interpretative coupling
interpretative_coupling:
  enabled: true
  auto_generate: true
  output_dir: "02_experiments/{active_experiment}/decisions/"

default_workflow: "quick_exploratory"

# Multi-agent LLM delegation
multi_agent:
  enabled: false
  models_config: ".research/models.yaml"
  cost_tracking: true
  budget_warning_pct: 0.80
  budget_hard_limit_usd: 50.00

# Input paths (user-provided, never modified by AI after ingest)
intake_path: "inputs/intake.md"
data_raw: "inputs/data/raw"
context_dir: "inputs/context"
papers_dir: "inputs/papers"
canonical_inputs_dir: "00_inputs"
canonical_raw_data: "00_inputs/raw_data"
canonical_literature: "00_inputs/literature"
canonical_intake_manifest: "00_inputs/intake_manifest.yaml"

# Workspace paths (human-AI interaction)
workspace_dir: "01_workspace"
scratchpad_dir: "01_workspace/scratchpad"
lab_notebook: "01_workspace/lab_notebook.md"

# CLI cache (internal working files, stored in .research/)
cache_dir: ".research/cache"
cache_research_map: ".research/cache/research_map.json"
cache_followups: ".research/cache/follow_up_questions.md"
cache_scan_result: ".research/cache/scan_result.json"

# Experiment and synthesis paths (created by AI during init)
experiments_dir: "02_experiments"
active_experiment: "exp_001_baseline"
baseline_experiment: "02_experiments/exp_001_baseline"
baseline_scripts: "02_experiments/exp_001_baseline/scripts"
baseline_outputs: "02_experiments/exp_001_baseline/outputs"
baseline_figures: "02_experiments/exp_001_baseline/outputs/figures"
baseline_tables: "02_experiments/exp_001_baseline/outputs/tables"
baseline_artifacts: "02_experiments/exp_001_baseline/outputs/artifacts"
baseline_analysis: "02_experiments/exp_001_baseline/outputs/analysis"
baseline_decisions: "02_experiments/exp_001_baseline/decisions.yaml"

synthesis_dir: "03_synthesis"
manifest: "03_synthesis/manifest.json"
global_methods: "03_synthesis/global_methods.md"
manuscript_dir: "03_synthesis/manuscript"
final_figures: "03_synthesis/final_figures"
quality_gates_dir: "03_synthesis/quality_gates"
data_lineage: "03_synthesis/data_lineage.json"

# Script paths (system scripts in .research/, experiment scripts in 02_experiments/*/scripts/)
scripts_dir: "02_experiments/exp_001_baseline/scripts"
system_scripts: ".research/scripts"
system_scripts_utils: ".research/scripts/utils"

# File paths (where AI writes final outputs)
research_map: "02_experiments/exp_001_baseline/outputs/analysis/research_map.json"
follow_up_questions: "01_workspace/scratchpad/follow_up_questions.md"
literature_corpus: "00_inputs/literature/literature_corpus.json"
evidence_matrix: "00_inputs/literature/evidence_matrix.md"
gap_analysis: "00_inputs/literature/gap_analysis.md"
prisma_flow: "00_inputs/literature/prisma_flow.json"
bibliography: "00_inputs/literature/bibliography.bib"
preregistration_dir: "03_synthesis"
analysis_plan: "02_experiments/exp_001_baseline/outputs/analysis/analysis_plan.md"
full_audit: "03_synthesis/audit/full_audit_report.md"
manuscript_findings: "03_synthesis/manuscript/research_findings.md"
key_findings: "03_synthesis/key_findings.md"
executive_summary: "03_synthesis/executive_summary.md"
layman_summary: "03_synthesis/layman_summary.md"
reviewer2_critique: "03_synthesis/audit/reviewer2_critique.md"
dag_viewer: "03_synthesis/dashboards/dag_viewer.html"

# Iteration tracking
iteration_registry: "03_synthesis/iteration_registry.json"

# Workflow
dag_json: ".research/workflow_dag.json"
dag_mermaid: ".research/workflow_dag.mermaid"

# Thresholds
literature_min_papers: 10
literature_recursion_depth: 2
power_adequate: 0.80
power_minimum: 0.50
missingness_warning: 0.20
sensitivity_tests_min: 3

# Reproducibility
requirements_file: "environment/requirements.txt"
environment_check_script: ".research/scripts/00_environment_check.py"
pin_dependency_versions: true

# Quality gates
quality_gates_enabled: true
gate_fail_blocks_pipeline: true

# State ledger & checkpoint system
state_ledger: ".research/cache/state.json"
checkpoint_dir: ".research/cache/checkpoints"
core_dir: ".research/core"
token_budget_limit: 200000

# Data scale thresholds (file size classification for library selection)
data_scale_thresholds:
  medium_mb: 100      # Files >= 100MB: polars recommended
  large_gb: 1         # Files >= 1GB: polars lazy frames REQUIRED
  massive_gb: 10      # Files >= 10GB: pyarrow + chunked processing REQUIRED

# Multi-language execution
execution:
  supported_runtimes: [python, r, bash, nextflow, snakemake, julia]
  container_engine: "docker"
  container_fallback: "conda"
  executor_log: ".research/cache/execution_log.jsonl"

# Domain registries
registries:
  domain_registry: ".research/domains/domain_registry.json"
  tool_registry: ".research/domains/tool_registry.json"
  assumption_registry: ".research/domains/assumption_registry.json"

# Container configuration
containers:
  base_image: "research-os-base:latest"
  domain_images_dir: "environment/domains"
  shared_volumes:
    - "00_inputs"
    - "01_workspace"
    - "02_experiments"
    - "03_synthesis"
    - "scripts"
    - "reports"
  cache_dir: ".research/cache/containers"

# Literature integration
literature:
  zotero:
    enabled: false
    api_key_env: "ZOTERO_API_KEY"
    user_id_env: "ZOTERO_USER_ID"
    collection_key: ""
  semantic_scholar:
    enabled: true
    api_key_env: "SEMANTIC_SCHOLAR_API_KEY"
    rate_limit_per_5min: 100

# Cloud/HPC execution
cloud_hpc:
  enabled: false
  supported_platforms: ["snowflake", "bigquery", "redshift", "emr", "dataproc", "slurm"]
  snowflake:
    account_env: "SNOWFLAKE_ACCOUNT"
    user_env: "SNOWFLAKE_USER"
    password_env: "SNOWFLAKE_PASSWORD"
  bigquery:
    project_env: "GOOGLE_CLOUD_PROJECT"
    credentials_env: "GOOGLE_APPLICATION_CREDENTIALS"
  slurm:
    default_partition: "compute"
    default_time: "24:00:00"
    default_mem: "64G"

# Dependency management
dependency_management:
  auto_detect: true
  preferred_installer: "uv"
  fallback_installer: "pip"
  requirements_file: "environment/requirements.txt"
