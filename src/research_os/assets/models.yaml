# Multi-Agent LLM Delegation Configuration
# Maps specific research tasks to optimal LLM providers
# 
# Usage: The orchestrator reads this file and routes tasks to the
# specified model when multi-agent mode is enabled.
#
# To enable: set `multi_agent.enabled: true` in config.yaml
#
# Each model entry specifies:
#   - provider: API provider (openai, anthropic, google, together, local)
#   - model: Model identifier
#   - api_key_env: Environment variable name for the API key
#   - max_tokens: Maximum tokens per request
#   - temperature: Default temperature
#   - capabilities: List of capabilities this model excels at
#   - context_window: Context window size in tokens
#   - cost_per_1m_input: Cost per 1M input tokens (USD)
#   - cost_per_1m_output: Cost per 1M output tokens (USD)

models:
  # Default orchestrator — coordinates all other agents
  orchestrator:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.1
    context_window: 200000
    capabilities: ["orchestration", "reasoning", "planning"]
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00

  # Literature review — needs massive context window for reading many papers
  literature_search:
    provider: "google"
    model: "gemini-2.5-pro"
    api_key_env: "GOOGLE_API_KEY"
    max_tokens: 8192
    temperature: 0.1
    context_window: 1000000
    capabilities: ["long_context", "literature_review", "citation_extraction"]
    cost_per_1m_input: 1.25
    cost_per_1m_output: 10.00

  # Methodology selection — needs deep reasoning for method comparison
  methodology_scout:
    provider: "openai"
    model: "o3-mini"
    api_key_env: "OPENAI_API_KEY"
    max_tokens: 100000
    temperature: 0.0
    context_window: 200000
    capabilities: ["deep_reasoning", "method_selection", "statistical_reasoning"]
    cost_per_1m_input: 1.10
    cost_per_1m_output: 4.40

  # Data scaffold — needs code generation accuracy
  data_scaffold:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.1
    context_window: 200000
    capabilities: ["code_generation", "data_pipeline", "validation"]
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00

  # Execute analysis — needs statistical computation accuracy
  execute_analysis:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.0
    context_window: 200000
    capabilities: ["code_execution", "statistical_analysis", "debugging"]
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00

  # Compile outputs — needs superior writing quality
  compile_outputs:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.3
    context_window: 200000
    capabilities: ["writing", "synthesis", "manuscript_generation"]
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00

  # Adversarial critic — needs strong logical reasoning to find flaws
  reviewer2_critic:
    provider: "openai"
    model: "o3-mini"
    api_key_env: "OPENAI_API_KEY"
    max_tokens: 100000
    temperature: 0.0
    context_window: 200000
    capabilities: ["critical_analysis", "logical_reasoning", "adversarial_review"]
    cost_per_1m_input: 1.10
    cost_per_1m_output: 4.40

  # Replication validator — needs statistical rigor
  replication_validator:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.0
    context_window: 200000
    capabilities: ["statistical_validation", "replication", "robustness"]
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00

  # Audit — comprehensive checking
  audit_validate:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.0
    context_window: 200000
    capabilities: ["quality_assurance", "validation", "compliance"]
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00

  # Research iteration — exploration and pivoting
  research_iterate:
    provider: "anthropic"
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    max_tokens: 8192
    temperature: 0.2
    context_window: 200000
    capabilities: ["exploration", "hypothesis_generation", "method_switching"]
    cost_per_1m_input: 3.00
    cost_per_1m_output: 15.00

# Fallback model — used when a specific model is unavailable or API key is missing
fallback:
  provider: "openai"
  model: "gpt-4o-mini"
  api_key_env: "OPENAI_API_KEY"
  max_tokens: 4096
  temperature: 0.1
  context_window: 128000
  cost_per_1m_input: 0.15
  cost_per_1m_output: 0.60

# Local model configuration (for offline/privacy-sensitive work)
local:
  enabled: false
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "llama3.1:70b"
  max_tokens: 4096
  temperature: 0.1

# Routing rules — automatic model selection based on task characteristics
routing_rules:
  # If task involves reading > 50 documents, use literature_search model
  - condition: "task.type == 'literature_review' and len(task.documents) > 50"
    route_to: "literature_search"
  
  # If task involves complex causal inference reasoning, use methodology_scout
  - condition: "task_type == 'causal_inference'"
    route_to: "methodology_scout"
  
  # If task involves writing manuscript sections, use compile_outputs model
  - condition: "task_type == 'writing'"
    route_to: "compile_outputs"
  
  # If task is adversarial review, use reviewer2_critic
  - condition: "task_type == 'adversarial_review'"
    route_to: "reviewer2_critic"

# Cost tracking
cost_tracking:
  enabled: true
  budget_warning_pct: 0.80
  budget_hard_limit_usd: 50.00
  log_path: ".os_state/cache/cost_log.jsonl"
