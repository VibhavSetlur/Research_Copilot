workflow_id: "clinical_trial_analysis"
name: "Clinical Trial Analysis (SAP driven)"
description: "Intake → SAP Design → Stratification → Survival Analysis → Compliance Audit"

agents:
  - research_init
  - clinical_biostatistician
  - data_scaffold
  - execute_analysis
  - fda_compliance_auditor
  - compile_outputs

branching:
  - after: fda_compliance_auditor
    if: "protocol_violation"
    then: "halt — analysis deviated from preregistered SAP"
