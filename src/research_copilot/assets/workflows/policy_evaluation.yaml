workflow_id: "policy_evaluation"
name: "Policy Evaluation (Quasi-Experimental)"
description: "Intake → Identification Strategy → Estimation → Robustness Checks"

agents:
  - research_init
  - policy_economist
  - data_scaffold
  - execute_analysis
  - compile_outputs

branching:
  - after: policy_economist
    if: "parallel_trends_violated"
    then: "halt — cannot use DiD"
