domain_id: "survey_research"
name: "Survey Research & Public Opinion"
reporting_standard: "AAPOR"
significance_threshold: 0.05
default_effect_size_metric: "odds_ratio"
preferred_visualizations:
  - likert_bar
  - diverging_bar
  - map
  - weighted_histogram
citation_style: "apa"
quality_gates:
  - weighting_applied
  - response_rate_reported
  - nonresponse_bias_assessed
  - design_effect_computed
  - finite_population_correction_checked
leaf_nodes:
  - cross_tabulation
  - raking_calibration
  - multilevel_regression_poststratification
primary_tools:
  - survey_stats
  - statsmodels
container: "general"
file_formats:
  - CSV
  - SAV
  - DTA
  - PARQUET
confounders:
  - social_desirability
  - interviewer_effects
  - mode_effects
  - nonresponse_bias
  - coverage_error
  - measurement_error
special_considerations:
  - apply_survey_weights_if_available
  - report_design_effect_for_all_estimates
  - use_tayler_series_linearization_or_replicate_weights_for_se
  - check_for_clustering_and_stratification_in_design
  - apply_finite_population_correction_when_sample_fraction_gt_0.05
  - report_response_rate_using_aapor_definitions
