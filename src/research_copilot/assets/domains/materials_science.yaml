domain_id: "materials_science"
name: "Materials Science & Engineering"
reporting_standard: "ACS (American Chemical Society)"
significance_threshold: 0.05
default_effect_size_metric: "property_change_percent"
preferred_visualizations: ["scatter_plot", "stress_strain_curve", "microstructure_image", "phase_diagram"]
citation_style: "acs"
quality_gates:
  - measurement_uncertainty_quantification
  - sample_size_justification
  - reproducibility_across_batches
  - instrument_calibration_record
confounders_to_check:
  - temperature_humidity_control
  - sample_preparation_variation
  - instrument_drift
  - batch_to_batch_variation
typical_effect_size_benchmarks:
  strength_improvement: "5-15% for composite modifications"
  conductivity_change: "order_of_magnitude_for_doping"
  thermal_stability: "10-50°C improvement typical"
outlier_handling: "grubbs_test_with_material_justification"
default_method: "anova_with_post_hoc_tukey"
leaf_nodes:
  - dft_electronic
  - molecular_simulation
primary_tools:
  - pymatgen
  - ase
  - OpenMM
  - GROMACS
container: "materials"
file_formats:
  - CIF
  - POSCAR
  - PDB
